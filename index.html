<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#1D9E75" />
<title>庇護工場 ERP</title>
<link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" />
<link rel="stylesheet" href="css/style.css" />
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- 登入頁面已移除（方案B：預設操作員，右上角可提升權限）-->

<!-- ════════════════════════════════════════════
     主應用程式
════════════════════════════════════════════ -->
<div id="app">

  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <i class="ti ti-building-factory-2" style="font-size:22px;color:var(--green);"></i>
      <span class="header-title">庇護工場 ERP</span>
    </div>
    <div class="header-right">
      <div id="sync-status" onclick="manualSync()" class="sync-badge" title="點擊手動同步">
        <i class="ti ti-cloud-off"></i>
        <span>離線</span>
      </div>
      <div class="role-dropdown-wrap">
        <button class="role-badge" id="header-role" onclick="toggleRoleMenu()"></button>
        <div class="role-dropdown" id="role-dropdown" style="display:none;">
          <div class="role-dropdown-current" id="role-dropdown-current"></div>
          <div class="role-dropdown-divider"></div>
          <button class="role-dropdown-item" onclick="escalateRole('manager')">
            <i class="ti ti-user-check"></i> 切換為主管
          </button>
          <button class="role-dropdown-item" onclick="escalateRole('admin')">
            <i class="ti ti-shield-check"></i> 切換為管理員
          </button>
          <button class="role-dropdown-item downgrade" onclick="downgradeToOperator()">
            <i class="ti ti-hard-hat"></i> 切換回操作員
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- 主內容 -->
  <main id="main-content">

    <!-- ══════════ 首頁（儀表板） ══════════ -->
    <div class="page active" id="page-home">
      <div class="page-header">
        <div class="page-title">
          <i class="ti ti-layout-dashboard"></i> 首頁
        </div>
      </div>
      <!-- 庫存警示 -->
      <div class="section-title"><i class="ti ti-alert-triangle"></i> 庫存警示</div>
      <div id="inventory-summary"></div>
      <!-- 待處理訂單 -->
      <div class="section-title" style="margin-top:14px;"><i class="ti ti-clock"></i> 待處理訂單</div>
      <div id="home-pending-orders"></div>
      <!-- 今日銷售 -->
      <div class="section-title" style="margin-top:14px;"><i class="ti ti-chart-bar"></i> 今日銷售</div>
      <div id="home-today-sales"></div>
      <!-- 快速操作 -->
      <div class="section-title" style="margin-top:14px;"><i class="ti ti-bolt"></i> 快速操作</div>
      <div class="quick-grid">
        <button class="quick-btn" onclick="initPOS(); showPage('pos-a')">
          <i class="ti ti-cash-register"></i>
          <span>A 門市 POS</span>
        </button>
        <button class="quick-btn" onclick="showPage('purchase')">
          <i class="ti ti-truck-loading"></i>
          <span>進貨</span>
        </button>
        <button class="quick-btn" onclick="showPage('production')">
          <i class="ti ti-player-play"></i>
          <span>生產</span>
        </button>
        <button class="quick-btn" onclick="showPage('orders')">
          <i class="ti ti-receipt-2"></i>
          <span>訂單</span>
        </button>
      </div>
    </div>

    <!-- ══════════ 銷售作業選單 ══════════ -->
    <div class="page" id="page-sales-menu">
      <div class="page-header">
        <div class="page-title"><i class="ti ti-shopping-cart"></i> 銷售作業</div>
      </div>
      <div class="submenu-grid">
        <button class="submenu-btn amber" onclick="initPOS(); showPage('pos-a')">
          <i class="ti ti-cash-register"></i>
          <span class="sb-name">A 門市 POS</span>
          <span class="sb-sub">現場收款</span>
        </button>
        <button class="submenu-btn amber" onclick="showPage('store-b-sales')">
          <i class="ti ti-store"></i>
          <span class="sb-name">B 門市銷售</span>
          <span class="sb-sub">每日輸入</span>
        </button>
        <button class="submenu-btn purple" onclick="showPage('estimates')">
          <i class="ti ti-file-description"></i>
          <span class="sb-name">估價單</span>
          <span class="sb-sub">純報價</span>
        </button>
        <button class="submenu-btn purple" onclick="showPage('orders')">
          <i class="ti ti-receipt-2"></i>
          <span class="sb-name">正式訂單</span>
          <span class="sb-sub">接單管理</span>
        </button>
        <button class="submenu-btn purple" onclick="showPage('events')">
          <i class="ti ti-map-pin"></i>
          <span class="sb-name">外展活動</span>
          <span class="sb-sub">展覽管理</span>
        </button>
        <button class="submenu-btn teal" onclick="showPage('customers')">
          <i class="ti ti-users"></i>
          <span class="sb-name">客戶管理</span>
          <span class="sb-sub">聯絡資料</span>
        </button>
        <button class="submenu-btn gray" onclick="showPage('sale-report')">
          <i class="ti ti-chart-bar"></i>
          <span class="sb-name">銷貨明細</span>
          <span class="sb-sub">查詢記錄</span>
        </button>
        <button class="submenu-btn gray" onclick="showPage('gift-orders')">
          <i class="ti ti-gift"></i>
          <span class="sb-name">贈品出庫</span>
          <span class="sb-sub">贈品/試吃</span>
        </button>
        <button class="submenu-btn teal" onclick="initCashReconcilePage();showPage('cash-reconcile')">
          <i class="ti ti-cash"></i>
          <span class="sb-name">每日對帳</span>
          <span class="sb-sub">現金核對</span>
        </button>
        <button class="submenu-btn purple" onclick="initSupplierReportPage();showPage('supplier-report')">
          <i class="ti ti-building-store"></i>
          <span class="sb-name">廠商銷售報表</span>
          <span class="sb-sub">寄賣結算</span>
        </button>
      </div>
    </div>

    <!-- ══════════ 工廠作業選單 ══════════ -->
    <div class="page" id="page-factory-menu">
      <div class="page-header">
        <div class="page-title"><i class="ti ti-building-factory-2"></i> 工廠作業</div>
      </div>
      <div class="submenu-grid">
        <button class="submenu-btn teal" onclick="showPage('purchase')">
          <i class="ti ti-truck-loading"></i>
          <span class="sb-name">進貨單</span>
          <span class="sb-sub">入庫作業</span>
        </button>
        <button class="submenu-btn teal" onclick="showPage('production')">
          <i class="ti ti-player-play"></i>
          <span class="sb-name">生產管理</span>
          <span class="sb-sub">加工生產</span>
        </button>
        <button class="submenu-btn teal" onclick="showPage('processing')">
          <i class="ti ti-clipboard-list"></i>
          <span class="sb-name">加工日報</span>
          <span class="sb-sub">每批投入產出</span>
        </button>
        <button class="submenu-btn teal" onclick="showPage('transfer')">
          <i class="ti ti-arrows-right-left"></i>
          <span class="sb-name">調貨單</span>
          <span class="sb-sub">A → B 門市</span>
        </button>
        <button class="submenu-btn gray" onclick="showPage('purchase-report')">
          <i class="ti ti-chart-line"></i>
          <span class="sb-name">進貨明細</span>
          <span class="sb-sub">查詢記錄</span>
        </button>
        <button class="submenu-btn amber" onclick="initExpiryPage();showPage('expiry')">
          <i class="ti ti-calendar-event"></i>
          <span class="sb-name">效期管理</span>
          <span class="sb-sub">食品到期追蹤</span>
        </button>
      </div>
    </div>

    <!-- ══════════ 庫存查詢 ══════════ -->
    <div class="page" id="page-inventory">
      <div class="page-header">
        <div class="page-title"><i class="ti ti-packages"></i> 庫存查詢</div>
      </div>
      <!-- 地點切換 -->
      <div class="loc-tabs" id="loc-tabs"></div>
      <!-- 搜尋 -->
      <div class="search-bar">
        <i class="ti ti-search"></i>
        <input type="search" id="inv-search"
          placeholder="搜尋商品名稱或編號..."
          oninput="renderInventoryPage()" />
      </div>
      <!-- 分類篩選 -->
      <div class="cat-filter" id="cat-filter"></div>
      <!-- 清單 -->
      <div id="inventory-list"></div>
    </div>

    <!-- ══════════ 估價單（列表）══════════ -->
    <div class="page" id="page-estimates">
      <div class="op-header">
        <button class="back-btn" onclick="showPage('sales-menu')"><i class="ti ti-arrow-left"></i></button>
        <div class="op-title"><i class="ti ti-file-description" style="color:#6B4FBB;"></i> 估價單</div>
        <button class="small-btn green-btn" onclick="newEstimate()"><i class="ti ti-plus"></i> 新增</button>
      </div>
      <div class="filter-tabs" id="estimate-filter-tabs">
        <button class="ftab active" onclick="renderEstimateList('all')">全部</button>
        <button class="ftab" onclick="renderEstimateList('draft')">草稿</button>
        <button class="ftab" onclick="renderEstimateList('pending')">待確認</button>
        <button class="ftab" onclick="renderEstimateList('converted')">已轉單</button>
        <button class="ftab" onclick="renderEstimateList('cancelled')">已取消</button>
      </div>
      <div id="estimate-list"></div>
    </div>

    <!-- ══════════ 估價單（編輯）══════════ -->
    <div class="page" id="page-estimate-edit">
      <div class="op-header">
        <button class="back-btn" onclick="showPage('estimates')"><i class="ti ti-arrow-left"></i></button>
        <div class="op-title" id="est-edit-title">新增估價單</div>
        <button class="small-btn" onclick="saveEstimateDraft()"><i class="ti ti-device-floppy"></i> 存草稿</button>
      </div>
      <div class="form-card">
        <!-- 單號與日期 -->
        <div class="form-meta-row">
          <span class="form-no" id="est-no">Q----</span>
          <span class="form-date" id="est-date"></span>
        </div>
        <!-- 客戶選擇 -->
        <div class="form-section-title">客戶</div>
        <button class="customer-select-btn" id="est-customer-btn" onclick="openCustomerPicker('estimate')">
          <i class="ti ti-user"></i>
          <span id="est-customer-name">選擇客戶</span>
          <i class="ti ti-chevron-right" style="margin-left:auto;"></i>
        </button>
        <div id="est-customer-info" class="customer-info-box" style="display:none;"></div>
        <!-- 品項 -->
        <div class="form-section-title" style="margin-top:14px;">品項</div>
        <div class="search-bar">
          <i class="ti ti-search"></i>
          <input type="search" id="est-item-search"
            placeholder="搜尋商品加入..."
            oninput="searchItemsFor('estimate', this.value)" />
        </div>
        <div id="est-item-search-result" style="display:none;"></div>
        <div class="order-list-header">
          <span class="order-list-title">已加入品項</span>
          <span class="order-count" id="est-item-count">0 項</span>
        </div>
        <div class="order-list" id="est-item-list">
          <div class="order-empty">尚未加入品項</div>
        </div>
        <!-- 金額 -->
        <div class="form-section-title" style="margin-top:14px;">金額</div>
        <div class="amount-section">
          <div class="amount-row"><span>小計</span><span id="est-subtotal">$0</span></div>
          <div class="amount-row discount-row">
            <span>整單折扣</span>
            <div class="discount-ctrl">
              <select id="est-discount-type" onchange="calcEstTotal()">
                <option value="none">無折扣</option>
                <option value="percent">百分比 %</option>
                <option value="amount">折扣金額 $</option>
              </select>
              <input type="number" id="est-discount-value" value="0" min="0"
                style="width:70px;" onchange="calcEstTotal()" />
            </div>
          </div>
          <div class="amount-row grand"><span>報價總金額</span><strong id="est-total">$0</strong></div>
        </div>
        <!-- 送貨方式 -->
        <div class="form-section-title" style="margin-top:14px;">送貨方式</div>
        <div class="delivery-btns">
          <button class="delivery-btn active" id="dm-pickup"   onclick="selectDelivery('pickup','est')">
            <i class="ti ti-walk"></i> 自取
          </button>
          <button class="delivery-btn" id="dm-delivery" onclick="selectDelivery('delivery','est')">
            <i class="ti ti-truck"></i> 宅配
          </button>
          <button class="delivery-btn" id="dm-personal" onclick="selectDelivery('personal','est')">
            <i class="ti ti-user-check"></i> 親送
          </button>
        </div>
        <!-- 有效期限與備註 -->
        <div class="cust-field" style="margin-top:12px;">
          <label>有效期限</label>
          <input type="date" id="est-valid-until" />
        </div>
        <div class="cust-field">
          <label>備註</label>
          <textarea id="est-remark" rows="2" placeholder="備註或特殊說明..."></textarea>
        </div>
      </div>
      <!-- 操作按鈕 -->
      <button class="confirm-btn" style="background:#6B4FBB;margin-top:4px;"
        onclick="confirmEstimate()">
        <i class="ti ti-send"></i> 送出估價單（待客戶確認）
      </button>
    </div>

    <!-- ══════════ 正式訂單（列表）══════════ -->
    <div class="page" id="page-orders">
      <div class="op-header">
        <button class="back-btn" onclick="showPage('sales-menu')"><i class="ti ti-arrow-left"></i></button>
        <div class="op-title"><i class="ti ti-receipt-2" style="color:#6B4FBB;"></i> 正式訂單</div>
        <button class="small-btn green-btn" onclick="newOrder()"><i class="ti ti-plus"></i> 新增</button>
      </div>
      <div class="filter-tabs">
        <button class="ftab active" onclick="renderOrderList('all')">全部</button>
        <button class="ftab" onclick="renderOrderList('pending')">待處理</button>
        <button class="ftab" onclick="renderOrderList('producing')">生產中</button>
        <button class="ftab" onclick="renderOrderList('ready')">待出貨</button>
        <button class="ftab" onclick="renderOrderList('shipped')">已出貨</button>
        <button class="ftab" onclick="renderOrderList('archived')">已結案</button>
      </div>
      <div id="order-list"></div>
    </div>

    <!-- ══════════ 生產管理（列表）══════════ -->
    <div class="page" id="page-production">
      <div class="op-header">
        <button class="back-btn" onclick="showPage('factory-menu')"><i class="ti ti-arrow-left"></i></button>
        <div class="op-title"><i class="ti ti-player-play" style="color:#1D9E75;"></i> 生產管理</div>
        <button class="small-btn green-btn" onclick="newProductionOrder()"><i class="ti ti-plus"></i> 新增</button>
      </div>
      <div class="filter-tabs">
        <button class="ftab active" onclick="renderProductionList('all')">全部</button>
        <button class="ftab" onclick="renderProductionList('prepare')">備料中</button>
        <button class="ftab" onclick="renderProductionList('producing')">生產中</button>
        <button class="ftab" onclick="renderProductionList('done')">已完成</button>
        <button class="ftab" onclick="renderProductionList('shipped')">已出貨</button>
      </div>
      <div id="production-list"></div>
    </div>

    <!-- ══════════ 進貨單 ══════════ -->
    <div class="page" id="page-purchase">
      <div class="op-header">
        <button class="back-btn" onclick="showPage('factory-menu')"><i class="ti ti-arrow-left"></i></button>
        <div class="op-title"><i class="ti ti-truck-loading" style="color:#1D9E75;"></i> 進貨單</div>
      </div>
      <div id="purchase-content">
        <!-- 由 purchase.js 渲染 -->
      </div>
    </div>

    <!-- ══════════ 調貨單 ══════════ -->
    <div class="page" id="page-transfer">
      <div class="op-header">
        <button class="back-btn" onclick="showPage('factory-menu')"><i class="ti ti-arrow-left"></i></button>
        <div class="op-title"><i class="ti ti-arrows-right-left" style="color:#1D9E75;"></i> 調貨單</div>
        <button class="small-btn green-btn" onclick="newTransfer()"><i class="ti ti-plus"></i> 新增</button>
      </div>
      <div id="transfer-list"></div>
    </div>

    <!-- ══════════ A 門市 POS ══════════ -->
    <div class="page" id="page-pos-a">
      <div class="op-header">
        <button class="back-btn" onclick="posBack()"><i class="ti ti-arrow-left"></i></button>
        <div class="op-title" id="pos-title">
          <i class="ti ti-cash-register" style="color:#BA7517;"></i> A 門市 POS
        </div>
        <button class="small-btn" onclick="clearPOS()"><i class="ti ti-trash"></i></button>
      </div>
      <!-- 外展 banner（外展模式時顯示）-->
      <div id="event-pos-banner" style="display:none;"></div>
      <!-- 商品搜尋 -->
      <div class="search-bar">
        <i class="ti ti-search"></i>
        <input type="search" id="pos-search"
          placeholder="搜尋商品或輸入編號..."
          oninput="searchItemsFor('pos', this.value)" />
      </div>
      <div id="pos-search-result" style="display:none;"></div>
      <!-- 購物車 -->
      <div class="order-list-header">
        <span class="order-list-title">購物車</span>
        <span class="order-count" id="pos-count">0 項</span>
      </div>
      <div class="order-list" id="pos-cart">
        <div class="order-empty">請搜尋或掃碼加入商品</div>
      </div>
      <!-- 金額 -->
      <div class="amount-section">
        <div class="amount-row"><span>小計</span><span id="pos-subtotal">$0</span></div>
        <div class="amount-row discount-row">
          <span>折扣</span>
          <div class="discount-ctrl">
            <select id="pos-discount-type" onchange="calcPOSTotal()">
              <option value="none">無折扣</option>
              <option value="percent">%</option>
              <option value="amount">$</option>
            </select>
            <input type="number" id="pos-discount-value" value="0" min="0"
              style="width:70px;" onchange="calcPOSTotal()" />
          </div>
        </div>
        <div class="amount-row grand"><span>應付</span><strong id="pos-total">$0</strong></div>
      </div>
      <!-- 付款 -->
      <div class="pay-method-btns">
        <button class="pay-method-btn active" id="pay-cash" onclick="selectPayMethod('cash')">
          <i class="ti ti-cash"></i> 現金
        </button>
        <button class="pay-method-btn" id="pay-card" onclick="selectPayMethod('card')">
          <i class="ti ti-credit-card"></i> 刷卡
        </button>
        <button class="pay-method-btn" id="pay-transfer" onclick="selectPayMethod('transfer')">
          <i class="ti ti-building-bank"></i> 轉帳
        </button>
      </div>
      <div id="cash-change-section" style="display:none;" class="cash-section">
        <div class="cust-field">
          <label>收款金額</label>
          <input type="number" id="pos-cash-received" placeholder="0"
            oninput="calcChange()" style="font-size:24px;" />
        </div>
        <div class="amount-row" style="font-size:18px;">
          <span>找零</span><strong id="pos-change">$0</strong>
        </div>
      </div>
      <button class="confirm-btn" style="background:#BA7517;margin-top:8px;"
        onclick="confirmPOS()">
        <i class="ti ti-check"></i> 確認收款
      </button>
    </div>

    <!-- ══════════ B 門市日銷售 ══════════ -->
    <div class="page" id="page-store-b-sales">
      <div class="op-header">
        <button class="back-btn" onclick="showPage('sales-menu')"><i class="ti ti-arrow-left"></i></button>
        <div class="op-title"><i class="ti ti-store" style="color:#BA7517;"></i> B 門市銷售輸入</div>
      </div>
      <div class="form-card">
        <div class="cust-field">
          <label>銷售日期</label>
          <input type="date" id="storeB-date" />
        </div>
        <div class="form-section-title">今日銷售品項（只輸入有賣的）</div>
        <div class="search-bar">
          <i class="ti ti-search"></i>
          <input type="search" id="storeB-search"
            placeholder="搜尋商品加入..."
            oninput="searchItemsFor('storeB', this.value)" />
        </div>
        <div id="storeB-search-result" style="display:none;"></div>
        <div class="order-list" id="storeB-item-list">
          <div class="order-empty">尚未加入品項</div>
        </div>
      </div>
      <button class="confirm-btn" style="background:#BA7517;" onclick="submitStoreBSale()">
        <i class="ti ti-check"></i> 確認送出
      </button>
    </div>

    <!-- ══════════ 外展活動 ══════════ -->
    <div class="page" id="page-events">
      <div class="op-header">
        <button class="back-btn" onclick="showPage('sales-menu')"><i class="ti ti-arrow-left"></i></button>
        <div class="op-title"><i class="ti ti-map-pin" style="color:#6B4FBB;"></i> 外展活動</div>
        <button class="small-btn green-btn" onclick="newEvent()"><i class="ti ti-plus"></i> 新增</button>
      </div>
      <div class="filter-tabs">
        <button class="ftab active" onclick="filterEvents('all')">全部</button>

<!-- 提升權限 Modal（方案B）-->
<div class="modal-overlay" id="escalateModal" style="display:none;" onclick="closeEscalateModal(event)">
  <div class="modal-card" style="max-width:320px;">
    <div class="modal-title" id="escalate-title">主管權限驗證</div>
    <div id="escalate-reason" style="font-size:13px;color:var(--text2);margin-bottom:14px;"></div>
    <div class="cust-field">
      <label>請輸入 PIN 碼</label>
      <input type="password" id="escalate-pin-input"
        style="font-size:28px;letter-spacing:8px;text-align:center;"
        maxlength="8" autocomplete="off" />
    </div>
    <div id="escalate-pin-error"
      style="display:none;color:var(--red);font-size:13px;text-align:center;margin-top:6px;">
      PIN 碼錯誤，請再試一次
    </div>
    <div class="modal-actions">
      <button class="modal-ok-btn" onclick="submitEscalatePin()">
        <i class="ti ti-arrow-right"></i> 確認
      </button>
      <button class="modal-cancel-btn" onclick="closeEscalateModal()">取消</button>
    </div>
  </div>
</div>

<!-- 修改 PIN Modal -->
<div class="modal-overlay" id="changePinModal" style="display:none;" onclick="closeChangePinModal(event)">
  <div class="modal-card" style="max-width:320px;">
    <div class="modal-title"><i class="ti ti-key"></i> 修改 PIN 碼</div>
    <div class="cust-form">
      <div class="cust-field">
        <label>修改哪個角色</label>
        <select id="change-pin-role" style="width:100%;padding:10px 12px;font-size:15px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);">
          <option value="manager">主管（4位以上）</option>
          <option value="admin">管理員（6位以上）</option>
        </select>
      </div>
      <div class="cust-field">
        <label>新 PIN 碼</label>
        <input type="password" id="new-pin-val" maxlength="8" />
      </div>
      <div class="cust-field">
        <label>確認新 PIN 碼</label>
        <input type="password" id="new-pin-confirm-val" maxlength="8" />
      </div>
    </div>
    <div id="pin-change-error" style="display:none;color:var(--red);font-size:13px;margin-top:6px;"></div>
    <div class="modal-actions">
      <button class="modal-ok-btn" onclick="submitChangePin()"><i class="ti ti-check"></i> 確認</button>
      <button class="modal-cancel-btn" onclick="closeChangePinModal()">取消</button>
    </div>
  </div>
</div>

<!-- 客戶選擇 Modal -->
<div class="modal-overlay" id="customerPickerModal" style="display:none;" onclick="closeCustomerPicker(event)">
  <div class="modal-card">
    <div class="modal-title"><i class="ti ti-users"></i> 選擇客戶</div>
    <div class="search-bar" style="margin-bottom:10px;">

    <button class="modal-cancel-btn" style="margin-top:10px;width:100%;"
      onclick="closeCustomerPicker()">取消</button>
  </div>
</div>
