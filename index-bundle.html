<script>
/* ── js/smartsearch.js ── */
// ============================================================
// smartsearch.js — 智慧搜尋元件（全域共用）
// 輸入編號前幾碼、名稱、分類關鍵字 → 即時跳出選項
// ============================================================

const SmartSearch = (() => {
  let _dropdown = null;
  let _callback = null;
  let _pool     = ALL_ITEMS;
  let _inputEl  = null;
  let _active   = -1;
  let _results  = [];

  // 分類提示
  const CAT_HINT = {
    '001':'清潔','002':'果乾/梅','003':'爆米花',
    '004':'咖啡','005':'茶葉',  '006':'無咖啡因',
    '007':'米糧','008':'零嘴',
  };

  function hint(item){
    return CAT_HINT[item.category] || (item.type === 'semi' ? '半成品' : item.type === 'packaging' ? '包材' : '');
  }

  function search(q, pool){
    if(!q) return [];
    q = q.toLowerCase().trim();
    const exact = pool.filter(i =>
      i.id?.toLowerCase().startsWith(q) ||
      i.barcode?.toLowerCase().startsWith(q)
    );
    const fuzzy = pool.filter(i =>
      !exact.includes(i) && (
        i.name?.toLowerCase().includes(q) ||
        hint(i).toLowerCase().includes(q)
      )
    );
    return [...exact, ...fuzzy].slice(0, 12);
  }

  function highlight(text, q){
    if(!q) return text;
    const idx = text.toLowerCase().indexOf(q.toLowerCase());
    if(idx < 0) return text;
    return text.slice(0,idx)
      + `<mark class="ss-mark">${text.slice(idx,idx+q.length)}</mark>`
      + text.slice(idx+q.length);
  }

  function getDropdown(inputEl){
    if(!_dropdown){
      _dropdown = document.createElement('div');
      _dropdown.className = 'ss-dropdown';
      document.body.appendChild(_dropdown);
      document.addEventListener('mousedown', e => {
        if(!_dropdown.contains(e.target) && e.target !== _inputEl) hide();
      });
    }
    // 定位
    const rect = inputEl.getBoundingClientRect();
    _dropdown.style.position = 'fixed';
    _dropdown.style.left     = rect.left + 'px';
    _dropdown.style.top      = (rect.bottom + 4) + 'px';
    _dropdown.style.width    = Math.max(rect.width, 280) + 'px';
    return _dropdown;
  }

  function render(results, q, locationId){
    _results = results;
    _active  = -1;
    const dd = _dropdown;
    dd.innerHTML = results.map((item, idx) => {
      const stock = locationId
        ? getStock(item.id, locationId)
        : getTotalStock(item.id);
      const qCls = stock <= 0 ? 'ss-qty-empty' : isLowStock(item.id) ? 'ss-qty-low' : 'ss-qty-ok';
      return `<div class="ss-item" data-idx="${idx}" onmousedown="SmartSearch._pick(${idx})">
        <span class="ss-emoji">${item.emoji || '📦'}</span>
        <div class="ss-info">
          <div class="ss-name">${highlight(item.name, q)}</div>
          <div class="ss-sub">${item.id}${hint(item) ? ' · ' + hint(item) : ''}</div>
        </div>
        <div class="${qCls} ss-stock">${stock}<span class="ss-unit">${item.unit || '個'}</span></div>
      </div>`;
    }).join('');
    dd.style.display = 'block';
  }

  function hide(){
    if(_dropdown) _dropdown.style.display = 'none';
    _results = []; _active = -1;
  }

  function _pick(idx){
    const item = _results[idx];
    if(!item) return;
    hide();
    if(typeof _callback === 'function') _callback(item);
  }

  function handleKey(e){
    if(!_dropdown || _dropdown.style.display === 'none') return;
    if(e.key === 'ArrowDown'){
      e.preventDefault();
      _active = Math.min(_active + 1, _results.length - 1);
      updateActive();
    } else if(e.key === 'ArrowUp'){
      e.preventDefault();
      _active = Math.max(_active - 1, 0);
      updateActive();
    } else if(e.key === 'Enter' && _active >= 0){
      e.preventDefault(); _pick(_active);
    } else if(e.key === 'Escape'){
      hide();
    }
  }

  function updateActive(){
    if(!_dropdown) return;
    _dropdown.querySelectorAll('.ss-item').forEach((el, i) => {
      el.classList.toggle('active', i === _active);
    });
  }

  // ── 公開 API ──
  function attach(inputEl, callback, opts = {}){
    _callback = callback;
    const pool = opts.pool || ALL_ITEMS;
    const loc  = opts.locationId || null;

    inputEl.addEventListener('input', e => {
      _inputEl = inputEl;
      const q  = e.target.value.trim();
      if(!q){ hide(); return; }
      const results = search(q, pool);
      if(!results.length){ hide(); return; }
      const dd = getDropdown(inputEl);
      render(results, q, loc);
    });
    inputEl.addEventListener('keydown', handleKey);
    inputEl.addEventListener('focus', e => {
      _inputEl = inputEl;
      const q  = inputEl.value.trim();
      if(q){
        const dd = getDropdown(inputEl);
        const results = search(q, pool);
        if(results.length) render(results, q, loc);
      }
    });
  }

  return { attach, hide, _pick };
})();

// ── 通用的「為不同情境搜尋商品」入口 ──
// context: 'estimate' | 'order' | 'pos' | 'storeB' | 'purchase' | 'production'
const _ssInstances = {};

function searchItemsFor(context, q){
  const resId = {
    estimate:   'est-item-search-result',
    order:      'order-item-search-result',
    pos:        'pos-search-result',
    storeB:     'storeB-search-result',
    purchase:   'purchase-search-result',
    production: 'prod-item-search-result',
    gift:       'gift-item-search-result',
    proc_in:    'proc-in-search-result',
    proc_out:   'proc-out-search-result',
  }[context];

  const poolMap = {
    estimate:   getSellableItems(),
    order:      getSellableItems(),
    pos:        getSellableItems(),
    storeB:     getSellableItems(),
    purchase:   getPurchasableItems(),
    production: FINISHED,
    gift:       ALL_ITEMS,
    proc_in:    ALL_ITEMS.filter(i => i.active !== false),   // 加工投入：全品項可選
    proc_out:   ALL_ITEMS.filter(i => i.active !== false),   // 加工產出：全品項可選
  };

  const res = document.getElementById(resId);
  if(!res) return;
  if(!q){ res.style.display = 'none'; return; }

  const pool    = poolMap[context] || ALL_ITEMS;
  const results = pool.filter(i =>
    i.name?.includes(q) || i.id?.toLowerCase().startsWith(q.toLowerCase())
  ).slice(0, 10);

  if(!results.length){ res.style.display = 'none'; return; }

  res.style.display = 'block';
  res.innerHTML = results.map(item => {
    const stock = getTotalStock(item.id);
    const qCls  = stock <= 0 ? 'ss-qty-empty' : isLowStock(item.id) ? 'ss-qty-low' : 'ss-qty-ok';
    return `<div class="ss-item" onmousedown="addItemTo('${context}','${item.id}')">
      <span class="ss-emoji">${item.emoji || '📦'}</span>
      <div class="ss-info">
        <div class="ss-name">${item.name}</div>
        <div class="ss-sub">${item.id}</div>
      </div>
      <div class="${qCls} ss-stock">${stock}</div>
    </div>`;
  }).join('');
}

// 統一的「加入品項」入口
function addItemTo(context, itemId){
  const resId = {
    estimate:   'est-item-search-result',
    order:      'order-item-search-result',
    pos:        'pos-search-result',
    storeB:     'storeB-search-result',
    purchase:   'purchase-search-result',
    production: 'prod-item-search-result',
    gift:       'gift-item-search-result',
    proc_in:    'proc-in-search-result',
    proc_out:   'proc-out-search-result',
  }[context];
  const searchId = {
    estimate:   'est-item-search',
    order:      'order-item-search',
    pos:        'pos-search',
    storeB:     'storeB-search',
    purchase:   'purchase-search',
    production: 'prod-item-search',
    gift:       'gift-item-search',
    proc_in:    'proc-in-search',
    proc_out:   'proc-out-search',
  }[context];

  const el = document.getElementById(resId);
  if(el) el.style.display = 'none';
  const si = document.getElementById(searchId);
  if(si) si.value = '';

  const fnMap = {
    estimate:   'addEstimateItem',
    order:      'addOrderItem',
    pos:        'addPOSItem',
    storeB:     'addStoreBItem',
    purchase:   'addPurchaseItem',
    production: 'addProductionItem',
    gift:       'addGiftItem',
    proc_in:    'addProcInputItem',
    proc_out:   'addProcOutputItem',
  };
  if(typeof window[fnMap[context]] === 'function') window[fnMap[context]](itemId);
}

</script>
<script>
/* ── js/inventory_ui.js ── */
// ============================================================
// inventory_ui.js — 庫存查詢頁面 UI
// ============================================================

let _invCurrentLoc = 'all';
let _invCurrentCat = 'all';

function renderInventoryPage(){
  renderLocTabs();
  renderCatFilter();
  renderInventoryList();
  renderInventorySummary();
}

// ── 地點標籤 ──
function renderLocTabs(){
  const el = document.getElementById('loc-tabs');
  if(!el) return;
  const tabs = [{ id:'all', name:'全部' }, ...getStoreLocations()];
  el.innerHTML = tabs.map(loc => `
    <button class="loc-tab ${_invCurrentLoc === loc.id ? 'active' : ''}"
      onclick="setInvLoc('${loc.id}')">
      ${loc.name}
    </button>`).join('');
}

function setInvLoc(locId){
  _invCurrentLoc = locId;
  renderLocTabs();
  renderInventoryList();
}

// ── 分類標籤 ──
function renderCatFilter(){
  const el = document.getElementById('cat-filter');
  if(!el) return;
  const cats = [{ id:'all', name:'全部', emoji:'📦' }, ...Object.entries(CATEGORIES).map(([id, v]) => ({ id, ...v }))];
  el.innerHTML = cats.map(c => `
    <button class="cat-tag ${_invCurrentCat === c.id ? 'active' : ''}"
      onclick="setInvCat('${c.id}')">
      ${c.emoji} ${c.name}
    </button>`).join('');
}

function setInvCat(catId){
  _invCurrentCat = catId;
  renderCatFilter();
  renderInventoryList();
}

// ── 商品列表 ──
function renderInventoryList(){
  const el = document.getElementById('inventory-list');
  if(!el) return;
  const q = document.getElementById('inv-search')?.value?.toLowerCase() || '';

  let items = FINISHED;

  // 分類篩選
  if(_invCurrentCat !== 'all'){
    items = items.filter(i => i.category === _invCurrentCat);
  }

  // 搜尋篩選
  if(q){
    items = items.filter(i =>
      i.name.toLowerCase().includes(q) ||
      i.id.toLowerCase().includes(q) ||
      i.barcode?.toLowerCase().includes(q)
    );
  }

  if(!items.length){
    el.innerHTML = `<div class="order-empty">找不到符合的商品</div>`;
    return;
  }

  el.innerHTML = items.map(item => {
    const stock = _invCurrentLoc === 'all'
      ? getTotalStock(item.id)
      : getStock(item.id, _invCurrentLoc);
    const cls   = stock <= 0 ? 'empty' : isLowStock(item.id) ? 'low' : 'ok';
    const locs  = _invCurrentLoc === 'all' ? getStockSummary(item.id) : [];

    return `<div class="inv-item" onclick="showItemDetail('${item.id}')">
      <div class="inv-item-emoji">${item.emoji}</div>
      <div class="inv-item-info">
        <div class="inv-item-name">${item.name}</div>
        <div class="inv-item-id">${item.id}
          ${locs.length > 1 ? locs.map(l => `<span style="color:var(--text3);">${l.locationName}:${l.qty}</span>`).join(' ') : ''}
        </div>
      </div>
      <div class="inv-item-right">
        <div class="inv-qty ${cls}">${stock}</div>
      </div>
    </div>`;
  }).join('');
}

// ── 商品詳細（Modal）──
function showItemDetail(productId){
  const item  = getItem(productId);
  if(!item) return;
  const locs  = getStoreLocations();
  const total = getTotalStock(productId);
  const bom   = BOM[productId] || [];

  let html = `
    <div style="text-align:center;margin-bottom:14px;">
      <div style="font-size:52px;">${item.emoji}</div>
      <div style="font-size:18px;font-weight:700;margin-top:8px;">${item.name}</div>
      <div style="font-size:13px;color:var(--text3);">${item.id}</div>
    </div>
    <div class="amount-section">`;

  // 各地點庫存
  locs.forEach(loc => {
    const qty = getStock(productId, loc.id);
    const cls = qty <= 0 ? 'inv-qty empty' : isLowStock(productId) ? 'inv-qty low' : 'inv-qty ok';
    html += `<div class="amount-row">
      <span>${loc.name}</span>
      <span class="${cls}" style="font-size:20px;">${qty}</span>
    </div>`;
  });

  html += `<div class="amount-row grand">
    <span>合計</span>
    <strong>${total}</strong>
  </div></div>`;

  // 商品資訊
  html += `<div class="form-card" style="margin-top:10px;">
    <div class="amount-row"><span>規格</span><span>${item.unit||'—'}</span></div>
    <div class="amount-row"><span>售價</span><span style="font-weight:700;color:var(--purple);">$${item.salePrice||0}</span></div>
    <div class="amount-row"><span>進貨價</span><span>$${item.costPrice||0}</span></div>
    <div class="amount-row"><span>安全庫存</span>
      <span style="color:${getTotalStock(item.id)<=(item.safetyStock||0)?'var(--red)':'var(--text)'};">
        ${item.safetyStock||0}
      </span>
    </div>
  </div>`;

  // BOM 組合
  if(bom.length){
    html += `<div class="section-title" style="margin-top:10px;"><i class="ti ti-git-merge"></i> 加工組合</div>`;
    html += bom.map(b => {
      const mat = getItem(b.materialId) || { emoji:'📦', name:b.materialId };
      return `<div class="inv-item" style="margin-bottom:6px;">
        <div class="inv-item-emoji">${mat.emoji}</div>
        <div class="inv-item-info">
          <div class="inv-item-name">${mat.name}</div>
          <div class="inv-item-id">每個需要 ${b.qty} ${mat.unit || '個'}</div>
        </div>
        <div class="inv-item-right">
          <div class="inv-qty ${getTotalStock(b.materialId)<=0?'empty':'ok'}">${getTotalStock(b.materialId)}</div>
          <div class="inv-unit">${mat.unit || '個'}</div>
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('item-detail-content').innerHTML = html;
  document.getElementById('item-detail-title').textContent = item.name;
  document.getElementById('itemDetailModal').style.display = 'flex';
}

// ── 初始化：在 HTML 插入 itemDetailModal ──
document.addEventListener('DOMContentLoaded', () => {
  // 加入商品詳細 Modal
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id        = 'itemDetailModal';
  modal.style.display = 'none';
  modal.onclick   = e => { if(e.target === modal) modal.style.display = 'none'; };
  modal.innerHTML = `
    <div class="modal-card">
      <div class="modal-title" id="item-detail-title"></div>
      <div id="item-detail-content"></div>
      <button class="redit-btn" onclick="document.getElementById('itemDetailModal').style.display='none'">
        關閉
      </button>
    </div>`;
  document.body.appendChild(modal);
});

</script>
<script>
/* ── js/home.js ── */
// ============================================================
// home.js — 首頁儀表板
// ============================================================

function renderHome(){
  renderInventorySummary();
  renderHomePendingOrders();
  renderHomeTodaySales();
}

// ── 待處理訂單 ──
function renderHomePendingOrders(){
  const el = document.getElementById('home-pending-orders');
  if(!el) return;

  const pending = (typeof orders !== 'undefined' ? orders : [])
    .filter(o => ['pending','producing','ready'].includes(o.status))
    .slice(0,5);

  if(!pending.length){
    el.innerHTML = `<div class="inv-ok"><i class="ti ti-circle-check"></i> 沒有待處理訂單</div>`;
    return;
  }

  const statusLabels = {
    pending:   '待處理',
    producing: '生產中',
    ready:     '待出貨',
  };
  const statusCls = {
    pending:   'badge-pending',
    producing: 'badge-active',
    ready:     'badge-done',
  };

  el.innerHTML = pending.map(o => `
    <div class="inv-warn-row" onclick="showOrderDetail('${o.id}')">
      <div>
        <div style="font-size:14px;font-weight:600;">${o.no}</div>
        <div style="font-size:12px;color:var(--text3);">${getCustomer(o.customerId)?.name || '—'}</div>
      </div>
      <div style="text-align:right;">
        <span class="status-badge ${statusCls[o.status]}">${statusLabels[o.status]}</span>
        ${o.deliveryDate ? `<div style="font-size:11px;color:var(--text3);margin-top:3px;">交期 ${fmtDate(o.deliveryDate)}</div>` : ''}
      </div>
    </div>`).join('');
}

// ── 今日銷售 ──
function renderHomeTodaySales(){
  const el = document.getElementById('home-today-sales');
  if(!el) return;

  const today = todayStr();
  const todayLogs = (typeof logs !== 'undefined' ? logs : []).filter(l => {
    if(!l.time) return false;
    const parts = l.time.match(/(\d+)\/(\d+)/);
    if(!parts) return false;
    const m = String(parts[1]).padStart(2,'0');
    const d = String(parts[2]).padStart(2,'0');
    return today.endsWith(`-${m}-${d}`) &&
      ['pos_sale','order_ship','event_sale'].includes(l.op);
  });

  // 計算今日金額
  const totalAmt = todayLogs.reduce((s,l) => {
    const item = getItem(l.productId);
    return s + (item?.salePrice || 0) * (l.qty || 0);
  }, 0);
  const txCount = [...new Set(todayLogs.map(l => l._ts ? Math.floor(l._ts/1000) : l.time))].length;

  el.innerHTML = `
    <div class="form-card">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div style="text-align:center;padding:12px;background:var(--amber-light);border-radius:var(--radius-sm);">
          <div style="font-size:26px;font-weight:700;color:var(--amber);">$${totalAmt.toLocaleString()}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px;">今日銷售額</div>
        </div>
        <div style="text-align:center;padding:12px;background:var(--green-light);border-radius:var(--radius-sm);">
          <div style="font-size:26px;font-weight:700;color:var(--green);">${txCount}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px;">交易筆數</div>
        </div>
      </div>
    </div>`;
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(renderHome, 200);
});

</script>
<script>
/* ── js/estimates.js ── */
// ============================================================
// estimates.js — 估價單管理（純報價，不含付款）
// ============================================================

let estimates = JSON.parse(localStorage.getItem('erp_estimates') || '[]');

function saveEstimates(){
  localStorage.setItem('erp_estimates', JSON.stringify(estimates));
  if(typeof pushToFirebase === 'function') pushToFirebase('estimates', estimates);
}

function getEstimate(id){ return estimates.find(e => e.id === id) || null; }

// ── 單號產生 ──
function genEstimateNo(){
  return genNo('Q', estimates, 'no');
}

// ── 狀態設定 ──
const EST_STATUS = {
  draft:     { label:'草稿',    cls:'badge-draft',     icon:'ti-pencil' },
  pending:   { label:'待確認',  cls:'badge-pending',   icon:'ti-clock' },
  converted: { label:'已轉單',  cls:'badge-converted', icon:'ti-check' },
  cancelled: { label:'已取消',  cls:'badge-cancelled', icon:'ti-x' },
};

function estStatusBadge(status){
  const s = EST_STATUS[status] || EST_STATUS.draft;
  return `<span class="status-badge ${s.cls}"><i class="ti ${s.icon}"></i> ${s.label}</span>`;
}

// ── 列表渲染 ──
let _estFilter = 'all';

function renderEstimateList(filter){
  _estFilter = filter || 'all';
  // 更新 tab active
  document.querySelectorAll('#page-estimates .ftab').forEach((btn, i) => {
    const filters = ['all','draft','pending','converted','cancelled'];
    btn.classList.toggle('active', filters[i] === _estFilter);
  });

  const el   = document.getElementById('estimate-list');
  if(!el) return;
  let list   = _estFilter === 'all' ? estimates : estimates.filter(e => e.status === _estFilter);
  list       = list.slice().reverse();

  if(!list.length){
    el.innerHTML = `<div class="order-empty">沒有符合的估價單</div>`;
    return;
  }

  el.innerHTML = list.map(e => {
    const cust   = getCustomer(e.customerId);
    const itemsStr = (e.items||[]).slice(0,2).map(i=>i.name).join('、')
      + ((e.items||[]).length > 2 ? ` 等${e.items.length}項` : '');
    return `<div class="list-card" onclick="openEstimateDetail('${e.id}')">
      <div class="list-card-top">
        <span class="list-card-no">${e.no}</span>
        ${estStatusBadge(e.status)}
      </div>
      <div class="list-card-meta">
        ${cust ? `<span><i class="ti ti-user"></i>${cust.name}</span>` : ''}
        <span><i class="ti ti-calendar"></i>${fmtDate(e.createdAt)}</span>
        ${e.validUntil ? `<span><i class="ti ti-clock"></i>效期 ${fmtDate(e.validUntil)}</span>` : ''}
      </div>
      <div class="list-card-items">${itemsStr || '無品項'}</div>
      <div class="list-card-footer">
        <span class="list-card-amount">${fmtMoney(e.total)}</span>
        <span style="font-size:12px;color:var(--text3);">${deliveryLabel(e.delivery)}</span>
      </div>
    </div>`;
  }).join('');
}

function deliveryLabel(d){
  return { pickup:'自取', delivery:'宅配', personal:'親送' }[d] || '';
}

// ── 新增估價單 ──
let _currentEst     = null;
let _estDelivery    = 'pickup';
let _estDiscountType  = 'none';

function newEstimate(){
  _currentEst = {
    id:        null,
    no:        genEstimateNo(),
    customerId:null,
    items:     [],
    subtotal:  0,
    discount:  { type:'none', value:0, reason:'' },
    total:     0,
    delivery:  'pickup',
    validUntil:'',
    remark:    '',
    status:    'draft',
    createdAt: todayStr(),
  };
  _estDelivery    = 'pickup';
  _estDiscountType = 'none';
  renderEstEditForm();
  showPage('estimate-edit');
}

// ── 開啟估價單（已確認的→唯讀預覽）──
function openEstimateDetail(id){
  const e = getEstimate(id);
  if(!e) return;

  if(e.status === 'pending' || e.status === 'converted' || e.status === 'cancelled'){
    // 待確認/已轉單/已取消：唯讀預覽頁（待確認可以轉單）
    _currentEst = JSON.parse(JSON.stringify(e));
    renderEstDetailPage();
    showPage('estimate-detail');
    return;
  }

  // 草稿：開編輯頁
  _currentEst      = JSON.parse(JSON.stringify(e));
  _estDelivery     = e.delivery || 'pickup';
  _estDiscountType = e.discount?.type || 'none';
  renderEstEditForm();
  showPage('estimate-edit');
}

// ── 渲染編輯表單 ──
function renderEstEditForm(){
  if(!_currentEst) return;
  const e = _currentEst;

  document.getElementById('est-edit-title').textContent = e.id ? e.no : '新增估價單';
  document.getElementById('est-no').textContent   = e.no;
  document.getElementById('est-date').textContent = fmtDate(e.createdAt);

  // 客戶
  const cust = getCustomer(e.customerId);
  const custBtn = document.getElementById('est-customer-btn');
  if(custBtn) document.getElementById('est-customer-name').textContent = cust ? cust.name : '選擇客戶';
  const custInfo = document.getElementById('est-customer-info');
  if(custInfo){
    if(cust){
      custInfo.style.display = 'block';
      custInfo.innerHTML = [
        cust.contact ? `👤 ${cust.contact}` : '',
        cust.tel     ? `📞 ${cust.tel}`     : '',
        cust.email   ? `✉️ ${cust.email}`   : '',
        cust.address ? `📍 ${cust.address}` : '',
      ].filter(Boolean).join('<br>');
    } else {
      custInfo.style.display = 'none';
    }
  }

  // 送貨方式
  ['pickup','delivery','personal'].forEach(m => {
    document.getElementById(`dm-${m}`)?.classList.toggle('active', m === _estDelivery);
  });

  // 折扣
  const discType = document.getElementById('est-discount-type');
  const discVal  = document.getElementById('est-discount-value');
  if(discType) discType.value = e.discount?.type  || 'none';
  if(discVal)  discVal.value  = e.discount?.value || 0;

  // 有效期限 / 備註
  const validEl  = document.getElementById('est-valid-until');
  const remarkEl = document.getElementById('est-remark');
  if(validEl)  validEl.value  = e.validUntil || '';
  if(remarkEl) remarkEl.value = e.remark     || '';

  renderEstItems();
  calcEstTotal();
}

// ── 客戶選擇 ──
function selectCustomerForEstimate(id){
  if(!_currentEst) return;
  _currentEst.customerId = id;
  renderEstEditForm();
}

// ── 品項管理 ──
function addEstimateItem(productId){
  const item = getItem(productId);
  if(!item) return;
  const existing = _currentEst.items.find(i => i.id === productId);
  if(existing){
    existing.qty++;
  } else {
    _currentEst.items.push({
      id:            productId,
      name:          item.name,
      emoji:         item.emoji,
      qty:           1,
      originalPrice: item.salePrice,
      unitPrice:     item.salePrice,  // 可手動改
      discount:      null,
    });
  }
  renderEstItems();
  calcEstTotal();
}

function removeEstimateItem(idx){
  _currentEst.items.splice(idx, 1);
  renderEstItems();
  calcEstTotal();
}

function changeEstItemQty(idx, delta){
  const item = _currentEst.items[idx];
  if(!item) return;
  item.qty = Math.max(1, item.qty + delta);
  renderEstItems();
  calcEstTotal();
}

function changeEstItemPrice(idx, val){
  const item  = _currentEst.items[idx];
  if(!item) return;
  const price = parseInt(val) || 0;
  item.unitPrice = price;
  item.discount  = price !== item.originalPrice
    ? { type:'item', value: item.originalPrice - price, reason:'手動改價' }
    : null;
  calcEstTotal();
}

function renderEstItems(){
  const el    = document.getElementById('est-item-list');
  const count = document.getElementById('est-item-count');
  if(!el) return;
  const items = _currentEst.items;
  if(count) count.textContent = items.length + ' 項';
  if(!items.length){
    el.innerHTML = `<div class="order-empty">尚未加入品項，請搜尋商品</div>`;
    return;
  }
  el.innerHTML = items.map((item, idx) => {
    const isDiscounted = item.unitPrice !== item.originalPrice;
    // 客製化品項
    if(item.isCustom){
      const hasImages = (item.images||[]).length > 0;
      return `<div class="order-row custom-item-row" onclick="openCustomItemModal('estimate',${idx})">
        <div class="order-emoji">🎁</div>
        <div class="order-info" style="flex:1;">
          <div class="order-name" style="display:flex;align-items:center;gap:6px;">
            ${item.name}
            <span style="font-size:10px;padding:2px 6px;background:var(--purple-light);
              color:var(--purple);border-radius:10px;">客製</span>
            ${hasImages?`<i class="ti ti-photo" style="font-size:14px;color:var(--text3);" title="${item.images.length}張照片"></i>`:''}
          </div>
          <div class="order-id">
            ${(item.materials||[]).length}種材料
            ${item.remark?`・${item.remark.slice(0,20)}${item.remark.length>20?'…':''}`:'' }
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-size:16px;font-weight:700;">x${item.qty}</div>
          <div style="font-size:13px;color:var(--purple);">$${item.unitPrice}</div>
        </div>
        <button class="order-del" onclick="event.stopPropagation();removeEstimateItem(${idx})">
          <i class="ti ti-x"></i>
        </button>
      </div>`;
    }
    return `<div class="order-row">
      <div class="order-emoji">${item.emoji}</div>
      <div class="order-info">
        <div class="order-name">${item.name}</div>
        <div class="order-id" style="display:flex;align-items:center;gap:8px;">
          <span style="text-decoration:${isDiscounted?'line-through':'none'};color:var(--text3);">
            $${item.originalPrice}
          </span>
          <input type="number" class="unit-price-input ${isDiscounted?'discounted':''}"
            value="${item.unitPrice}" min="0"
            onchange="changeEstItemPrice(${idx},this.value)"
            onclick="this.select()" />
        </div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeEstItemQty(${idx},-1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="changeEstItemQty(${idx},1)">＋</button>
      </div>
      <button class="order-del" onclick="removeEstimateItem(${idx})"><i class="ti ti-x"></i></button>
    </div>`;
  }).join('');
}

// ── 計算金額 ──
function calcEstTotal(){
  if(!_currentEst) return;
  const subtotal = (_currentEst.items || []).reduce((s, i) => s + i.unitPrice * i.qty, 0);
  const discType = document.getElementById('est-discount-type')?.value || 'none';
  const discVal  = parseInt(document.getElementById('est-discount-value')?.value) || 0;

  let total = subtotal;
  if(discType === 'percent') total = Math.round(subtotal * (1 - discVal / 100));
  if(discType === 'amount')  total = Math.max(0, subtotal - discVal);

  _currentEst.subtotal = subtotal;
  _currentEst.total    = total;
  _currentEst.discount = { type: discType, value: discVal };

  const subEl   = document.getElementById('est-subtotal');
  const totalEl = document.getElementById('est-total');
  if(subEl)   subEl.textContent   = fmtMoney(subtotal);
  if(totalEl) totalEl.textContent = fmtMoney(total);
}

// ── 送貨方式 ──
function selectDelivery(method, ctx){
  if(ctx === 'est' || ctx === undefined){
    _estDelivery = method;
    if(_currentEst) _currentEst.delivery = method;
    ['pickup','delivery','personal'].forEach(m =>
      document.getElementById(`dm-${m}`)?.classList.toggle('active', m === method));
  }
}

// ── 收集表單資料 ──
function collectEstForm(){
  if(!_currentEst) return;
  _currentEst.delivery   = _estDelivery;
  _currentEst.validUntil = document.getElementById('est-valid-until')?.value || '';
  _currentEst.remark     = document.getElementById('est-remark')?.value.trim() || '';
  calcEstTotal();
}

// ── 存草稿 ──
function saveEstimateDraft(){
  if(!_currentEst.customerId && !_currentEst.items.length){
    showToast('⚠️ 請先選擇客戶或加入品項');
    return;
  }
  collectEstForm();
  _currentEst.status = 'draft';
  upsertEstimate();
  showToast('📝 草稿已儲存：' + _currentEst.no);
}

// ── 送出估價單（待確認）──
function confirmEstimate(){
  if(!_currentEst.customerId){ showToast('⚠️ 請先選擇客戶'); return; }
  if(!_currentEst.items.length){ showToast('⚠️ 請先加入品項'); return; }
  collectEstForm();
  _currentEst.status = 'pending';
  upsertEstimate();
  showToast('✅ 估價單已送出：' + _currentEst.no);
  showPage('estimates');
}

// ── 儲存 ──
function upsertEstimate(){
  if(!_currentEst.id) _currentEst.id = 'E' + Date.now();
  const idx = estimates.findIndex(e => e.id === _currentEst.id);
  const copy = JSON.parse(JSON.stringify(_currentEst));
  if(idx >= 0) estimates[idx] = copy;
  else         estimates.push(copy);
  saveEstimates();
  renderEstimateList(_estFilter);
}

// ── 取消估價單 ──
function cancelEstimate(id){
  const e = getEstimate(id || _currentEst?.id);
  if(!e) return;
  if(!confirm(`確定取消估價單 ${e.no}？`)) return;
  e.status = 'cancelled';
  saveEstimates();
  showToast('❌ 估價單已取消');
  renderEstimateList(_estFilter);
  showPage('estimates');
}

// ── 轉為正式訂單 ──
function convertEstimateToOrder(id){
  const e = getEstimate(id || _currentEst?.id);
  if(!e) return;
  if(e.status !== 'pending'){
    showToast('⚠️ 只有「待確認」狀態的估價單才能轉單'); return;
  }
  // 建立正式訂單（由 orders.js 處理）
  if(typeof newOrderFromEstimate === 'function'){
    newOrderFromEstimate(e);
  } else {
    showToast('⚠️ 訂單模組尚未載入');
  }
}

// ── 詳細頁（唯讀）──
function renderEstDetailPage(){
  const e  = _currentEst;
  const el = document.getElementById('page-estimate-detail');
  if(!el) return;
  const cust = getCustomer(e.customerId);

  el.innerHTML = `
    <div class="op-header">
      <button class="back-btn" onclick="showPage('estimates')"><i class="ti ti-arrow-left"></i></button>
      <div class="op-title">${e.no}</div>
      ${e.status === 'pending'
        ? `<button class="small-btn green-btn" onclick="convertEstimateToOrder('${e.id}')">
             <i class="ti ti-receipt-2"></i> 轉正式訂單
           </button>`
        : ''}
    </div>

    <div class="form-card">
      <div class="form-meta-row">
        <span class="form-no">${e.no}</span>
        ${estStatusBadge(e.status)}
      </div>

      ${cust ? `<div class="cust-info-block" style="margin-bottom:12px;">
        <div style="font-weight:700;font-size:15px;margin-bottom:6px;">${cust.name}</div>
        ${cust.contact   ? `<div class="cust-info-row"><i class="ti ti-user"></i>${cust.contact}</div>` : ''}
        ${cust.tel       ? `<div class="cust-info-row"><i class="ti ti-phone"></i>${cust.tel}</div>` : ''}
        ${cust.address   ? `<div class="cust-info-row"><i class="ti ti-map-pin"></i>${cust.address}</div>` : ''}
      </div>` : ''}

      <div class="section-title"><i class="ti ti-package"></i> 品項</div>
      ${(e.items||[]).map(item => {
        if(item.isCustom){
          return `<div style="background:var(--purple-light);border:1px solid var(--purple-mid);
            border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
              <span style="font-size:24px;">🎁</span>
              <div style="flex:1;">
                <div style="font-size:15px;font-weight:700;">${item.name}
                  <span style="font-size:11px;background:var(--purple);color:white;
                    padding:2px 6px;border-radius:10px;margin-left:6px;">客製</span>
                </div>
                ${item.remark?`<div style="font-size:12px;color:var(--text2);margin-top:2px;">${item.remark}</div>`:''}
              </div>
              <div style="text-align:right;">
                <div style="font-size:16px;font-weight:700;">x${item.qty}</div>
                <div style="font-size:13px;color:var(--purple);font-weight:700;">${fmtMoney(item.unitPrice*item.qty)}</div>
              </div>
            </div>
            ${(item.materials||[]).length?`
            <div style="font-size:12px;color:var(--text2);margin-bottom:6px;">材料組合：</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px;">
              ${(item.materials||[]).map(m=>`
                <span style="padding:3px 8px;background:white;border:1px solid var(--border);
                  border-radius:10px;font-size:11px;">${m.emoji||'📦'} ${m.name} x${m.qty}</span>
              `).join('')}
            </div>`:''}
            ${(item.images||[]).length?`
            <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
              ${(item.images||[]).map(img=>`
                <img src="${img}" style="width:64px;height:64px;object-fit:cover;
                  border-radius:6px;border:1px solid var(--border);cursor:pointer;"
                  onclick="showFullImage(this.src)" />
              `).join('')}
            </div>`:''}
          </div>`;
        }
        return `<div class="order-row" style="cursor:default;">
          <div class="order-emoji">${item.emoji}</div>
          <div class="order-info">
            <div class="order-name">${item.name}</div>
            <div class="order-id">單價 ${fmtMoney(item.unitPrice)}
              ${item.unitPrice !== item.originalPrice
                ? `<span style="color:var(--amber);font-size:11px;">（原價 $${item.originalPrice}）</span>`
                : ''}
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-size:16px;font-weight:700;">${item.qty} 個</div>
            <div style="font-size:13px;color:var(--text2);">${fmtMoney(item.unitPrice*item.qty)}</div>
          </div>
        </div>`;
      }).join('')}

      <div class="amount-section" style="margin-top:10px;">
        <div class="amount-row"><span>小計</span><span>${fmtMoney(e.subtotal)}</span></div>
        ${e.discount?.type !== 'none' ? `
        <div class="amount-row">
          <span>折扣（${discountLabel(e.discount)}）</span>
          <span style="color:var(--red);">-${fmtMoney(e.subtotal - e.total)}</span>
        </div>` : ''}
        <div class="amount-row grand"><span>報價總金額</span><strong>${fmtMoney(e.total)}</strong></div>
      </div>

      <div class="amount-row" style="margin-top:10px;">
        <span>送貨方式</span><span>${deliveryLabel(e.delivery)}</span>
      </div>
      ${e.validUntil ? `<div class="amount-row"><span>有效期限</span><span>${fmtDate(e.validUntil)}</span></div>` : ''}
      ${e.remark     ? `<div class="amount-row"><span>備註</span><span>${e.remark}</span></div>` : ''}
    </div>

    ${e.status === 'pending' ? `
    <button class="confirm-btn" style="background:var(--purple);"
      onclick="convertEstimateToOrder('${e.id}')">
      <i class="ti ti-receipt-2"></i> 客戶確認，轉為正式訂單
    </button>
    <button class="redit-btn" onclick="cancelEstimate('${e.id}')">
      <i class="ti ti-x"></i> 取消此估價單
    </button>` : ''}

    ${e.status === 'converted' ? `
    <div class="form-card" style="margin-top:10px;background:var(--green-light);border-color:var(--green-mid);">
      <div style="font-size:13px;color:var(--green-dark);font-weight:600;margin-bottom:8px;">
        <i class="ti ti-circle-check"></i> 此估價單已轉為正式訂單
      </div>
      ${e.convertedOrderId ? `<button class="confirm-btn" style="background:var(--purple);margin-bottom:8px;"
        onclick="showOrderDetail('${e.convertedOrderId}')">
        <i class="ti ti-receipt-2"></i> 查看正式訂單 ${e.convertedOrderNo||''}
      </button>` : `<div style="font-size:12px;color:var(--text2);">訂單資料同步中，請稍後再查看</div>`}
    </div>` : ''}
    ${isAdmin() ? `
    <button class="redit-btn" style="margin-top:8px;color:var(--red);border-color:var(--red);"
      onclick="requireAdmin(()=>hardDeleteEstimate('${e.id}'),'刪除估價單需要管理員權限')">
      <i class="ti ti-trash"></i> 永久刪除估價單
    </button>` : ''}`;
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  renderEstimateList('all');
});

// ── 管理員永久刪除估價單 ──
function hardDeleteEstimate(id){
  if(!confirm('確定永久刪除此估價單？此操作無法復原。')) return;
  estimates = estimates.filter(e => e.id !== id);
  saveEstimates();
  showToast('🗑️ 估價單已刪除');
  renderEstimateList(_estFilter);
  showPage('estimates');
}

</script>
<script>
/* ── js/orders.js ── */
// ============================================================
// orders.js — 正式訂單管理
// ============================================================

let orders = JSON.parse(localStorage.getItem('erp_orders') || '[]');

function saveOrders(){
  localStorage.setItem('erp_orders', JSON.stringify(orders));
  if(typeof pushToFirebase === 'function') pushToFirebase('orders', orders);
}

function getOrder(id){ return orders.find(o => o.id === id) || null; }

function genOrderNo(){
  return genNo('SO', orders, 'no');
}

// ── 訂單狀態 ──
const ORDER_STATUS = {
  pending:   { label:'待處理', cls:'badge-pending',   icon:'ti-clock' },
  producing: { label:'生產中', cls:'badge-active',    icon:'ti-player-play' },
  ready:     { label:'待出貨', cls:'badge-done',      icon:'ti-package' },
  shipped:   { label:'已出貨', cls:'badge-shipped',   icon:'ti-truck' },
  archived:  { label:'已結案', cls:'badge-archived',  icon:'ti-archive' },
};

const PAY_STATUS = {
  unpaid:  { label:'未收款',   cls:'pay-badge-unpaid' },
  partial: { label:'部分收款', cls:'pay-badge-partial' },
  paid:    { label:'已收款',   cls:'pay-badge-paid' },
};

// ── 訂單類型 ──
const ORDER_TYPE_CFG = {
  retail:  { label:'零售', icon:'ti-receipt',   color:'#BA7517', bg:'#FAEEDA' },
  project: { label:'專案', icon:'ti-briefcase', color:'#6B4FBB', bg:'#EDE9F8' },
};

function orderTypeBadge(type){
  const t = ORDER_TYPE_CFG[type] || ORDER_TYPE_CFG.project;
  return `<span style="font-size:11px;padding:2px 8px;border-radius:20px;
    background:${t.bg};color:${t.color};font-weight:600;white-space:nowrap;">
    <i class="ti ${t.icon}"></i> ${t.label}
  </span>`;
}

function orderStatusBadge(status){
  const s = ORDER_STATUS[status] || ORDER_STATUS.pending;
  return `<span class="status-badge ${s.cls}"><i class="ti ${s.icon}"></i> ${s.label}</span>`;
}

function payStatusBadge(status){
  const s = PAY_STATUS[status] || PAY_STATUS.unpaid;
  return `<span class="status-badge ${s.cls}">${s.label}</span>`;
}

// ── 列表 ──
let _orderFilter     = 'all';
let _orderTypeFilter = 'all';  // 'all' | 'retail' | 'project'

function renderOrderList(filter, typeFilter){
  _orderFilter     = filter     || _orderFilter     || 'all';
  _orderTypeFilter = typeFilter || _orderTypeFilter || 'all';

  // 狀態 tabs
  document.querySelectorAll('#page-orders .ftab').forEach((btn, i) => {
    const filters = ['all','pending','producing','ready','shipped','archived'];
    btn.classList.toggle('active', filters[i] === _orderFilter);
  });

  // 類型篩選（動態插入一次）
  _ensureOrderTypeBar();
  document.querySelectorAll('#order-type-bar .type-ftab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.type === _orderTypeFilter);
  });

  const el = document.getElementById('order-list');
  if(!el) return;

  let list = _orderFilter === 'all'
    ? orders
    : orders.filter(o => o.status === _orderFilter);

  if(_orderTypeFilter !== 'all'){
    list = list.filter(o => (o.orderType || 'project') === _orderTypeFilter);
  }

  list = list.slice().reverse();

  if(!list.length){
    el.innerHTML = `<div class="order-empty">沒有符合的訂單</div>`;
    return;
  }

  el.innerHTML = list.map(o => {
    const cust     = getCustomer(o.customerId);
    const itemsStr = (o.items||[]).slice(0,2).map(i=>i.name).join('、')
      + ((o.items||[]).length > 2 ? ` 等${o.items.length}項` : '');
    return `<div class="list-card" onclick="showOrderDetail('${o.id}')">
      <div class="list-card-top">
        <span class="list-card-no">${o.no}</span>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          ${orderTypeBadge(o.orderType || 'project')}
          ${orderStatusBadge(o.status)}
          ${payStatusBadge(o.payStatus)}
        </div>
      </div>
      <div class="list-card-meta">
        ${cust ? `<span><i class="ti ti-user"></i>${cust.name}</span>` : ''}
        <span><i class="ti ti-calendar"></i>${fmtDate(o.createdAt)}</span>
        ${o.deliveryDate ? `<span><i class="ti ti-clock"></i>交期 ${fmtDate(o.deliveryDate)}</span>` : ''}
        ${o.estimateRef  ? `<span><i class="ti ti-link"></i>${o.estimateRef}</span>` : ''}
      </div>
      <div class="list-card-items">${itemsStr || '無品項'}</div>
      <div class="list-card-footer">
        <span class="list-card-amount">${fmtMoney(o.totalAmount)}</span>
        <span style="font-size:12px;color:var(--text3);">${deliveryLabel(o.delivery)}</span>
      </div>
    </div>`;
  }).join('');
}

function _ensureOrderTypeBar(){
  if(document.getElementById('order-type-bar')) return;
  const bar = document.createElement('div');
  bar.id        = 'order-type-bar';
  bar.style.cssText = 'display:flex;gap:6px;padding:0 4px 8px;';
  bar.innerHTML = `
    <button class="type-ftab active" data-type="all"
      onclick="renderOrderList(null,'all')"
      style="font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);
      background:var(--surface);color:var(--text2);cursor:pointer;">全部類型</button>
    <button class="type-ftab" data-type="retail"
      onclick="renderOrderList(null,'retail')"
      style="font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid #FAEEDA;
      background:var(--bg);color:#BA7517;cursor:pointer;">
      <i class="ti ti-receipt"></i> 零售</button>
    <button class="type-ftab" data-type="project"
      onclick="renderOrderList(null,'project')"
      style="font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid #EDE9F8;
      background:var(--bg);color:#6B4FBB;cursor:pointer;">
      <i class="ti ti-briefcase"></i> 專案</button>`;
  const orderList = document.getElementById('order-list');
  if(orderList) orderList.before(bar);
}

// ── 從估價單建立訂單（固定為專案類型）──
function newOrderFromEstimate(estimate){
  const o = {
    id:          null,
    no:          genOrderNo(),
    orderType:   'project',
    source:      'phone',
    estimateRef: estimate.no,
    estimateId:  estimate.id,
    customerId:  estimate.customerId,
    items:       estimate.items.map(i => ({
      id:            i.id,
      name:          i.name,
      emoji:         i.emoji,
      qty:           i.qty,
      originalPrice: i.originalPrice,
      unitPrice:     i.unitPrice,
      discount:      i.discount || null,
      shippedQty:    0,
      producedQty:   0,
    })),
    subtotal:      estimate.subtotal,
    totalAmount:   estimate.total,
    orderDiscount: estimate.discount,
    deposit:       0,
    depositPaid:   false,
    paidAmount:    0,
    payStatus:     'unpaid',
    delivery:      estimate.delivery,
    logistics:     '',
    trackingNo:    '',
    deliveryDate:  '',
    shippedAt:     '',
    remark:        estimate.remark || '',
    status:        'pending',
    createdAt:     todayStr(),
    updatedAt:     todayStr(),
  };

  _currentOrder = o;

  // 標記估價單為已轉單（先記錄，轉單後才能在估價單看到連結）
  const est = typeof estimates !== 'undefined' ? estimates.find(e => e.id === estimate.id) : null;
  if(est){
    est.status           = 'converted';
    est.convertedOrderId = null; // 先設 null，存檔後再更新
    est.convertedOrderNo = o.no;
    if(typeof saveEstimates === 'function') saveEstimates();
  }

  renderOrderEditPage();
  showPage('order-edit');
}

// ── 手動新增訂單：先選類型 ──
function newOrder(){
  const existing = document.getElementById('orderTypeModal');
  if(existing) existing.remove();
  const modal = document.createElement('div');
  modal.className     = 'modal-overlay';
  modal.id            = 'orderTypeModal';
  modal.style.display = 'flex';
  modal.onclick = e => { if(e.target === modal) modal.remove(); };
  modal.innerHTML = `
    <div class="modal-card" style="max-width:340px;">
      <div class="modal-title"><i class="ti ti-plus"></i> 新增訂單</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:14px;">請選擇訂單類型</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px;">
        <button onclick="document.getElementById('orderTypeModal').remove();_createNewOrder('retail')"
          style="padding:18px 12px;border-radius:var(--radius);border:2px solid #FAEEDA;
          background:#FFFDF7;color:#7B341E;cursor:pointer;text-align:center;">
          <i class="ti ti-receipt" style="font-size:28px;display:block;margin-bottom:6px;color:#BA7517;"></i>
          <div style="font-weight:700;font-size:14px;margin-bottom:4px;">零售訂單</div>
          <div style="font-size:11px;color:#975A16;">電話/門市接單<br>現貨出貨</div>
        </button>
        <button onclick="document.getElementById('orderTypeModal').remove();_createNewOrder('project')"
          style="padding:18px 12px;border-radius:var(--radius);border:2px solid #EDE9F8;
          background:#F9F7FE;color:#44337A;cursor:pointer;text-align:center;">
          <i class="ti ti-briefcase" style="font-size:28px;display:block;margin-bottom:6px;color:#6B4FBB;"></i>
          <div style="font-weight:700;font-size:14px;margin-bottom:4px;">專案接單</div>
          <div style="font-size:11px;color:#553C9A;">客製/大宗/禮盒<br>需生產或交期</div>
        </button>
      </div>
      <button class="modal-cancel-btn" style="margin-top:10px;width:100%;"
        onclick="document.getElementById('orderTypeModal').remove()">取消</button>
    </div>`;
  document.body.appendChild(modal);
}

function _createNewOrder(type){
  _currentOrder = {
    id:            null,
    no:            genOrderNo(),
    orderType:     type,
    source:        'phone',
    estimateRef:   '',
    estimateId:    null,
    customerId:    null,
    items:         [],
    subtotal:      0,
    totalAmount:   0,
    orderDiscount: { type:'none', value:0 },
    deposit:       0,
    depositPaid:   false,
    paidAmount:    0,
    payStatus:     'unpaid',
    delivery:      type === 'retail' ? 'pickup' : 'delivery',
    logistics:     '',
    trackingNo:    '',
    deliveryDate:  '',
    shippedAt:     '',
    remark:        '',
    status:        'pending',
    createdAt:     todayStr(),
    updatedAt:     todayStr(),
  };
  renderOrderEditPage();
  showPage('order-edit');
}

// ── 訂單編輯頁 ──
let _currentOrder = null;

function renderOrderEditPage(){
  const page = document.getElementById('page-order-edit');
  if(!page) return;
  const o        = _currentOrder;
  const cust     = getCustomer(o.customerId);
  const isRetail = (o.orderType || 'project') === 'retail';
  const isLocked     = o.status === 'archived' && !isManager();
  const isItemLocked = o.status !== 'pending' && !isAdmin();  // 確認後品項鎖定，管理員可解
  // 管理員強制編輯中（非草稿狀態）
  const adminOverride = isAdmin() && o.status !== 'pending';

  page.innerHTML = `
    <div class="op-header">
      <button class="back-btn" onclick="showPage('orders')"><i class="ti ti-arrow-left"></i></button>
      <div class="op-title">${o.id ? o.no : '新增訂單'}</div>
      ${!isLocked
        ? `<button class="small-btn green-btn" onclick="saveOrderDraft()">
             <i class="ti ti-device-floppy"></i> 儲存
           </button>`
        : `<span class="status-badge badge-archived" style="font-size:12px;">
             <i class="ti ti-lock"></i> 已結案
           </span>`}
    </div>

    ${adminOverride ? `
    <div style="padding:8px 12px;background:#FFF3CD;border-radius:var(--radius-sm);
      font-size:12px;color:#856404;margin-bottom:6px;display:flex;align-items:center;gap:6px;">
      <i class="ti ti-shield-lock"></i> 管理員覆寫模式 — 所有欄位與品項均可修改
    </div>` : ''}

    <div class="form-card">
      <!-- 單號 / 類型 -->
      <div class="form-meta-row">
        <span class="form-no">${o.no}</span>
        <div style="display:flex;gap:6px;align-items:center;">
          ${orderTypeBadge(o.orderType || 'project')}
          <span class="form-date">${fmtDate(o.createdAt)}</span>
        </div>
      </div>
      ${o.estimateRef ? `
      <div style="padding:8px 12px;background:var(--purple-light);border-radius:var(--radius-sm);
        font-size:13px;color:var(--purple);margin-bottom:10px;
        display:flex;align-items:center;gap:6px;cursor:pointer;"
        onclick="openEstimateById('${o.estimateId}')">
        <i class="ti ti-link"></i> 來源估價單：${o.estimateRef}
        <i class="ti ti-chevron-right" style="margin-left:auto;"></i>
      </div>` : ''}

      <!-- 訂單來源 -->
      <div class="cust-field">
        <label>訂單來源</label>
        <select id="ord-source" ${isLocked?'disabled':''}>
          <option value="phone"  ${o.source==='phone'  ?'selected':''}>電話</option>
          <option value="online" ${o.source==='online' ?'selected':''}>網路</option>
          <option value="walkin" ${o.source==='walkin' ?'selected':''}>門市</option>
        </select>
      </div>

      <!-- 客戶 -->
      <div class="form-section-title">客戶</div>
      <button class="customer-select-btn" ${isLocked?'disabled':''}
        onclick="openCustomerPicker('order')">
        <i class="ti ti-user"></i>
        <span id="ord-customer-name">${cust ? cust.name : '選擇客戶'}</span>
        <i class="ti ti-chevron-right" style="margin-left:auto;"></i>
      </button>
      ${cust ? `<div class="customer-info-box" style="margin-top:6px;">
        ${[cust.contact?`👤 ${cust.contact}`:'', cust.tel?`📞 ${cust.tel}`:''].filter(Boolean).join('<br>')}
      </div>` : ''}

      <!-- 品項 -->
      <div class="form-section-title" style="margin-top:14px;">品項</div>
      ${!isItemLocked ? `<div class="search-bar">
        <i class="ti ti-search"></i>
        <input type="search" id="order-item-search" placeholder="搜尋商品加入..."
          oninput="searchItemsFor('order',this.value)" />
      </div>
      <div id="order-item-search-result" style="display:none;"></div>` : `
      <div style="padding:8px 12px;background:var(--amber-light);border-radius:var(--radius-sm);
        font-size:12px;color:var(--amber);display:flex;align-items:center;gap:6px;margin-bottom:8px;">
        <i class="ti ti-lock"></i> 訂單已確認，品項與金額已鎖定。如需修改請聯絡管理員。
      </div>`}
      <div class="order-list-header">
        <span class="order-list-title">品項清單</span>
        <span class="order-count" id="ord-item-count">${o.items.length} 項</span>
      </div>
      <div class="order-list" id="ord-item-list"></div>

      <!-- 金額 -->
      <div class="form-section-title" style="margin-top:14px;">金額</div>
      <div class="amount-section">
        <div class="amount-row"><span>小計</span><span id="ord-subtotal">${fmtMoney(o.subtotal)}</span></div>
        <div class="amount-row discount-row">
          <span>整單折扣</span>
          <div class="discount-ctrl">
            <select id="ord-discount-type" ${isItemLocked||isLocked?'disabled':''} onchange="calcOrderTotal()">
              <option value="none"    ${o.orderDiscount?.type==='none'   ?'selected':''}>無折扣</option>
              <option value="percent" ${o.orderDiscount?.type==='percent'?'selected':''}>% 折扣</option>
              <option value="amount"  ${o.orderDiscount?.type==='amount' ?'selected':''}>$ 折抵</option>
            </select>
            <input type="number" id="ord-discount-value"
              value="${o.orderDiscount?.value||0}" min="0"
              ${isItemLocked||isLocked?'disabled':''} onchange="calcOrderTotal()"
              style="width:70px;" />
          </div>
        </div>
        <div class="amount-row grand">
          <span>訂單總金額</span><strong id="ord-total">${fmtMoney(o.totalAmount)}</strong>
        </div>
      </div>

      <!-- 付款 -->
      <div class="form-section-title" style="margin-top:14px;">付款</div>
      <div class="amount-section">
        ${!isRetail ? `
        <div class="amount-row">
          <span>訂金</span>
          <input type="number" id="ord-deposit" value="${o.deposit||0}" min="0"
            ${isLocked?'disabled':''} onchange="updateOrderPay()"
            style="width:100px;padding:5px 8px;font-size:15px;border:1px solid var(--border);
            border-radius:6px;text-align:right;background:var(--bg);color:var(--text);" />
        </div>
        <div class="amount-row">
          <span>訂金已收</span>
          <label style="display:flex;align-items:center;gap:8px;">
            <input type="checkbox" id="ord-deposit-paid" ${o.depositPaid?'checked':''}
              ${isLocked?'disabled':''} onchange="updateOrderPay()" />
            <span>已收</span>
          </label>
        </div>` : ''}
        <div class="amount-row">
          <span>付款狀態</span>
          <div style="display:flex;gap:6px;">
            ${['unpaid','partial','paid'].map(ps => {
              const labels = { unpaid:'未收款', partial:'部分收款', paid:'已收款' };
              return `<button class="pay-status-btn ${o.payStatus===ps?'active':''}"
                id="ord-pay-${ps}" ${isLocked?'disabled':''}
                onclick="setOrderPayStatus('${ps}')">
                ${labels[ps]}
              </button>`;
            }).join('')}
          </div>
        </div>
        <div id="ord-partial-row" style="display:${o.payStatus==='partial'?'flex':'none'};"
          class="amount-row">
          <span>已收金額</span>
          <input type="number" id="ord-paid-amount" value="${o.paidAmount||0}" min="0"
            ${isLocked?'disabled':''}
            style="width:100px;padding:5px 8px;font-size:15px;border:1px solid var(--border);
            border-radius:6px;text-align:right;background:var(--bg);color:var(--text);" />
        </div>
      </div>

      <!-- 出貨資訊 -->
      <div class="form-section-title" style="margin-top:14px;">出貨資訊</div>
      <div class="delivery-btns">
        <button class="delivery-btn ${o.delivery==='pickup'  ?'active':''}"
          id="ord-dm-pickup"   ${isLocked?'disabled':''} onclick="setOrderDelivery('pickup')">
          <i class="ti ti-walk"></i> 自取
        </button>
        <button class="delivery-btn ${o.delivery==='delivery'?'active':''}"
          id="ord-dm-delivery" ${isLocked?'disabled':''} onclick="setOrderDelivery('delivery')">
          <i class="ti ti-truck"></i> 宅配
        </button>
        <button class="delivery-btn ${o.delivery==='personal'?'active':''}"
          id="ord-dm-personal" ${isLocked?'disabled':''} onclick="setOrderDelivery('personal')">
          <i class="ti ti-user-check"></i> 親送
        </button>
      </div>
      <div class="cust-field" style="margin-top:10px;">
        <label>客戶要求交期</label>
        <input type="date" id="ord-delivery-date" value="${o.deliveryDate||''}"
          ${isLocked?'disabled':''} />
      </div>
      <div class="cust-field">
        <label>物流平台</label>
        <input type="text" id="ord-logistics" value="${o.logistics||''}"
          placeholder="黑貓 / 7-11 / 蝦皮 / 郵局..."
          ${isLocked?'disabled':''} />
      </div>
      <div class="cust-field">
        <label>物流單號</label>
        <input type="text" id="ord-tracking" value="${o.trackingNo||''}"
          placeholder="填入物流追蹤單號..."
          ${isLocked?'disabled':''} />
      </div>
      <div class="cust-field">
        <label>備註</label>
        <textarea id="ord-remark" rows="2" ${isLocked?'disabled':''}>${o.remark||''}</textarea>
      </div>
    </div>

    <!-- 生產單連結（僅專案訂單）-->
    ${!isRetail ? (() => {
      const relProd = typeof productionOrders !== 'undefined'
        ? productionOrders.filter(p => p.sourceOrderId === o.id)
        : [];
      if(!relProd.length) return '';
      return `<div class="section-title" style="margin-top:14px;">
        <i class="ti ti-player-play"></i> 相關生產單
      </div>` + relProd.map(p => {
        const step = typeof stepOf === 'function' ? stepOf(p.status) : {label:p.status,color:'#666',bg:'#eee'};
        return `<div class="inv-warn-row" onclick="showProdDetail('${p.id}')">
          <div>
            <div style="font-size:14px;font-weight:600;">${p.no}</div>
            <div style="font-size:12px;color:var(--text3);">${(p.items||[]).map(i=>i.name).join('、')}</div>
          </div>
          <span class="status-badge" style="background:${step.bg};color:${step.color};">
            ${step.label}
          </span>
        </div>`;
      }).join('');
    })() : ''}

    <!-- 操作按鈕 -->
    ${o.status === 'pending' ? `
    <button class="confirm-btn" style="background:var(--purple);margin-top:8px;"
      onclick="confirmOrder()">
      <i class="ti ti-check"></i> 確認訂單
    </button>` : ''}
    ${o.status === 'ready' ? `
    <button class="confirm-btn" style="background:var(--green);margin-top:8px;"
      onclick="shipOrder('${o.id}')">
      <i class="ti ti-truck"></i> 標記出貨
    </button>` : ''}
    ${o.status === 'shipped' ? `
    <button class="confirm-btn" style="background:#185FA5;margin-top:8px;"
      onclick="archiveOrder('${o.id}')">
      <i class="ti ti-archive"></i> 結案
    </button>` : ''}
    ${isLocked && isManager() ? `
    <button class="redit-btn" style="margin-top:8px;"
      onclick="requireManager(()=>forceUnlockOrder('${o.id}'),'解鎖訂單需要主管權限')">
      <i class="ti ti-lock-open"></i> 主管解鎖訂單
    </button>` : ''}
    ${!isLocked && isManager() ? `
    <button class="redit-btn" style="margin-top:8px;color:var(--amber);border-color:var(--amber);"
      onclick="requireManager(()=>cancelOrder('${o.id}'),'取消訂單需要主管權限')">
      <i class="ti ti-ban"></i> 取消訂單（保留記錄）
    </button>` : ''}
    ${isAdmin() ? `
    <button class="redit-btn" style="margin-top:8px;color:var(--red);border-color:var(--red);"
      onclick="requireAdmin(()=>hardDeleteOrder('${o.id}'))">
      <i class="ti ti-trash"></i> 永久刪除訂單
    </button>` : ''}`;

  renderOrderItems();
}

// ── 客戶選擇（給 order）──
function selectCustomerForOrder(id){
  if(!_currentOrder) return;
  _currentOrder.customerId = id;
  renderOrderEditPage();
}

// ── 品項管理 ──
function addOrderItem(productId){
  const item = getItem(productId);
  if(!item) return;
  const existing = _currentOrder.items.find(i => i.id === productId);
  if(existing){ existing.qty++; }
  else {
    const price = item.salePrice || 0;
    _currentOrder.items.push({
      id:            productId,
      name:          item.name,
      emoji:         item.emoji,
      qty:           1,
      originalPrice: price,
      unitPrice:     price,
      discount:      null,
      shippedQty:    0,
      producedQty:   0,
    });
    if(!price){
      showToast('⚠️ 此品項尚未設定售價，請手動填入單價');
    }
  }
  renderOrderItems();
  calcOrderTotal();
}

function removeOrderItem(idx){
  _currentOrder.items.splice(idx, 1);
  renderOrderItems();
  calcOrderTotal();
}

function changeOrderItemQty(idx, delta){
  const item = _currentOrder.items[idx];
  if(!item) return;
  item.qty = Math.max(1, item.qty + delta);
  renderOrderItems();
  calcOrderTotal();
}

function changeOrderItemPrice(idx, val){
  const item  = _currentOrder.items[idx];
  if(!item) return;
  item.unitPrice = parseInt(val) || 0;
  item.discount  = item.unitPrice !== item.originalPrice
    ? { type:'item', value: item.originalPrice - item.unitPrice, reason:'手動改價' }
    : null;
  calcOrderTotal();
}

function renderOrderItems(){
  const el    = document.getElementById('ord-item-list');
  const count = document.getElementById('ord-item-count');
  if(!el || !_currentOrder) return;
  const items        = _currentOrder.items;
  const isLocked     = _currentOrder.status === 'archived' && !isManager();
  const isItemLocked = _currentOrder.status !== 'pending' && !isAdmin();
  if(count) count.textContent = items.length + ' 項';
  if(!items.length){
    el.innerHTML = `<div class="order-empty">尚未加入品項</div>`;
    return;
  }
  el.innerHTML = items.map((item, idx) => {
    const isDis = item.unitPrice !== item.originalPrice;
    return `<div class="order-row">
      <div class="order-emoji">${item.emoji}</div>
      <div class="order-info">
        <div class="order-name">${item.name}</div>
        <div class="order-id" style="display:flex;align-items:center;gap:6px;">
          ${isDis?`<span style="text-decoration:line-through;color:var(--text3);font-size:11px;">$${item.originalPrice}</span>`:''}
          ${isLocked
            ? `<span style="font-weight:700;${item.unitPrice===0?'color:var(--red);':''}">${item.unitPrice===0?'⚠️ ':''}$${item.unitPrice}</span>`
            : `<input type="number" class="unit-price-input ${isDis?'discounted':''}"
                value="${item.unitPrice}" min="0"
                style="${(!item.unitPrice && item.unitPrice!==undefined)?'border-color:var(--amber);background:#FFFBF0;':''}"
                onchange="changeOrderItemPrice(${idx},this.value)"
                onclick="this.select()" title="${!item.unitPrice?'尚未設定售價，請填入':''}" />`}
        </div>
      </div>
      <div class="qty-ctrl">
        ${isLocked||isItemLocked
          ? `<span class="qty-num">${item.qty}</span>`
          : `<button class="qty-btn" onclick="changeOrderItemQty(${idx},-1)">−</button>
             <span class="qty-num">${item.qty}</span>
             <button class="qty-btn" onclick="changeOrderItemQty(${idx},1)">＋</button>`}
      </div>
      ${isLocked||isItemLocked ? '' : `<button class="order-del" onclick="removeOrderItem(${idx})"><i class="ti ti-x"></i></button>`}
    </div>`;
  }).join('');
}

// ── 計算金額 ──
function calcOrderTotal(){
  if(!_currentOrder) return;
  const subtotal  = _currentOrder.items.reduce((s,i) => s + i.unitPrice * i.qty, 0);
  const discType  = document.getElementById('ord-discount-type')?.value  || 'none';
  const discValue = parseInt(document.getElementById('ord-discount-value')?.value) || 0;
  let total       = subtotal;
  if(discType === 'percent') total = Math.round(subtotal * (1 - discValue/100));
  if(discType === 'amount')  total = Math.max(0, subtotal - discValue);

  _currentOrder.subtotal      = subtotal;
  _currentOrder.totalAmount   = total;
  _currentOrder.orderDiscount = { type: discType, value: discValue };

  const subEl   = document.getElementById('ord-subtotal');
  const totalEl = document.getElementById('ord-total');
  if(subEl)   subEl.textContent   = fmtMoney(subtotal);
  if(totalEl) totalEl.textContent = fmtMoney(total);
}

// ── 付款狀態 ──
function setOrderPayStatus(status){
  if(!_currentOrder) return;
  _currentOrder.payStatus = status;
  ['unpaid','partial','paid'].forEach(s => {
    document.getElementById(`ord-pay-${s}`)?.classList.toggle('active', s === status);
  });
  const partialRow = document.getElementById('ord-partial-row');
  if(partialRow) partialRow.style.display = status === 'partial' ? 'flex' : 'none';
}

function updateOrderPay(){
  if(!_currentOrder) return;
  _currentOrder.deposit      = parseInt(document.getElementById('ord-deposit')?.value) || 0;
  _currentOrder.depositPaid  = document.getElementById('ord-deposit-paid')?.checked || false;
}

// ── 送貨方式 ──
function setOrderDelivery(method){
  if(!_currentOrder) return;
  _currentOrder.delivery = method;
  ['pickup','delivery','personal'].forEach(m =>
    document.getElementById(`ord-dm-${m}`)?.classList.toggle('active', m === method));
}

// ── 收集表單資料 ──
function collectOrderForm(){
  if(!_currentOrder) return;
  _currentOrder.source       = document.getElementById('ord-source')?.value       || 'phone';
  _currentOrder.deliveryDate = document.getElementById('ord-delivery-date')?.value || '';
  _currentOrder.logistics    = document.getElementById('ord-logistics')?.value.trim()    || '';
  _currentOrder.trackingNo   = document.getElementById('ord-tracking')?.value.trim()     || '';
  _currentOrder.remark       = document.getElementById('ord-remark')?.value.trim()       || '';
  _currentOrder.paidAmount   = parseInt(document.getElementById('ord-paid-amount')?.value) || 0;
  _currentOrder.updatedAt    = todayStr();
  calcOrderTotal();
  updateOrderPay();
}

// ── 儲存 ──
function upsertOrder(){
  if(!_currentOrder.id) _currentOrder.id = 'O' + Date.now();
  const idx = orders.findIndex(o => o.id === _currentOrder.id);
  const copy = JSON.parse(JSON.stringify(_currentOrder));
  if(idx >= 0) orders[idx] = copy;
  else         orders.push(copy);
  saveOrders();
  renderOrderList(_orderFilter);

  // 回頭更新對應估價單的 convertedOrderId（確保連結正確）
  if(_currentOrder.estimateId && typeof estimates !== 'undefined'){
    const est = estimates.find(e => e.id === _currentOrder.estimateId);
    if(est && est.status === 'converted' && !est.convertedOrderId){
      est.convertedOrderId = _currentOrder.id;
      est.convertedOrderNo = _currentOrder.no;
      if(typeof saveEstimates === 'function') saveEstimates();
    }
  }
}

function saveOrderDraft(){
  collectOrderForm();
  upsertOrder();
  showToast('📝 訂單已儲存：' + _currentOrder.no);
}

function confirmOrder(){
  if(!_currentOrder.customerId){ showToast('⚠️ 請先選擇客戶'); return; }
  if(!_currentOrder.items.length){ showToast('⚠️ 請先加入品項'); return; }
  if(_currentOrder.id){
    const existing = getOrder(_currentOrder.id);
    if(existing && existing.status !== 'pending'){
      showToast('⚠️ 此訂單已確認，請勿重複操作'); return;
    }
  }
  collectOrderForm();

  // 零售訂單：不做庫存生產檢查，直接進待出貨
  if((_currentOrder.orderType || 'project') === 'retail'){
    _currentOrder.status = 'ready';
    upsertOrder();
    showToast('✅ 零售訂單已確認，進入待出貨：' + _currentOrder.no);
    showOrderDetail(_currentOrder.id);
    return;
  }

  // 專案訂單：① 先算庫存缺口，不存檔
  const locId = getMainLocation()?.id || 'store_A';
  const needProduction = _currentOrder.items
    .map(item => {
      const stock = getStock(item.id, locId);
      return stock < item.qty
        ? { ...item, stock, produceQty: item.qty - stock }
        : null;
    })
    .filter(Boolean);

  if(needProduction.length){
    // ② 有缺料 → 顯示 Modal 讓使用者確認再動作
    _showConfirmProductionModal(_currentOrder, needProduction);
  } else {
    // ③ 全部現貨 → 直接存一次，進待出貨
    _currentOrder.status = 'ready';
    upsertOrder();
    showToast('✅ 現貨充足，訂單進入待出貨：' + _currentOrder.no);
    showOrderDetail(_currentOrder.id);
  }
}

// ── 缺料確認 Modal ──
function _showConfirmProductionModal(order, needProduction){
  const existing = document.getElementById('confirmProdModal');
  if(existing) existing.remove();

  const rows = needProduction.map(i => `
    <div style="display:flex;justify-content:space-between;align-items:center;
      padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;">
      <span>${i.emoji} ${i.name}</span>
      <span style="color:var(--red);font-weight:600;">
        需 ${i.qty}，現貨 ${i.stock}，缺 <strong>${i.produceQty}</strong>
      </span>
    </div>`).join('');

  const modal = document.createElement('div');
  modal.className    = 'modal-overlay';
  modal.id           = 'confirmProdModal';
  modal.style.display = 'flex';
  modal.innerHTML = `
    <div class="modal-card" style="max-width:380px;">
      <div class="modal-title" style="color:var(--amber);">
        <i class="ti ti-alert-triangle"></i> 庫存不足，需建立生產單
      </div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:10px;">
        以下 ${needProduction.length} 項商品庫存不足，確認後將自動建立生產單：
      </div>
      <div style="border:1px solid var(--border);border-radius:var(--radius-sm);
        margin-bottom:14px;overflow:hidden;">
        ${rows}
      </div>
      <div class="modal-actions">
        <button class="modal-ok-btn" style="background:var(--amber);"
          onclick="_doConfirmWithProduction()">
          <i class="ti ti-player-play"></i> 確認並建立生產單
        </button>
        <button class="modal-cancel-btn"
          onclick="document.getElementById('confirmProdModal').remove()">
          取消
        </button>
      </div>
    </div>`;
  document.body.appendChild(modal);

  // 暫存待確認的缺料清單
  modal._needProduction = needProduction;
}

function _doConfirmWithProduction(){
  const modal = document.getElementById('confirmProdModal');
  if(!modal) return;
  const needProduction = modal._needProduction || [];
  modal.remove();

  // ④ 確認後只存一次，設最終狀態
  _currentOrder.status = 'producing';
  upsertOrder();
  if(typeof newProductionFromOrder === 'function'){
    newProductionFromOrder(_currentOrder, needProduction);
  }
  showToast(`🏭 已建立生產單（${needProduction.length} 項不足），訂單進入生產中`);
  showOrderDetail(_currentOrder.id);
}

// ── 出貨 ──
function shipOrder(id){
  const o = getOrder(id) || _currentOrder;
  if(!o) return;
  if(!confirm(`確定出貨訂單 ${o.no}？\n出貨後將扣除 A 門市庫存。`)) return;

  const locId = getMainLocation()?.id || 'store_A';
  const now   = nowStr();

  // 扣庫存
  o.items.forEach(item => {
    adjustStock(item.id, locId, -item.qty, {
      op:      'order_ship',
      refId:   o.id,
      refType: 'order',
      note:    `訂單出貨 ${o.no}`,
    });
    item.shippedQty = item.qty;
  });

  o.status    = 'shipped';
  o.shippedAt = now;
  o.updatedAt = todayStr();

  const idx = orders.findIndex(ord => ord.id === o.id);
  if(idx >= 0) orders[idx] = o;
  saveOrders();
  renderOrderList(_orderFilter);
  showToast('🚚 出貨完成：' + o.no);
  showOrderDetail(o.id);
}

// ── 結案（付款完成 + 已出貨）──
function archiveOrder(id){
  const o = getOrder(id) || _currentOrder;
  if(!o) return;
  if(o.payStatus !== 'paid'){
    if(!confirm('款項尚未全數收到，確定結案？')) return;
  }
  o.status    = 'archived';
  o.updatedAt = todayStr();
  const idx = orders.findIndex(ord => ord.id === o.id);
  if(idx >= 0) orders[idx] = o;
  saveOrders();
  showToast('✅ 訂單已結案：' + o.no);
  renderOrderList(_orderFilter);
  showPage('orders');
}

// ── 訂單詳細頁 ──
function showOrderDetail(id){
  const o = getOrder(id);
  if(!o) return;
  _currentOrder = JSON.parse(JSON.stringify(o));
  renderOrderEditPage();
  showPage('order-edit');
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  renderOrderList('all');
});

// ── 主管解鎖訂單（可修改已結案訂單）──
function forceUnlockOrder(id){
  const o = getOrder(id);
  if(!o) return;
  if(!confirm(`確定解鎖訂單 ${o.no}？\n解鎖後可以修改資料，修改完請重新結案。`)) return;
  o.status    = 'shipped'; // 退回到已出貨狀態
  o.updatedAt = todayStr();
  const idx   = orders.findIndex(ord => ord.id === o.id);
  if(idx >= 0) orders[idx] = o;
  saveOrders();
  _currentOrder = JSON.parse(JSON.stringify(o));
  renderOrderEditPage();
  showToast('🔓 訂單已解鎖，可進行修改');
}

// ── 主管取消訂單 ──
function cancelOrder(id){
  const o = getOrder(id || _currentOrder?.id);
  if(!o) return;
  if(!confirm(`確定取消訂單 ${o.no}？\n此操作無法復原。`)) return;
  // 如果已出貨，歸還庫存
  if(o.status === 'shipped'){
    const locId = getMainLocation()?.id || 'store_A';
    o.items.forEach(item => {
      adjustStock(item.id, locId, item.shippedQty || 0, {
        op:'stock_in', refId:o.id, refType:'order_cancel', note:`取消訂單歸還 ${o.no}`
      });
    });
  }
  o.status    = 'archived';
  o.cancelled = true;
  o.updatedAt = todayStr();
  const idx   = orders.findIndex(ord => ord.id === o.id);
  if(idx >= 0) orders[idx] = o;
  saveOrders();
  showToast('❌ 訂單已取消');
  renderOrderList(_orderFilter);
  showPage('orders');
}

// ── 管理員永久刪除訂單 ──
function hardDeleteOrder(id){
  if(!confirm('確定永久刪除此訂單？\n此操作無法復原，所有記錄將消失。')) return;
  orders = orders.filter(o => o.id !== id);
  saveOrders();
  showToast('🗑️ 訂單已永久刪除');
  renderOrderList(_orderFilter);
  showPage('orders');
}

// ── 從估價單ID開啟估價單 ──
function openEstimateById(id){
  if(!id) return;
  const e = typeof getEstimate === 'function' ? getEstimate(id) : null;
  if(e){ openEstimateDetail(id); }
  else { showToast('找不到對應的估價單'); }
}

</script>
<script>
/* ── js/production.js ── */
// ============================================================
// production.js — 生產管理
// 來源：訂單自動建立 / 手動建立（提前備貨）
// ============================================================

let productionOrders = JSON.parse(localStorage.getItem('erp_production_orders') || '[]');

function saveProdOrders(){
  localStorage.setItem('erp_production_orders', JSON.stringify(productionOrders));
  if(typeof pushToFirebase === 'function') pushToFirebase('productionOrders', productionOrders);
}

function getProdOrder(id){ return productionOrders.find(p => p.id === id) || null; }

function genProdNo(){ return genNo('P', productionOrders, 'no'); }

// ── 製程狀態 ──
const PROD_STEPS = [
  { key:'prepare',   label:'備料中', icon:'ti-packages',     color:'#BA7517', bg:'#FAEEDA' },
  { key:'producing', label:'生產中', icon:'ti-player-play',  color:'#185FA5', bg:'#E6F1FB' },
  { key:'done',      label:'已完成', icon:'ti-circle-check', color:'#1D9E75', bg:'#E1F5EE' },
  { key:'shipped',   label:'已出貨', icon:'ti-truck',        color:'#6B4FBB', bg:'#EDE9F8' },
];
function stepOf(key)   { return PROD_STEPS.find(s => s.key === key) || PROD_STEPS[0]; }
function stepIndex(key){ return PROD_STEPS.findIndex(s => s.key === key); }
function nextStep(key) {
  const i = stepIndex(key);
  return i < PROD_STEPS.length - 1 ? PROD_STEPS[i + 1] : null;
}

function prodStatusBadge(status){
  const s = stepOf(status);
  return `<span class="status-badge" style="background:${s.bg};color:${s.color};">
    <i class="ti ${s.icon}"></i> ${s.label}
  </span>`;
}

// ── 列表 ──
let _prodFilter = 'all';

function renderProductionList(filter){
  _prodFilter = filter || 'all';
  document.querySelectorAll('#page-production .ftab').forEach((btn, i) => {
    const filters = ['all','prepare','producing','done','shipped'];
    btn.classList.toggle('active', filters[i] === _prodFilter);
  });

  const el = document.getElementById('production-list');
  if(!el) return;
  let list = _prodFilter === 'all'
    ? productionOrders
    : productionOrders.filter(p => p.status === _prodFilter);
  list = list.slice().reverse();

  if(!list.length){
    el.innerHTML = `<div class="order-empty">沒有符合的生產單</div>`;
    return;
  }

  el.innerHTML = list.map(p => {
    const cust     = getCustomer(p.customerId);
    const itemsStr = (p.items||[]).slice(0,2).map(i=>i.name).join('、')
      + ((p.items||[]).length > 2 ? ` 等${p.items.length}項` : '');
    return `<div class="list-card" onclick="showProdDetail('${p.id}')">
      <div class="list-card-top">
        <span class="list-card-no">${p.no}</span>
        ${prodStatusBadge(p.status)}
      </div>
      <div class="list-card-meta">
        ${cust ? `<span><i class="ti ti-user"></i>${cust.name}</span>` : ''}
        ${p.sourceOrderNo ? `<span><i class="ti ti-link"></i>${p.sourceOrderNo}</span>` : ''}
        <span><i class="ti ti-calendar"></i>${fmtDate(p.createdAt)}</span>
        ${p.deadline ? `<span><i class="ti ti-clock"></i>期限 ${fmtDate(p.deadline)}</span>` : ''}
      </div>
      <div class="list-card-items">${itemsStr || '無品項'}</div>
      <!-- 迷你進度條 -->
      <div class="prod-mini-bar">
        ${PROD_STEPS.map((s, i) => `
          <div class="prod-mini-step ${stepIndex(p.status) >= i ? 'active' : ''}">
            <div class="prod-mini-dot" style="${stepIndex(p.status)>=i?'background:'+s.color:''}"></div>
            <div class="prod-mini-label">${s.label}</div>
          </div>
          ${i < PROD_STEPS.length-1
            ? `<div class="prod-mini-line ${stepIndex(p.status)>i?'active':''}"></div>`
            : ''}`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ── 從訂單建立生產單（自動）──
function newProductionFromOrder(order, itemsNeedProduction){
  const now = nowStr();
  const p = {
    id:           'PO' + Date.now(),
    no:           genProdNo(),
    sourceOrderId: order.id,
    sourceOrderNo: order.no,
    customerId:    order.customerId,
    items:         itemsNeedProduction.map(i => ({
      id:    i.id,
      name:  i.name,
      emoji: i.emoji,
      qty:   i.produceQty || i.qty,
    })),
    deadline:    order.deliveryDate || '',
    remark:      `由訂單 ${order.no} 自動建立`,
    status:      'prepare',
    statusLog:   [{ status:'prepare', label:'備料中', time:now, note:`由訂單 ${order.no} 建立` }],
    createdAt:   todayStr(),
  };
  productionOrders.push(p);
  saveProdOrders();
  renderProductionList(_prodFilter);
  return p;
}

// ── 手動新增生產單 ──
let _currentProd = null;

function newProductionOrder(){
  _currentProd = {
    id:           null,
    no:           genProdNo(),
    sourceOrderId: null,
    sourceOrderNo: '',
    customerId:    null,
    items:         [],
    deadline:      '',
    remark:        '',
    status:        'prepare',
    statusLog:     [],
    createdAt:     todayStr(),
  };

}

// ── 生產單編輯頁 ──
function renderProdEditPage(){

      </div>
      ${p.sourceOrderNo ? `
      <div style="padding:8px 12px;background:var(--purple-light);border-radius:var(--radius-sm);
        font-size:13px;color:var(--purple);margin-bottom:10px;display:flex;align-items:center;gap:6px;">
        <i class="ti ti-link"></i> 來源訂單：${p.sourceOrderNo}

      <div class="form-section-title">品項（成品）</div>
      <div class="search-bar">
        <i class="ti ti-search"></i>
        <input type="search" id="prod-item-search" placeholder="搜尋成品加入..."
          oninput="searchItemsFor('production',this.value)" />
      </div>
      <div id="prod-item-search-result" style="display:none;"></div>
      <div class="order-list-header">
        <span class="order-list-title">生產品項</span>
        <span class="order-count" id="prod-item-count">${p.items.length} 項</span>
      </div>
      <div class="order-list" id="prod-item-list"></div>

      <div class="cust-field" style="margin-top:12px;">

        <input type="date" id="prod-deadline" value="${p.deadline||''}" />
