<script>
/* ── js/custom_order.js ── */
// ============================================================
// custom_order.js — 客製化商品（用於估價單/訂單）
// ============================================================

// ── 客製化商品 Modal 狀態 ──
let _customItem = null;
let _customEditIdx = null;   // 正在編輯哪個品項（null = 新增）
let _customContext = null;   // 'estimate' | 'order'
let _customImages = [];      // base64 圖片陣列

// ── 開啟客製化商品 Modal ──
function openCustomItemModal(context, editIdx){
  _customContext = context || 'estimate';
  _customEditIdx = editIdx ?? null;
  _customImages  = [];

  // 如果是編輯現有的客製商品
  const srcList = context === 'estimate' ? _currentEst?.items : _currentOrder?.items;
  if(editIdx !== null && editIdx !== undefined && srcList){
    const existing = srcList[editIdx];
    if(existing?.isCustom){
      _customItem = JSON.parse(JSON.stringify(existing));
      _customImages = existing.images || [];
    } else { _customItem = null; }
  } else {
    _customItem = null;
  }

  renderCustomItemModal();
  document.getElementById('customItemModal').style.display = 'flex';
}

function renderCustomItemModal(){
  const modal = document.getElementById('customItemModal');
  if(!modal) return;
  const ci = _customItem;

  modal.innerHTML = `
    <div class="modal-card" style="max-height:92vh;overflow-y:auto;">
      <div class="modal-title">
        <i class="ti ti-pencil-plus" style="color:var(--purple);"></i>
        ${_customEditIdx !== null ? '編輯客製化商品' : '新增客製化商品'}
      </div>

      <!-- 基本資訊 -->
      <div class="cust-field">
        <label>客製商品名稱 *</label>
        <input type="text" id="ci-name" value="${ci?.name||''}"
          placeholder="例：企業春節禮盒、客製耳掛咖啡組合" />
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div class="cust-field">
          <label>數量</label>
          <input type="number" id="ci-qty" value="${ci?.qty||1}" min="1" />
        </div>
        <div class="cust-field">
          <label>單價（$）</label>
          <input type="number" id="ci-price" value="${ci?.unitPrice||0}" min="0" />
        </div>
      </div>

      <!-- 材料組合（臨時 BOM）-->
      <div class="form-section-title" style="margin-top:12px;">
        材料組合
        <span style="font-weight:400;color:var(--text3);font-size:11px;">（生產時依此扣料）</span>
      </div>
      <div class="search-bar" style="margin-bottom:8px;">
        <i class="ti ti-search"></i>
        <input type="search" id="ci-mat-search" placeholder="搜尋材料加入..."
          oninput="searchCustomMaterial(this.value)" />
      </div>
      <div id="ci-mat-search-result" style="display:none;max-height:160px;overflow-y:auto;"></div>
      <div id="ci-mat-list"></div>

      <!-- 備註（印製說明等）-->
      <div class="cust-field" style="margin-top:12px;">
        <label>備註（印製說明、特殊要求等）</label>
        <textarea id="ci-remark" rows="3"
          placeholder="例：委外印LOGO，交期7天；或：換紅色提繩">${ci?.remark||''}</textarea>
      </div>

      <!-- 照片上傳 -->
      <div class="form-section-title" style="margin-top:4px;">
        樣品照片 / 注意事項
        <span style="font-weight:400;color:var(--text3);font-size:11px;">（最多5張，每張限3MB）</span>
      </div>
      <input type="file" id="ci-img-upload" accept="image/*" multiple
        style="display:none;" onchange="handleCustomImages(this)" />
      <button onclick="document.getElementById('ci-img-upload').click()"
        style="width:100%;padding:12px;border:1.5px dashed var(--border);
        border-radius:var(--radius-sm);background:var(--bg);color:var(--text2);
        font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;">
        <i class="ti ti-photo-plus" style="font-size:20px;"></i>
        點擊上傳照片
      </button>
      <div id="ci-img-preview" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;"></div>

      <!-- 按鈕 -->
      <div class="modal-actions" style="margin-top:16px;">
        <button class="modal-ok-btn" onclick="saveCustomItem()">
          <i class="ti ti-check"></i> 加入估價單
        </button>
        <button class="modal-cancel-btn"
          onclick="document.getElementById('customItemModal').style.display='none'">
          取消
        </button>
      </div>
    </div>`;

  // 初始化材料清單
  window._ciMaterials = ci?.materials ? JSON.parse(JSON.stringify(ci.materials)) : [];
  renderCiMatList();
  renderCiImgPreview();
}

// ── 材料搜尋 ──
function searchCustomMaterial(q){
  const res = document.getElementById('ci-mat-search-result');
  if(!res||!q){ if(res) res.style.display='none'; return; }
  const pool = typeof getMaterialItems==='function'
    ? getMaterialItems()
    : ALL_ITEMS;
  const results = pool.filter(i =>
    i.name?.includes(q) || i.id?.toLowerCase().startsWith(q.toLowerCase())
  ).slice(0,10);
  if(!results.length){ res.style.display='none'; return; }
  res.style.display='block';
  res.innerHTML = results.map(item => {
    const stock = getTotalStock(item.id);
    const cls   = stock<=0?'ss-qty-empty':isLowStock(item.id)?'ss-qty-low':'ss-qty-ok';
    return `<div class="ss-item" onmousedown="addCiMaterial('${item.id}')">
      <span class="ss-emoji">${item.emoji||'📦'}</span>
      <div class="ss-info">
        <div class="ss-name">${item.name}</div>
        <div class="ss-sub">${item.id}</div>
      </div>
      <div class="${cls} ss-stock">${stock}</div>
    </div>`;
  }).join('');
}

function addCiMaterial(id){
  const item = getItem(id);
  if(!item) return;
  const existing = window._ciMaterials.find(m => m.productId === id);
  if(existing){ existing.qty++; }
  else {
    window._ciMaterials.push({
      productId: id,
      name:      item.name,
      emoji:     item.emoji,
      unit:      item.unit || '個',
      qty:       1,
    });
  }
  const s = document.getElementById('ci-mat-search');
  if(s) s.value = '';
  const r = document.getElementById('ci-mat-search-result');
  if(r) r.style.display = 'none';
  renderCiMatList();
}

function removeCiMaterial(idx){
  window._ciMaterials.splice(idx,1);
  renderCiMatList();
}

function changeCiMatQty(idx, delta){
  const m = window._ciMaterials[idx];
  if(m) m.qty = Math.max(0.1, parseFloat((m.qty + delta).toFixed(2)));
  renderCiMatList();
}

function setCiMatQty(idx, val){
  const m = window._ciMaterials[idx];
  if(m){ const n=parseFloat(val); if(n>0) m.qty=n; }
}

function renderCiMatList(){
  const el = document.getElementById('ci-mat-list');
  if(!el) return;
  const mats = window._ciMaterials || [];
  if(!mats.length){
    el.innerHTML = '<div class="order-empty" style="margin-bottom:8px;">尚未加入材料（若無需扣料可留空）</div>';
    return;
  }
  el.innerHTML = mats.map((m, idx) => `
    <div class="order-row" style="margin-bottom:6px;">
      <span style="font-size:24px;">${m.emoji||'📦'}</span>
      <div class="order-info">
        <div class="order-name">${m.name}</div>
        <div class="order-id">${m.productId}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <button class="qty-btn" onclick="changeCiMatQty(${idx},-1)">−</button>
        <input type="number" value="${m.qty}" min="0.1" step="0.1"
          style="width:56px;padding:4px 6px;font-size:15px;font-weight:700;text-align:center;
          border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);"
          onchange="setCiMatQty(${idx},this.value)" />
        <button class="qty-btn" onclick="changeCiMatQty(${idx},1)">＋</button>
      </div>
      <button class="order-del" onclick="removeCiMaterial(${idx})">
        <i class="ti ti-x"></i>
      </button>
    </div>`).join('');
}

// ── 照片處理 ──
function handleCustomImages(input){
  const files = Array.from(input.files).slice(0, 5 - _customImages.length);
  const readers = files.map(file => new Promise((resolve, reject) => {
    if(file.size > 3 * 1024 * 1024){ showToast('⚠️ 每張照片限 3MB'); reject(); return; }
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  }));
  Promise.allSettled(readers).then(results => {
    results.forEach(r => { if(r.status==='fulfilled') _customImages.push(r.value); });
    renderCiImgPreview();
  });
  input.value = '';
}

function renderCiImgPreview(){
  const el = document.getElementById('ci-img-preview');
  if(!el) return;
  if(!_customImages.length){ el.innerHTML=''; return; }
  el.innerHTML = _customImages.map((img, idx) => `
    <div style="position:relative;width:80px;height:80px;">
      <img src="${img}" style="width:80px;height:80px;object-fit:cover;
        border-radius:8px;border:1px solid var(--border);" />
      <button onclick="removeCiImage(${idx})"
        style="position:absolute;top:-6px;right:-6px;width:22px;height:22px;
        border-radius:50%;background:var(--red);color:white;border:none;
        font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;">
        <i class="ti ti-x"></i>
      </button>
    </div>`).join('');
}

function removeCiImage(idx){
  _customImages.splice(idx,1);
  renderCiImgPreview();
}

// ── 儲存客製化商品 ──
function saveCustomItem(){
  const name  = document.getElementById('ci-name')?.value.trim();
  const qty   = parseInt(document.getElementById('ci-qty')?.value) || 1;
  const price = parseInt(document.getElementById('ci-price')?.value) || 0;
  const remark= document.getElementById('ci-remark')?.value.trim() || '';

  if(!name){ showToast('⚠️ 請填寫客製商品名稱'); return; }

  const customItem = {
    id:            'CUSTOM_' + Date.now(),
    name,
    emoji:         '🎁',
    qty,
    originalPrice: price,
    unitPrice:     price,
    isCustom:      true,
    materials:     JSON.parse(JSON.stringify(window._ciMaterials||[])),
    remark,
    images:        [..._customImages],
    discount:      null,
  };

  // 加入目標清單
  if(_customContext === 'estimate' && _currentEst){
    if(_customEditIdx !== null){
      _currentEst.items[_customEditIdx] = customItem;
    } else {
      _currentEst.items.push(customItem);
    }
    renderEstItems();
    calcEstTotal();
  } else if(_customContext === 'order' && _currentOrder){
    if(_customEditIdx !== null){
      _currentOrder.items[_customEditIdx] = customItem;
    } else {
      _currentOrder.items.push(customItem);
    }
    renderOrderItems();
    calcOrderTotal();
  }

  document.getElementById('customItemModal').style.display = 'none';
  showToast(`✅ 客製商品已加入：${name}`);
}

// ── 初始化：在 HTML 加入 Modal 和修改估價單/訂單按鈕 ──
document.addEventListener('DOMContentLoaded', () => {
  // 動態加入 customItemModal
  const modal = document.createElement('div');
  modal.className    = 'modal-overlay';
  modal.id           = 'customItemModal';
  modal.style.display= 'none';
  modal.onclick      = e => { if(e.target===modal) modal.style.display='none'; };
  document.body.appendChild(modal);

  // 修改估價單品項搜尋欄：加入「新增客製化」按鈕
  patchEstimateForm();
  patchOrderForm();
});

// 在估價單編輯頁的品項區加入客製化按鈕
function patchEstimateForm(){
  // 估價單頁面是動態渲染的，用 MutationObserver 監聽
  const obs = new MutationObserver(() => {
    const searchBar = document.querySelector('#page-estimate-edit .search-bar');
    if(searchBar && !searchBar.nextElementSibling?.classList?.contains('custom-add-btn-row')){
      const btn = document.createElement('div');
      btn.className = 'custom-add-btn-row';
      btn.style = 'margin-bottom:8px;';
      btn.innerHTML = `<button onclick="openCustomItemModal('estimate')"
        style="width:100%;padding:10px;border:1.5px dashed var(--purple-mid);
        border-radius:var(--radius-sm);background:var(--purple-light);color:var(--purple);
        font-size:13px;font-weight:600;display:flex;align-items:center;
        justify-content:center;gap:8px;cursor:pointer;">
        <i class="ti ti-pencil-plus" style="font-size:18px;"></i>
        新增客製化商品
      </button>`;
      searchBar.after(btn);
    }
  });
  obs.observe(document.getElementById('page-estimate-edit') || document.body,
    { childList:true, subtree:true });
}

function patchOrderForm(){
  const obs = new MutationObserver(() => {
    const searchBar = document.querySelector('#page-order-edit .search-bar');
    if(searchBar && !searchBar.nextElementSibling?.classList?.contains('custom-add-btn-row')){
      const btn = document.createElement('div');
      btn.className = 'custom-add-btn-row';
      btn.style = 'margin-bottom:8px;';
      btn.innerHTML = `<button onclick="openCustomItemModal('order')"
        style="width:100%;padding:10px;border:1.5px dashed var(--purple-mid);
        border-radius:var(--radius-sm);background:var(--purple-light);color:var(--purple);
        font-size:13px;font-weight:600;display:flex;align-items:center;
        justify-content:center;gap:8px;cursor:pointer;">
        <i class="ti ti-pencil-plus" style="font-size:18px;"></i>
        新增客製化商品
      </button>`;
      searchBar.after(btn);
    }
  });
  obs.observe(document.getElementById('page-order-edit') || document.body,
    { childList:true, subtree:true });
}

</script>
<script>
/* ── js/expiry.js ── */
// ============================================================
// expiry.js — 效期批次追蹤（食品類庇護工廠商品）
// ============================================================

let _batches = [];

function loadBatches(){
  _batches = JSON.parse(localStorage.getItem('erp_batches') || '[]');
}

function saveBatches(){
  localStorage.setItem('erp_batches', JSON.stringify(_batches));
  if(typeof pushToFirebase === 'function') pushToFirebase('batches', _batches);
}

function _batchDiffDays(expiryDate){
  if(!expiryDate) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.floor((new Date(expiryDate) - now) / 86400000);
}

function _batchStatusInfo(expiryDate){
  const diff = _batchDiffDays(expiryDate);
  if(diff === null)     return { cls:'', color:'var(--text2)',   label:'' };
  if(diff < 0)          return { cls:'expired',          color:'var(--red)',   label:`已過期 ${-diff} 天` };
  if(diff === 0)        return { cls:'expiring-soon',    color:'var(--red)',   label:'今天到期' };
  if(diff <= 7)         return { cls:'expiring-soon',    color:'var(--amber)', label:`還有 ${diff} 天` };
  if(diff <= 30)        return { cls:'expiring-warning', color:'#e6a817',      label:`還有 ${diff} 天` };
  return                       { cls:'expiring-ok',      color:'var(--green)', label:`還有 ${diff} 天` };
}

// 供首頁 / 庫存頁呼叫，回傳 30 天內到期批次數
function getExpiryAlertCount(){
  loadBatches();
  const cutoff = new Date(); cutoff.setHours(0,0,0,0);
  cutoff.setDate(cutoff.getDate() + 30);
  return _batches.filter(b => !b.consumed && b.expiryDate && new Date(b.expiryDate) <= cutoff).length;
}
window.getExpiryAlertCount = getExpiryAlertCount;

// ── 主頁面 ──
function initExpiryPage(){
  loadBatches();
  const page = document.getElementById('page-expiry');
  if(!page) return;

  const now = new Date(); now.setHours(0,0,0,0);
  const active   = _batches.filter(b => !b.consumed);
  const expired  = active.filter(b => b.expiryDate && new Date(b.expiryDate) < now);
  const soon7    = active.filter(b => b.expiryDate && _batchDiffDays(b.expiryDate) <= 7 && _batchDiffDays(b.expiryDate) >= 0);
  const all30    = active.filter(b => b.expiryDate && _batchDiffDays(b.expiryDate) <= 30);

  page.innerHTML = `
    <div class="op-header">
      <button class="back-btn" onclick="showPage('factory-menu')"><i class="ti ti-arrow-left"></i></button>
      <div class="op-title"><i class="ti ti-calendar-event" style="color:var(--amber);"></i> 效期管理</div>
      <button class="small-btn green-btn" onclick="openAddBatchModal()">
        <i class="ti ti-plus"></i> 新增
      </button>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;">
      <div class="form-card" style="text-align:center;background:${expired.length ? 'var(--red-light)' : 'var(--surface)'};">
        <div style="font-size:22px;font-weight:700;color:${expired.length ? 'var(--red)' : 'var(--text2)'};">${expired.length}</div>
        <div style="font-size:12px;color:var(--text2);">已過期</div>
      </div>
      <div class="form-card" style="text-align:center;background:${soon7.length ? 'rgba(230,168,23,0.1)' : 'var(--surface)'};">
        <div style="font-size:22px;font-weight:700;color:${soon7.length ? 'var(--amber)' : 'var(--text2)'};">${soon7.length}</div>
        <div style="font-size:12px;color:var(--text2);">7天內到期</div>
      </div>
      <div class="form-card" style="text-align:center;">
        <div style="font-size:22px;font-weight:700;">${active.length}</div>
        <div style="font-size:12px;color:var(--text2);">追蹤中</div>
      </div>
    </div>

    <div class="filter-tabs" style="margin-bottom:10px;">
      <button class="ftab active" onclick="renderExpiryList('active',this)">追蹤中</button>
      <button class="ftab" onclick="renderExpiryList('expired-only',this)">已過期</button>
      <button class="ftab" onclick="renderExpiryList('consumed',this)">已消耗</button>
    </div>

    <div id="expiry-list"></div>`;

  renderExpiryList('active', page.querySelector('.ftab.active'));
}
window.initExpiryPage = initExpiryPage;

function renderExpiryList(filter, btn){
  const el = document.getElementById('expiry-list');
  if(!el) return;

  if(btn){
    document.querySelectorAll('#page-expiry .ftab')
      .forEach(b => b.classList.toggle('active', b === btn));
  }

  loadBatches();
  const now = new Date(); now.setHours(0,0,0,0);
  let list;
  if(filter === 'consumed'){
    list = _batches.filter(b => b.consumed);
  } else if(filter === 'expired-only'){
    list = _batches.filter(b => !b.consumed && b.expiryDate && new Date(b.expiryDate) < now);
  } else {
    list = _batches.filter(b => !b.consumed && (!b.expiryDate || new Date(b.expiryDate) >= now));
  }

  list.sort((a,b) => (a.expiryDate||'9999') < (b.expiryDate||'9999') ? -1 : 1);

  if(!list.length){
    el.innerHTML = '<div class="order-empty">沒有符合的批次記錄</div>'; return;
  }

  el.innerHTML = list.map(b => {
    const { color, label } = _batchStatusInfo(b.expiryDate);
    return `<div class="list-card" style="margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="font-size:28px;flex-shrink:0;">${b.emoji||'📦'}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:14px;font-weight:600;">${b.productName}</div>
          <div style="font-size:12px;color:var(--text3);">
            效期：${b.expiryDate || '未設定'}
          </div>
          ${b.note ? `<div style="font-size:12px;color:var(--text3);">${b.note}</div>` : ''}
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-size:16px;font-weight:700;">${b.qty} ${b.unit||'個'}</div>
          ${label ? `<div style="font-size:12px;font-weight:600;color:${color};">${label}</div>` : ''}
        </div>
      </div>
      ${!b.consumed ? `
        <div style="display:flex;gap:6px;margin-top:8px;">
          <button class="small-btn" onclick="markBatchConsumed('${b.id}')" style="flex:1;font-size:12px;">
            <i class="ti ti-check"></i> 已消耗/移除
          </button>
          <button class="small-btn" onclick="deleteBatch('${b.id}')"
            style="padding:6px 10px;font-size:12px;background:var(--red-light);color:var(--red);border-color:var(--red);">
            <i class="ti ti-trash"></i>
          </button>
        </div>` : `
        <div style="font-size:12px;color:var(--text3);margin-top:6px;">已消耗 ${b.consumedAt||''}</div>`}
    </div>`;
  }).join('');
}
window.renderExpiryList = renderExpiryList;

function markBatchConsumed(id){
  loadBatches();
  const b = _batches.find(b => b.id === id);
  if(!b) return;
  if(!confirm(`確認標記「${b.productName}」批次（效期 ${b.expiryDate}）已消耗？`)) return;
  b.consumed   = true;
  b.consumedAt = todayStr();
  saveBatches();
  showToast('✅ 批次已標記消耗');
  initExpiryPage();
}
window.markBatchConsumed = markBatchConsumed;

function deleteBatch(id){
  loadBatches();
  const b = _batches.find(b => b.id === id);
  if(!b || !confirm(`確認刪除「${b.productName}」批次記錄？`)) return;
  _batches = _batches.filter(x => x.id !== id);
  saveBatches();
  showToast('已刪除批次記錄');
  initExpiryPage();
}
window.deleteBatch = deleteBatch;

// ── 新增批次 Modal ──
function openAddBatchModal(){
  const modal = document.getElementById('expiryAddModal');
  if(!modal) return;
  document.getElementById('eb-product-name').textContent = '請選擇商品';
  document.getElementById('eb-hidden-id').value          = '';
  document.getElementById('eb-search').value             = '';
  document.getElementById('eb-expiry').value             = '';
  document.getElementById('eb-qty').value                = '1';
  document.getElementById('eb-note').value               = '';
  document.getElementById('eb-search-result').style.display = 'none';
  modal.style.display = 'flex';
}
window.openAddBatchModal = openAddBatchModal;

function expiryProductSearch(q){
  const res = document.getElementById('eb-search-result');
  if(!res || !q){ if(res) res.style.display='none'; return; }
  const results = FINISHED.filter(i =>
    i.active !== false && (i.name.includes(q) || i.id.includes(q))
  ).slice(0, 8);
  if(!results.length){ res.style.display='none'; return; }
  res.style.display = 'block';
  res.innerHTML = results.map(i =>
    `<div class="ss-item" onmousedown="expiryPickProduct('${i.id}')">
      <span class="ss-emoji">${i.emoji||'📦'}</span>
      <div class="ss-info"><div class="ss-name">${i.name}</div><div class="ss-sub">${i.id}</div></div>
    </div>`
  ).join('');
}
window.expiryProductSearch = expiryProductSearch;

function expiryPickProduct(id){
  const item = getItem(id);
  if(!item) return;
  document.getElementById('eb-hidden-id').value          = id;
  document.getElementById('eb-product-name').textContent = `${item.emoji} ${item.name}`;
  document.getElementById('eb-search').value             = '';
  document.getElementById('eb-search-result').style.display = 'none';
}
window.expiryPickProduct = expiryPickProduct;

function saveExpiryBatch(){
  const productId  = document.getElementById('eb-hidden-id').value;
  const expiryDate = document.getElementById('eb-expiry').value;
  const qty        = parseInt(document.getElementById('eb-qty').value) || 0;
  const note       = document.getElementById('eb-note')?.value.trim() || '';

  if(!productId)   { showToast('⚠️ 請先選擇商品'); return; }
  if(!expiryDate)  { showToast('⚠️ 請輸入效期日期'); return; }
  if(qty <= 0)     { showToast('⚠️ 數量需大於 0'); return; }

  const item = getItem(productId);
  loadBatches();
  _batches.push({
    id:          'B' + Date.now(),
    productId,
    productName: item?.name  || productId,
    emoji:       item?.emoji || '📦',
    unit:        item?.unit  || '個',
    expiryDate,
    qty,
    note,
    addedAt:     todayStr(),
    consumed:    false,
  });
  saveBatches();
  document.getElementById('expiryAddModal').style.display = 'none';
  showToast('✅ 效期批次已新增');
  initExpiryPage();
}
window.saveExpiryBatch = saveExpiryBatch;

// ── 建立 Modal（DOMContentLoaded）──
document.addEventListener('DOMContentLoaded', () => {
  loadBatches();

  const modal = document.createElement('div');
  modal.id        = 'expiryAddModal';
  modal.className = 'modal-overlay';
  modal.style.display = 'none';
  modal.onclick = e => { if(e.target === modal) modal.style.display = 'none'; };
  modal.innerHTML = `
    <div class="modal-card">
      <div class="modal-title">
        <i class="ti ti-calendar-event" style="color:var(--amber);"></i> 新增效期批次
      </div>
      <div class="cust-form">
        <div class="cust-field">
          <label>商品</label>
          <div id="eb-product-name"
            style="font-size:14px;font-weight:600;padding:4px 0;color:var(--text2);">
            請選擇商品
          </div>
          <div class="search-bar" style="margin-top:6px;">
            <i class="ti ti-search"></i>
            <input type="search" id="eb-search" placeholder="輸入商品名稱搜尋..."
              oninput="expiryProductSearch(this.value)" />
          </div>
          <div id="eb-search-result"
            style="display:none;max-height:200px;overflow-y:auto;
            border:1px solid var(--border);border-radius:8px;background:var(--surface);"></div>
          <input type="hidden" id="eb-hidden-id" />
        </div>
        <div class="cust-field">
          <label>效期日期</label>
          <input type="date" id="eb-expiry" />
        </div>
        <div class="cust-field">
          <label>數量</label>
          <input type="number" id="eb-qty" min="1" value="1" />
        </div>
        <div class="cust-field">
          <label>備註（批次說明，可選）</label>
          <input type="text" id="eb-note" placeholder="例：2025-11 到貨批次" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="modal-ok-btn" onclick="saveExpiryBatch()">
          <i class="ti ti-check"></i> 儲存
        </button>
        <button class="modal-cancel-btn"
          onclick="document.getElementById('expiryAddModal').style.display='none'">
          取消
        </button>
      </div>
    </div>`;
  document.body.appendChild(modal);
});

</script>

<!-- service worker removed in bundle -->
</body>
