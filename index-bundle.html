<style>
/* ============================================================
   ERP v2 — 主樣式表
   設計原則：大按鈕、大字體、圖示+文字、極簡操作
   心智障礙者友善 UI
============================================================ */

/* ── CSS 變數 ── */
:root {
  --font:         -apple-system, 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
  --radius:       12px;
  --radius-sm:    8px;
  --radius-xs:    6px;

  /* 主色 */
  --green:        #1D9E75;
  --green-light:  #E1F5EE;
  --green-mid:    #9FE1CB;
  --green-dark:   #085041;
  --purple:       #6B4FBB;
  --purple-light: #EDE9F8;
  --purple-mid:   #C4B5F4;
  --amber:        #BA7517;
  --amber-light:  #FAEEDA;
  --red:          #E24B4A;
  --red-light:    #FCEBEB;
  --blue:         #185FA5;
  --blue-light:   #E6F1FB;

  /* 中性色（淺色模式）*/
  --bg:           #F5F5F3;
  --surface:      #FFFFFF;
  --border:       rgba(0,0,0,0.10);
  --text:         #1A1A18;
  --text2:        #5F5E5A;
  --text3:        #9B9B98;

  /* 底部導覽高度 */
  --nav-h:        64px;
  /* Header 高度 */
  --header-h:     52px;
}

@media (prefers-color-scheme: dark){
  :root {
    --bg:       #1A1A18;
    --surface:  #242422;
    --border:   rgba(255,255,255,0.10);
    --text:     #F0EFE8;
    --text2:    #B4B2A9;
    --text3:    #6B6B68;
  }
}

/* ── Reset ── */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; font-family:var(--font); background:var(--bg); color:var(--text); }
button { font-family:var(--font); cursor:pointer; border:none; background:none; }
input, select, textarea { font-family:var(--font); }
a { color:inherit; text-decoration:none; }

/* ════════════════════════════════════════════
   登入頁面
════════════════════════════════════════════ */
#login-page {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.login-wrap { width: 100%; max-width: 360px; }
.login-logo {
  font-size: 64px; color: var(--green);
  text-align: center; margin-bottom: 16px;
}
.login-title {
  font-size: 22px; font-weight: 700; text-align: center;
  color: var(--text); margin-bottom: 6px;
}
.login-sub { font-size: 14px; color: var(--text2); text-align: center; margin-bottom: 32px; }
.login-roles { display: flex; flex-direction: column; gap: 12px; }
.role-btn {
  display: flex; align-items: center; gap: 14px;
  padding: 18px 16px; border-radius: var(--radius);
  border: 1.5px solid var(--border); background: var(--surface);
  transition: all 0.1s; text-align: left;
}
.role-btn:active { transform: scale(0.98); }
.role-btn .ti:first-child { font-size: 28px; flex-shrink: 0; }
.role-btn > div { flex: 1; }
.role-btn .ti:last-child { font-size: 18px; color: var(--text3); flex-shrink: 0; }
.role-name { font-size: 17px; font-weight: 700; color: var(--text); }
.role-desc { font-size: 12px; color: var(--text2); margin-top: 3px; }
.role-btn.operator { border-color: var(--green-mid); }
.role-btn.operator .ti:first-child { color: var(--green); }
.role-btn.manager  { border-color: #85B7EB; }
.role-btn.manager .ti:first-child  { color: var(--blue); }
.role-btn.admin    { border-color: var(--purple-mid); }
.role-btn.admin .ti:first-child    { color: var(--purple); }

/* ════════════════════════════════════════════
   App 佈局
════════════════════════════════════════════ */
#app {
  display: flex; flex-direction: column;
  height: 100%; height: 100dvh;
}

/* Header */
.app-header {
  height: var(--header-h); flex-shrink: 0;
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
  position: sticky; top: 0; z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 8px; }
.header-title { font-size: 16px; font-weight: 700; color: var(--text); }
.header-right { display: flex; align-items: center; gap: 8px; }

.sync-badge {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 20px;
  background: var(--bg); cursor: pointer;
  font-size: 11px; color: var(--text2);
}
.sync-badge .ti { font-size: 16px; }
.sync-badge.ok     { color: var(--green); }
.sync-badge.syncing{ color: var(--amber); }
.sync-badge.error  { color: var(--red); }

.role-badge {
  font-size: 12px; color: var(--text2);
  padding: 4px 10px; border-radius: 20px;
  background: var(--bg); cursor: pointer;
}

/* 主內容區 */
#main-content {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding-bottom: calc(var(--nav-h) + 8px);
  position: relative;
}

/* 底部導覽 */
.bottom-nav {
  height: var(--nav-h); flex-shrink: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  display: grid; grid-template-columns: repeat(5, 1fr);
  position: sticky; bottom: 0; z-index: 100;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px;
  font-size: 11px; color: var(--text3);
  transition: color 0.15s;
}
.nav-item .ti { font-size: 22px; }
.nav-item.active { color: var(--green); }
.nav-center .ti { font-size: 26px; }

/* ════════════════════════════════════════════
   頁面
════════════════════════════════════════════ */
.page { display: none; padding: 12px 14px; min-height: 100%; }
.page.active { display: block; }

.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.page-title {
  font-size: 20px; font-weight: 700;
  display: flex; align-items: center; gap: 8px;
}
.page-title .ti { font-size: 22px; }

/* op-header（次頁面用）*/
.op-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px;
}
.op-title {
  flex: 1; font-size: 18px; font-weight: 700;
  display: flex; align-items: center; gap: 8px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ════════════════════════════════════════════
   按鈕
════════════════════════════════════════════ */
.back-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--bg); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.back-btn .ti { font-size: 20px; color: var(--text2); }

.small-btn {
  padding: 8px 14px; border-radius: 20px;
  background: var(--bg); color: var(--text2); font-size: 13px; font-weight: 600;
  border: 1px solid var(--border);
  display: flex; align-items: center; gap: 5px;
}
.green-btn { background: var(--green-light); color: var(--green-dark); border-color: var(--green-mid); }

.confirm-btn {
  width: 100%; padding: 16px; border-radius: var(--radius);
  background: var(--green); color: white;
  font-size: 16px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity 0.1s;
}
.confirm-btn:active { opacity: 0.85; }
.confirm-btn[disabled] { background: var(--text3); cursor: not-allowed; }
.danger-btn {
  width: 100%; padding: 14px; border-radius: var(--radius);
  background: #fef2f2; color: #E24B4A; border: 1.5px solid #f5c2c2;
  font-size: 15px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity 0.1s;
}
.danger-btn:active { opacity: 0.75; }

.redit-btn {
  width: 100%; padding: 14px;
  border-radius: var(--radius);
  background: var(--bg); color: var(--text2);
  border: 1px solid var(--border);
  font-size: 15px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 8px;
}

/* ════════════════════════════════════════════
   首頁快速操作
════════════════════════════════════════════ */
.section-title {
  font-size: 13px; font-weight: 700; color: var(--text2);
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 8px;
}
.section-title .ti { font-size: 15px; }

.quick-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.quick-btn {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 18px 12px; border-radius: var(--radius);
  background: var(--surface); border: 1px solid var(--border);
  font-size: 14px; font-weight: 600; color: var(--text);
  transition: background 0.1s;
}
.quick-btn:active { background: var(--green-light); }
.quick-btn .ti { font-size: 32px; color: var(--green); }

/* ════════════════════════════════════════════
   選單（submenu）
════════════════════════════════════════════ */
.submenu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.submenu-btn {
  display: flex; flex-direction: column; align-items: flex-start; gap: 6px;
  padding: 16px 14px; border-radius: var(--radius);
  background: var(--surface); border: 1.5px solid var(--border);
  transition: all 0.1s; width: 100%; min-height: 100px;
}
.submenu-btn:active { transform: scale(0.97); }
.submenu-btn .ti { font-size: 28px; display: block; }
.sb-name { font-size: 15px; font-weight: 700; color: var(--text); display: block; margin-top: 4px; }
.sb-sub  { font-size: 12px; color: var(--text2); display: block; }

.submenu-btn.teal   { background: var(--green-light);  border-color: var(--green-mid);   }
.submenu-btn.teal .ti { color: var(--green); }
.submenu-btn.purple { background: var(--purple-light); border-color: var(--purple-mid);  }
.submenu-btn.purple .ti { color: var(--purple); }
.submenu-btn.amber  { background: var(--amber-light);  border-color: #EF9F27; }
.submenu-btn.amber .ti { color: var(--amber); }
.submenu-btn.gray   { background: var(--bg);           border-color: var(--border); }
.submenu-btn.gray .ti { color: var(--text2); }

/* ════════════════════════════════════════════
   搜尋列
════════════════════════════════════════════ */
.search-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: var(--radius);
  background: var(--surface); border: 1px solid var(--border);
  margin-bottom: 10px;
}
.search-bar .ti { font-size: 18px; color: var(--text3); flex-shrink: 0; }
.search-bar input {
  flex: 1; border: none; background: none; outline: none;
  font-size: 15px; color: var(--text);
}

/* ════════════════════════════════════════════
   篩選標籤
════════════════════════════════════════════ */
.filter-tabs {
  display: flex; gap: 6px; overflow-x: auto;
  padding-bottom: 10px; margin-bottom: 4px;
  scrollbar-width: none;
}
.filter-tabs::-webkit-scrollbar { display: none; }
.ftab {
  padding: 7px 16px; border-radius: 20px; white-space: nowrap;
  font-size: 13px; font-weight: 600;
  background: var(--bg); color: var(--text2); border: 1px solid var(--border);
  transition: all 0.1s; flex-shrink: 0;
}
.ftab.active { background: var(--green); color: white; border-color: var(--green); }

/* ════════════════════════════════════════════
   表單卡片
════════════════════════════════════════════ */
.form-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
}
.form-meta-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px;
}
.form-no   { font-size: 16px; font-weight: 700; color: var(--text); font-family: monospace; }
.form-date { font-size: 13px; color: var(--text3); }
.form-section-title {
  font-size: 12px; font-weight: 700; color: var(--text2);
  margin-bottom: 8px; margin-top: 4px;
}

.cust-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.cust-field label { font-size: 13px; color: var(--text2); font-weight: 500; }
.cust-field input,
.cust-field select,
.cust-field textarea {
  padding: 10px 12px; font-size: 15px;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--text); outline: none;
}
.cust-field input:focus,
.cust-field select:focus,
.cust-field textarea:focus { border-color: var(--green); }
.cust-field textarea { resize: none; line-height: 1.5; }

.customer-select-btn {
  width: 100%; display: flex; align-items: center; gap: 10px;
  padding: 13px 14px; border-radius: var(--radius-sm);
  background: var(--bg); border: 1.5px solid var(--border);
  font-size: 15px; font-weight: 600; color: var(--text);
  text-align: left;
}
.customer-select-btn .ti:first-child { font-size: 20px; color: var(--text3); }
.customer-info-box {
  padding: 10px 12px; border-radius: var(--radius-sm);
  background: var(--green-light); border: 1px solid var(--green-mid);
  font-size: 13px; color: var(--green-dark); margin-top: 6px;
  line-height: 1.8;
}

/* ════════════════════════════════════════════
   品項列表（訂單/估價單用）
════════════════════════════════════════════ */
.order-list-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.order-list-title { font-size: 14px; font-weight: 600; color: var(--text); }
.order-count {
  font-size: 12px; font-weight: 600;
  background: var(--bg); color: var(--text2);
  padding: 3px 10px; border-radius: 20px;
  border: 1px solid var(--border);
}

.order-list { display: flex; flex-direction: column; gap: 6px; }
.order-empty {
  padding: 20px; text-align: center;
  color: var(--text3); font-size: 14px;
  background: var(--bg); border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}
.order-row {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
}
.order-emoji { font-size: 28px; flex-shrink: 0; }
.order-info  { flex: 1; min-width: 0; }
.order-name  { font-size: 14px; font-weight: 600; color: var(--text); }
.order-id    { font-size: 11px; color: var(--text3); margin-top: 2px; }
.order-del   {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  background: var(--red-light); color: var(--red);
  display: flex; align-items: center; justify-content: center;
}

/* 數量控制 */
.qty-ctrl {
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.qty-btn {
  width: 34px; height: 34px; border-radius: 50%; font-size: 20px;
  font-weight: 700; display: flex; align-items: center; justify-content: center;
  border: 1.5px solid var(--border); background: var(--bg); color: var(--text);
}
.qty-num { font-size: 18px; font-weight: 700; min-width: 32px; text-align: center; }

/* 單品改價 */
.unit-price-input {
  width: 80px; padding: 5px 8px; font-size: 15px; font-weight: 700;
  border: 1.5px solid var(--border); border-radius: var(--radius-xs);
  background: var(--bg); color: var(--text); text-align: right;
}
.unit-price-input.discounted { border-color: var(--amber); color: var(--amber); }

/* ════════════════════════════════════════════
   金額區塊
════════════════════════════════════════════ */
.amount-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-top: 10px;
}
.amount-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; font-size: 15px; border-bottom: 1px solid var(--border);
}
.amount-row:last-child { border: none; }
.amount-row.grand { font-size: 18px; font-weight: 700; padding-top: 12px; }
.discount-ctrl { display: flex; align-items: center; gap: 6px; }
.discount-ctrl select {
  padding: 6px 10px; font-size: 13px;
  border: 1px solid var(--border); border-radius: var(--radius-xs);
  background: var(--bg); color: var(--text);
}
.discount-ctrl input {
  padding: 6px 8px; font-size: 15px; font-weight: 600;
  border: 1.5px solid var(--border); border-radius: var(--radius-xs);
  background: var(--bg); color: var(--text); text-align: right;
}

/* ════════════════════════════════════════════
   POS 付款方式
════════════════════════════════════════════ */
.pay-method-btns {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 10px;
}
.pay-method-btn {
  padding: 14px 8px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border); background: var(--surface);
  font-size: 14px; font-weight: 600; color: var(--text2);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all 0.1s;
}
.pay-method-btn .ti { font-size: 20px; }
.pay-method-btn.active {
  background: var(--amber-light); color: var(--amber);
  border-color: #EF9F27;
}
.cash-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-top: 8px;
}

/* ════════════════════════════════════════════
   送貨方式
════════════════════════════════════════════ */
.delivery-btns { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.delivery-btn {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 12px 8px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border); background: var(--surface);
  font-size: 13px; font-weight: 600; color: var(--text2);
  transition: all 0.1s;
}
.delivery-btn .ti { font-size: 22px; }
.delivery-btn.active {
  background: var(--purple-light); color: #3D2780;
  border-color: var(--purple-mid);
}

/* ════════════════════════════════════════════
   後台管理
════════════════════════════════════════════ */
.admin-menu { display: flex; flex-direction: column; gap: 8px; }
.admin-group-title {
  font-size: 12px; font-weight: 700; color: var(--text3);
  letter-spacing: 0.5px; text-transform: uppercase;
  padding: 4px 0;
}
.admin-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 14px; border-radius: var(--radius);
  background: var(--surface); border: 1px solid var(--border);
  text-align: left; width: 100%; transition: background 0.1s;
}
.admin-item:active { background: var(--bg); }
.admin-item .ti:first-child { font-size: 24px; color: var(--purple); flex-shrink: 0; }
.admin-item-name { font-size: 15px; font-weight: 600; color: var(--text); }
.admin-item-sub  { font-size: 12px; color: var(--text2); margin-top: 2px; }
.admin-item.danger .ti:first-child { color: var(--red); }

/* ════════════════════════════════════════════
   Modal
════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 900;
  background: rgba(0,0,0,0.45);
  display: flex; align-items: flex-end; justify-content: center;
  padding: 0 0 env(safe-area-inset-bottom);
}
.modal-card {
  background: var(--surface); border-radius: var(--radius) var(--radius) 0 0;
  padding: 20px 18px; width: 100%; max-width: 480px;
  max-height: 88vh; overflow-y: auto;
}
.modal-title {
  font-size: 17px; font-weight: 700; color: var(--text);
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.modal-title .ti { font-size: 20px; }
.modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
.modal-ok-btn {
  padding: 13px; border-radius: var(--radius-sm);
  background: var(--green); color: white;
  font-size: 15px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.modal-cancel-btn {
  padding: 13px; border-radius: var(--radius-sm);
  background: var(--bg); color: var(--text2);
  border: 1px solid var(--border);
  font-size: 15px; font-weight: 600;
}

/* ════════════════════════════════════════════
   Toast
════════════════════════════════════════════ */
.toast {
  position: fixed; bottom: calc(var(--nav-h) + 16px); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1A1A18; color: white;
  padding: 12px 20px; border-radius: 24px;
  font-size: 14px; font-weight: 600;
  opacity: 0; transition: all 0.25s; pointer-events: none;
  z-index: 1000; white-space: nowrap; max-width: 90vw;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ════════════════════════════════════════════
   智慧搜尋下拉
════════════════════════════════════════════ */
.ss-dropdown {
  position: absolute; z-index: 9999;
  background: var(--surface); border: 1.5px solid var(--green-mid);
  border-radius: var(--radius); box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  overflow: hidden; display: none;
  max-height: 280px; overflow-y: auto; width: 100%;
}
.ss-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.1s;
}
.ss-item:last-child { border: none; }
.ss-item:hover, .ss-item.active { background: var(--green-light); }
.ss-emoji  { font-size: 24px; flex-shrink: 0; }
.ss-info   { flex: 1; min-width: 0; }
.ss-name   { font-size: 14px; font-weight: 600; color: var(--text); }
.ss-sub    { font-size: 11px; color: var(--text3); margin-top: 2px; }
.ss-stock  { font-size: 18px; font-weight: 700; flex-shrink: 0; }
.ss-unit   { font-size: 10px; color: var(--text3); }
.ss-mark   { background: #FFE680; padding: 0 1px; border-radius: 2px; }
.ss-qty-ok    { color: var(--green); }
.ss-qty-low   { color: var(--amber); }
.ss-qty-empty { color: var(--red); }

/* ════════════════════════════════════════════
   庫存查詢
════════════════════════════════════════════ */
.loc-tabs {
  display: flex; gap: 6px; overflow-x: auto;
  padding-bottom: 10px; scrollbar-width: none;
}
.loc-tab {
  padding: 8px 18px; border-radius: 20px; white-space: nowrap;
  font-size: 13px; font-weight: 600; flex-shrink: 0;
  background: var(--bg); color: var(--text2); border: 1px solid var(--border);
}
.loc-tab.active { background: var(--green); color: white; border-color: var(--green); }

.cat-filter {
  display: flex; gap: 6px; overflow-x: auto;
  padding-bottom: 10px; scrollbar-width: none;
}
.cat-tag {
  padding: 6px 14px; border-radius: 20px; white-space: nowrap;
  font-size: 13px; flex-shrink: 0;
  background: var(--bg); color: var(--text2); border: 1px solid var(--border);
}
.cat-tag.active { background: var(--purple-light); color: var(--purple); border-color: var(--purple-mid); }

.inv-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  margin-bottom: 6px; cursor: pointer;
}
.inv-item:active { background: var(--bg); }
.inv-item-emoji  { font-size: 32px; flex-shrink: 0; }
.inv-item-info   { flex: 1; min-width: 0; }
.inv-item-name   { font-size: 15px; font-weight: 600; color: var(--text); }
.inv-item-id     { font-size: 11px; color: var(--text3); margin-top: 2px; }
.inv-item-right  { text-align: right; flex-shrink: 0; }
.inv-qty         { font-size: 24px; font-weight: 700; }
.inv-qty.ok      { color: var(--green); }
.inv-qty.low     { color: var(--amber); }
.inv-qty.empty   { color: var(--red); }
.inv-unit        { font-size: 11px; color: var(--text3); }

.inv-warn-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  margin-bottom: 6px; font-size: 14px; cursor: pointer;
}
.inv-warn-row .inv-qty { font-size: 16px; }
.inv-ok {
  padding: 12px 14px; background: var(--green-light);
  border-radius: var(--radius-sm); font-size: 14px; color: var(--green-dark);
  display: flex; align-items: center; gap: 8px;
}

/* ════════════════════════════════════════════
   卡片列表（估價單、訂單、生產單通用）
════════════════════════════════════════════ */
.list-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
  cursor: pointer; transition: background 0.1s;
}
.list-card:active { background: var(--bg); }
.list-card-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.list-card-no   { font-size: 16px; font-weight: 700; font-family: monospace; color: var(--text); }
.list-card-meta { display: flex; flex-wrap: wrap; gap: 8px; font-size: 12px; color: var(--text3); margin-bottom: 8px; }
.list-card-meta span { display: flex; align-items: center; gap: 3px; }
.list-card-items { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
.list-card-footer { display: flex; justify-content: space-between; align-items: center; }
.list-card-amount { font-size: 20px; font-weight: 700; color: var(--text); }

/* 狀態 Badge */
.status-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 20px;
  font-size: 12px; font-weight: 700;
}
.badge-draft    { background: var(--bg);           color: var(--text3); }
.badge-pending  { background: var(--amber-light);  color: var(--amber); }
.badge-active   { background: var(--blue-light);   color: var(--blue);  }
.badge-converted{ background: var(--green-light);  color: var(--green); }
.badge-done     { background: var(--green-light);  color: var(--green); }
.badge-shipped  { background: var(--purple-light); color: var(--purple);}
.badge-archived { background: var(--bg);           color: var(--text3); }
.badge-cancelled{ background: var(--red-light);    color: var(--red);   }

/* 付款狀態 */
.pay-badge-unpaid  { background: var(--red-light);   color: var(--red);   }
.pay-badge-partial { background: var(--amber-light);  color: var(--amber); }
.pay-badge-paid    { background: var(--green-light);  color: var(--green); }

/* ════════════════════════════════════════════
   PWA 安全區域
════════════════════════════════════════════ */
@supports (padding-bottom: env(safe-area-inset-bottom)){
  .bottom-nav { padding-bottom: env(safe-area-inset-bottom); }
}

/* ════════════════════════════════════════════
   角色下拉（方案B）
════════════════════════════════════════════ */
.role-dropdown-wrap { position: relative; }
.role-dropdown {
  position: absolute; right: 0; top: calc(100% + 8px);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  min-width: 200px; overflow: hidden; z-index: 200;
}
.role-dropdown-current {
  padding: 12px 16px; font-size: 13px; color: var(--text2);
  border-bottom: 1px solid var(--border);
}
.role-dropdown-divider { height: 1px; background: var(--border); }
.role-dropdown-item {
  width: 100%; display: flex; align-items: center; gap: 10px;
  padding: 13px 16px; font-size: 14px; font-weight: 600;
  color: var(--text); text-align: left; transition: background 0.1s;
}
.role-dropdown-item:hover { background: var(--bg); }
.role-dropdown-item .ti { font-size: 18px; color: var(--text2); }
.role-dropdown-item.downgrade { color: var(--text3); font-weight: 400; }

/* ════════════════════════════════════════════
   表單分區（客戶、廠商）
════════════════════════════════════════════ */
.cust-form-section {
  font-size: 11px; font-weight: 700; color: var(--text3);
  letter-spacing: 0.5px; padding: 8px 0 4px;
  border-top: 1px solid var(--border); margin-top: 4px;
}
.cust-form-section:first-child { border-top: none; margin-top: 0; padding-top: 0; }
.cust-section-label {
  font-size: 11px; font-weight: 700; color: var(--text3);
  margin-bottom: 6px; margin-top: 10px;
}
.cust-info-block { background: var(--bg); border-radius: var(--radius-sm); padding: 12px 14px; }
.cust-info-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; color: var(--text); padding: 4px 0;
}
.cust-info-row .ti { font-size: 16px; color: var(--text3); flex-shrink: 0; }
.cust-detail-name { font-size: 20px; font-weight: 700; margin-bottom: 12px; }

/* ════════════════════════════════════════════
   catdetail-row（選擇器用）
════════════════════════════════════════════ */
.catdetail-row {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  margin-bottom: 6px; cursor: pointer; transition: background 0.1s;
}
.catdetail-row:active { background: var(--green-light); }
.catdetail-info { flex: 1; min-width: 0; }
.catdetail-name { font-size: 14px; font-weight: 600; color: var(--text); }
.catdetail-id   { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ════════════════════════════════════════════
   付款狀態按鈕
════════════════════════════════════════════ */
.pay-status-btn {
  padding: 6px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
  border: 1.5px solid var(--border);
  background: var(--bg); color: var(--text2);
  transition: all 0.1s;
}
#ord-pay-unpaid.active,
#est-pay-unpaid.active  { background: var(--red-light);   color: #791F1F; border-color: #F09595; }
#ord-pay-partial.active { background: var(--amber-light);  color: #633806; border-color: #EF9F27; }
#ord-pay-paid.active    { background: var(--green-light);  color: var(--green-dark); border-color: var(--green-mid); }

/* ════════════════════════════════════════════
   單品改價輸入框
════════════════════════════════════════════ */
.unit-price-input {
  width: 80px; padding: 5px 8px;
  font-size: 15px; font-weight: 700;
  border: 1.5px solid var(--border); border-radius: var(--radius-xs);
  background: var(--bg); color: var(--text); text-align: right;
}
.unit-price-input.discounted { border-color: var(--amber); color: var(--amber); }

/* ════════════════════════════════════════════
   折扣說明文字
════════════════════════════════════════════ */
.discount-label {
  font-size: 12px; color: var(--amber); font-weight: 600;
  padding: 2px 8px; background: var(--amber-light);
  border-radius: 10px;
}

/* ════════════════════════════════════════════
   生產單進度條
════════════════════════════════════════════ */
.prod-mini-bar {
  display: flex; align-items: center;
  margin-top: 10px; gap: 0;
}
.prod-mini-step {
  display: flex; flex-direction: column; align-items: center;
  gap: 3px; flex-shrink: 0;
}
.prod-mini-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--border); border: 1.5px solid var(--border);
  transition: background 0.2s;
}
.prod-mini-step.active .prod-mini-dot { border-color: transparent; }
.prod-mini-label { font-size: 9px; color: var(--text3); white-space: nowrap; }
.prod-mini-step.active .prod-mini-label { color: var(--text2); font-weight: 600; }
.prod-mini-line {
  flex: 1; height: 2px; background: var(--border);
  margin: 0 2px; margin-bottom: 12px;
}
.prod-mini-line.active { background: var(--green); }

/* 詳細頁大進度條 */
.prod-progress-steps {
  display: flex; align-items: flex-start;
}
.prod-step-col {
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; flex-shrink: 0; min-width: 60px;
}
.prod-step-circle {
  width: 44px; height: 44px; border-radius: 50%;
  border: 2px solid var(--border); background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.prod-step-circle .ti { font-size: 20px; color: var(--text3); }
.prod-step-label { font-size: 11px; color: var(--text3); text-align: center; }
.prod-step-line {
  flex: 1; height: 2px; background: var(--border);
  margin: 0 4px; margin-top: 22px;
}
.prod-step-line.active { background: var(--green); }

/* ════════════════════════════════════════════
   調貨方向選擇
════════════════════════════════════════════ */
.transfer-direction {
  display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px;
  align-items: center; margin-bottom: 4px;
}
.transfer-direction select {
  padding: 12px 10px; font-size: 15px; font-weight: 600;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--text); text-align: center;
}
.transfer-arrow {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--green-light); border: 1px solid var(--green-mid);
  display: flex; align-items: center; justify-content: center;
}
.transfer-arrow .ti { font-size: 18px; color: var(--green); }

/* ════════════════════════════════════════════
   外展相關
════════════════════════════════════════════ */
.event-banner {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; background: var(--purple-light);
  border-radius: var(--radius-sm); margin-bottom: 8px;
  font-size: 14px; font-weight: 600; color: #3D2780; cursor: pointer;
}
.event-banner .ti { font-size: 18px; color: var(--purple); flex-shrink: 0; }
.event-banner-day {
  background: var(--purple); color: white;
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
}
.event-quick-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.event-quick-label { font-size: 12px; color: var(--text2); font-weight: 500; }
.event-quick-grid  { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 10px; }

/* 新版快捷格卡片（含 +/- qty 控制） */
.event-quick-card {
  display: flex; flex-direction: column;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); overflow: hidden;
}
.event-quick-card.sold-out { opacity: 0.45; }
.eq-tap-area {
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 4px 6px; gap: 2px; cursor: pointer; flex: 1;
  -webkit-tap-highlight-color: transparent;
}
.eq-tap-area:active { background: var(--purple-light); }
.event-quick-card.sold-out .eq-tap-area { cursor: not-allowed; }
.eq-qty-row {
  display: flex; align-items: center; justify-content: center; gap: 4px;
  padding: 5px 4px; background: var(--bg); border-top: 1px solid var(--border);
}
.eq-ctrl-btn {
  width: 26px; height: 26px; border: none; border-radius: 6px;
  background: var(--purple-light); color: var(--purple);
  font-size: 17px; font-weight: 700; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; padding: 0; flex-shrink: 0;
}
.eq-ctrl-btn:active { transform: scale(0.88); background: var(--purple-mid); }
.eq-ctrl-btn:disabled { opacity: 0.25; cursor: default; transform: none; }
.eq-qty-num { font-size: 16px; font-weight: 700; min-width: 22px; text-align: center; color: var(--purple); }
.eq-qty-zero { color: var(--text3); font-size: 14px; font-weight: 400; }

.eq-emoji  { font-size: 26px; }
.eq-name   { font-size: 10px; font-weight: 600; color: var(--text); text-align: center; }
.eq-price  { font-size: 11px; color: var(--purple); font-weight: 700; }
.eq-remain { font-size: 11px; font-weight: 700; color: var(--green); }
.eq-remain.eq-low  { color: var(--amber); }
.eq-remain.eq-sold { color: var(--red); }

.ev-row-zero { opacity: 0.55; }
.qty-zero    { color: var(--text3) !important; }
.ev-fill-btn {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: var(--green-light); color: var(--green-dark);
  border: 1px solid var(--green-mid); cursor: pointer; font-weight: 600;
}

/* 對帳表 */
.event-acct-table  { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.event-acct-header { display: grid; grid-template-columns: 1fr 52px 52px 64px; padding: 8px 12px; background: var(--bg); font-size: 12px; font-weight: 600; color: var(--text2); border-bottom: 1px solid var(--border); }
.event-acct-row    { display: grid; grid-template-columns: 1fr 52px 52px 64px; padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; align-items: center; }
.event-acct-row span:not(:first-child) { text-align: center; font-weight: 600; }
.event-acct-row.acct-sold   { background: var(--green-light); }
.event-acct-row.acct-partial span:last-child { color: var(--amber); }
.event-acct-footer { display: grid; grid-template-columns: 1fr 52px 52px 64px; padding: 10px 12px; background: var(--bg); font-size: 13px; font-weight: 700; border-top: 2px solid var(--border); }
.event-acct-footer span:not(:first-child) { text-align: center; }

/* 外展銷售記錄列表 */
.ev-rec-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; border-bottom: 1px solid var(--border);
}
.ev-rec-row:last-child { border-bottom: none; }
.ev-rec-edit {
  background: none; border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 8px; cursor: pointer;
  color: var(--text2); font-size: 14px; flex-shrink: 0;
}
.ev-rec-edit:active { background: var(--bg); }

/* 離線模式卡片 */
.offline-mode-card { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: var(--radius); border: 1.5px solid var(--border); }
.offline-mode-card .ti { font-size: 24px; flex-shrink: 0; }
.offline-mode-card.active   { background: var(--purple-light); border-color: var(--purple-mid); }
.offline-mode-card.active .ti { color: var(--purple); }
.offline-mode-card.normal   { background: var(--surface); }
.offline-mode-card.normal .ti { color: var(--text3); }
.offline-mode-card.uploaded { background: var(--green-light); border-color: var(--green-mid); }
.offline-mode-card.uploaded .ti { color: var(--green); }
.om-title { font-size: 14px; font-weight: 700; color: var(--text); }
.om-sub   { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* 審核差異 */
.review-has-diff { border-color: var(--red) !important; background: #FFF8F8 !important; }

/* ════════════════════════════════════════════
   報表統計
════════════════════════════════════════════ */
.report-stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 8px; text-align: center; }
.rs-num   { font-size: 22px; font-weight: 700; color: var(--text); }
.rs-label { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* ════════════════════════════════════════════
   客製化商品
════════════════════════════════════════════ */
.custom-item-row { cursor: pointer; border: 1.5px dashed var(--purple-mid) !important; background: var(--purple-light) !important; }
.custom-item-row:active { opacity: 0.8; }

/* 照片放大 lightbox */
#lightbox-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.85);
  display: flex; align-items: center; justify-content: center;
}
#lightbox-overlay img {
  max-width: 92vw; max-height: 88vh;
  border-radius: var(--radius); object-fit: contain;
}

</style>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<body>

<!-- 登入頁面已移除（方案B：預設操作員，右上角可提升權限）-->

<!-- ════════════════════════════════════════════
     主應用程式
════════════════════════════════════════════ -->
<div id="app">

  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <i class="ti ti-building-factory-2" style="font-size:22px;color:var(--green);"></i>
      <span class="header-title">庇護工場 ERP</span>
    </div>
    <div class="header-right">
      <div id="sync-status" onclick="manualSync()" class="sync-badge" title="點擊手動同步">
        <i class="ti ti-cloud-off"></i>
        <span>離線</span>
      </div>
      <div class="role-dropdown-wrap">
        <button class="role-badge" id="header-role" onclick="toggleRoleMenu()"></button>
        <div class="role-dropdown" id="role-dropdown" style="display:none;">
          <div class="role-dropdown-current" id="role-dropdown-current"></div>
          <div class="role-dropdown-divider"></div>
          <button class="role-dropdown-item" onclick="escalateRole('manager')">
            <i class="ti ti-user-check"></i> 切換為主管
          </button>
          <button class="role-dropdown-item" onclick="escalateRole('admin')">
            <i class="ti ti-shield-check"></i> 切換為管理員
          </button>
          <button class="role-dropdown-item downgrade" onclick="downgradeToOperator()">
            <i class="ti ti-hard-hat"></i> 切換回操作員
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- 主內容 -->
  <main id="main-content">

    <!-- ══════════ 首頁（儀表板） ══════════ -->
    <div class="page active" id="page-home">
      <div class="page-header">
        <div class="page-title">
          <i class="ti ti-layout-dashboard"></i> 首頁

// ── 商品旗標系統（動態計算，不需要修改每筆資料）──
// canSell:       可在 POS / 訂單賣給客人
// canPurchase:   可建進貨單向廠商採購
// canBeMaterial: 可作為 BOM 材料

function computeItemFlags(item){
  // 手動覆寫優先（後台在商品編輯器設定的例外）
  const overrides = JSON.parse(localStorage.getItem('erp_item_flags') || '{}');
  if(overrides[item.id]) return overrides[item.id];

  const hasSalePrice = item.salePrice && item.salePrice > 0;
  const hasCostPrice = item.costPrice && item.costPrice > 0;
  // 有 BOM 定義的品項視為半成品，預設可作材料
  const hasBom       = (typeof BOM !== 'undefined') && (BOM[item.id]?.length ?? 0) > 0;

  return {
    // 有售價 → 可賣；有 costPrice 也算可賣（可議價的半成品商品）
    canSell:       hasSalePrice || hasCostPrice,
    // 有進貨價 或 無售價（半成品/原料）→ 可進貨
    canPurchase:   hasCostPrice || !hasSalePrice,
    // 沒有售價（半成品/包材）或 有進貨價 或 有 BOM → 可當材料
    canBeMaterial: !hasSalePrice || hasCostPrice || hasBom,
  };
}

// 快捷篩選函式
function getSellableItems(){
  return ALL_ITEMS.filter(i => computeItemFlags(i).canSell && i.active !== false);
}
function getPurchasableItems(){
  return ALL_ITEMS.filter(i => computeItemFlags(i).canPurchase && i.active !== false);
}
function getMaterialItems(){
  return ALL_ITEMS.filter(i => computeItemFlags(i).canBeMaterial && i.active !== false);
}

// ── 商品覆寫（售價/進貨價/安全庫存/啟用）─ 啟動時套用 ──
function applyProductOverrides(overrides){
  if(!overrides) return;
  ALL_ITEMS.forEach(item => {
    const ov = overrides[item.id];
    if(!ov) return;
    // salePrice = 0 視為無效覆寫（防止錯誤 CSV 匯入破壞 POS）
    if(ov.salePrice   !== undefined && ov.salePrice > 0)  item.salePrice   = ov.salePrice;
    if(ov.costPrice   !== undefined && ov.costPrice > 0)  item.costPrice   = ov.costPrice;
    if(ov.safetyStock !== undefined && ov.safetyStock >= 0) item.safetyStock = ov.safetyStock;
    if(ov.active      !== undefined) item.active      = ov.active;
  });
}

// 頁面載入時立即套用 localStorage 裡的覆寫（Firebase 連線前先用本機快取）

  const _savedOv = localStorage.getItem('erp_product_overrides');
  if(_savedOv) applyProductOverrides(JSON.parse(_savedOv));
} catch(e) {}

// ── 自定義商品（透過 CSV 匯入新增，延伸 data.js）──
function applyCustomItems(list){
  const items = list || (() => {
    try { return JSON.parse(localStorage.getItem('erp_custom_items') || '[]'); } catch(e){ return []; }
  })();
  items.forEach(item => {
    if(item && item.id && !ITEM_INDEX[item.id]){
      ALL_ITEMS.push(item);
      ITEM_INDEX[item.id] = item;
    }
  });
}
try { applyCustomItems(); } catch(e){}

// 後台手動覆寫旗標（管理員）
function setItemFlags(itemId, flags){
  const all = JSON.parse(localStorage.getItem('erp_item_flags') || '{}');
  all[itemId] = { ...computeItemFlags(getItem(itemId)), ...flags };
  localStorage.setItem('erp_item_flags', JSON.stringify(all));
  if(typeof pushToFirebase === 'function') pushToFirebase('itemFlags', all);
}

// ── 啟動時從 localStorage 覆蓋 BOM（admin 修改過的） ──
function loadBomOverrides(){
  try {
    const saved = localStorage.getItem('erp_bom');
    if(saved){
      const overrides = JSON.parse(saved);
      Object.keys(overrides).forEach(id => { BOM[id] = overrides[id]; });
    }
  } catch(e){ console.warn('BOM overrides load failed', e); }
}
document.addEventListener('DOMContentLoaded', loadBomOverrides);

// ============================================================
// utils.js — 共用工具函式

// ── 日期時間 ──
function todayStr(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function nowStr(){
  const d = new Date();
  return d.toLocaleString('zh-TW', {
    month:  'numeric',
    day:    'numeric',
    hour:   '2-digit',
    minute: '2-digit',
  });
}

function fmtDate(dateStr){
  if(!dateStr) return '—';
  const [y, m, d] = dateStr.split('-');
  return `${parseInt(m)}/${parseInt(d)}`;
}

function fmtDateFull(dateStr){
  if(!dateStr) return '—';
  const [y, m, d] = dateStr.split('-');
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
}

function addDays(dateStr, n){
  const d = new Date(dateStr);
  d.setDate(d.getDate() + n);
  const y  = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, '0');
  const dy = String(d.getDate()).padStart(2, '0');
  return `${y}-${mo}-${dy}`;
}

// ── 單號產生 ──
function genNo(prefix, existingList, noField = 'no'){
  const d  = new Date();
  const ym = String(d.getFullYear()).slice(2) + String(d.getMonth() + 1).padStart(2, '0');
  const pre = `${prefix}${ym}-`;
  const same = (existingList || []).filter(x => x[noField]?.startsWith(pre)).length;
  return pre + String(same + 1).padStart(3, '0');
}

// ── 格式化金額 ──
function fmtMoney(n){
  if(isNaN(n)) return '$0';
  return '$' + Number(n).toLocaleString();
}

// ── Toast 提示 ──
function showToast(msg, duration = 2000){
  const el = document.getElementById('toast');
  if(!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), duration);
}

// ── 確認對話框（Promise 版）──
function confirmDialog(msg){
  return new Promise(resolve => resolve(confirm(msg)));
}

// ── 深拷貝 ──
function deepCopy(obj){
  return JSON.parse(JSON.stringify(obj));
}

// ── 計算折扣後金額 ──
function calcItemTotal(originalPrice, qty, unitPrice){
  // unitPrice 可能是被改過的單品價格
  const price = unitPrice ?? originalPrice;
  return price * qty;
}

function calcOrderTotal(items, orderDiscount){
  const subtotal = items.reduce((s, item) => {
    return s + calcItemTotal(item.originalPrice, item.qty, item.unitPrice);
  }, 0);

  if(!orderDiscount) return subtotal;

  if(orderDiscount.type === 'percent'){
    return Math.round(subtotal * (1 - orderDiscount.value / 100));
  }
  if(orderDiscount.type === 'amount'){
    return Math.max(0, subtotal - orderDiscount.value);
  }
  return subtotal;
}

// ── 折扣說明文字 ──
function discountLabel(discount){
  if(!discount) return '';
  if(discount.type === 'percent') return `${discount.value}% off`;
  if(discount.type === 'amount')  return `折 $${discount.value}`;
  return '';
}

// ============================================================
// logger.js — 操作記錄
// 所有庫存異動、銷售、生產都透過這裡記錄
// ============================================================

let logs = [];

function loadLogs(){
  try {
    logs = JSON.parse(localStorage.getItem('erp_logs') || '[]');
  } catch(e){
    logs = [];
  }
}

function saveLogs(){
  // 只保留最新 1000 筆在本機，完整資料在 Firebase
  localStorage.setItem('erp_logs', JSON.stringify(logs.slice(-1000)));
}

// ── 新增記錄 ──
function addLog(data){
  const log = {
    _ts:        Date.now(),
    _device:    typeof DEVICE_ID !== 'undefined' ? DEVICE_ID : 'unknown',
    time:       nowStr(),
    role:       currentRole() || 'operator',
    ...data,
  };
  logs.push(log);
  saveLogs();

  // 推送到 Firebase（firebase.js 提供）
  if(typeof pushLogToFirebase === 'function'){
    pushLogToFirebase(log);
  }
  return log;
}

// ── 查詢 ──
function getLogsByRef(refId){
  return logs.filter(l => l.refId === refId);
}
function getLogsByLocation(locationId){
  return logs.filter(l => l.locationId === locationId);
}
function getLogsByProduct(productId){
  return logs.filter(l => l.productId === productId);
}
function getLogsByDateRange(from, to){
  return logs.filter(l => {
    if(!l.time) return false;
    const parts = l.time.match(/(\d+)\/(\d+)/);
    if(!parts) return false;
    const year = new Date().getFullYear();
    const ds = `${year}-${String(parts[1]).padStart(2,'0')}-${String(parts[2]).padStart(2,'0')}`;
    if(from && ds < from) return false;
    if(to   && ds > to)   return false;
    return true;
  });
}

const PURCHASE_OPS = ['stock_in', 'purchase'];
const PRODUCE_OPS  = ['produce', 'produce_deduct'];

function getPurchaseLogs() { return logs.filter(l => PURCHASE_OPS.includes(l.op)); }
function getProduceLogs()  { return logs.filter(l => PRODUCE_OPS.includes(l.op)); }

// ── 初始化 ──
document.addEventListener('DOMContentLoaded', loadLogs);

// ============================================================
// auth.js — 權限系統（方案B）
// 預設操作員身份，需要時提升權限
// ============================================================

const SESSION_KEY   = 'erp_session';
const SESSION_HOURS = 8;

// ── Session ──
function getSession(){
  try {
    const s = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
    if(!s) return null;
    if(Date.now() - s.loginAt > SESSION_HOURS * 3600 * 1000){
      localStorage.removeItem(SESSION_KEY);
      return null;
    }
    return s;
  } catch(e){ return null; }
}
function setSession(role){
  localStorage.setItem(SESSION_KEY, JSON.stringify({ role, loginAt: Date.now() }));
}
function clearSession(){
  localStorage.removeItem(SESSION_KEY);
}

// ── 角色判斷 ──
function currentRole(){ return getSession()?.role || 'operator'; }
function isLoggedIn()  { return true; } // 永遠可以用操作員身份
function isOperator()  { return true; } // 操作員功能全員開放
function isManager()   { return ['manager','admin'].includes(currentRole()); }
function isAdmin()     { return currentRole() === 'admin'; }

// ── PIN 管理 ──
let _pins = {
  manager: localStorage.getItem('erp_pin_manager') || '1234',
  admin:   localStorage.getItem('erp_pin_admin')   || '876300',
};

function loadPinsFromFirebase(){
  if(typeof _db === 'undefined' || !_db) return;
  _db.ref('erp/config/pins').once('value').then(snap => {
    const data = snap.val();
    if(!data) return;
    if(data.manager){ _pins.manager = data.manager; localStorage.setItem('erp_pin_manager', data.manager); }
    if(data.admin)  { _pins.admin   = data.admin;   localStorage.setItem('erp_pin_admin',   data.admin);   }
  }).catch(() => {});
}
function savePinsToFirebase(){
  if(typeof _db === 'undefined' || !_db) return;
  _db.ref('erp/config/pins').set(_pins).catch(() => {});
}

// ── 權限檢查 ──
const MANAGER_PAGES = [
  'admin','admin-products','admin-bom','admin-bom-edit',
  'admin-suppliers','admin-system','admin-locations','admin-import',
  'finance','unpaid','event-review',
];
const ADMIN_PAGES = ['admin-system'];

function canAccess(pageName){
  if(ADMIN_PAGES.includes(pageName))   return isAdmin();
  if(MANAGER_PAGES.includes(pageName)) return isManager();
  return true;
}

// 需要主管才能執行的操作（inline，不跳頁）
function requireManager(callback, reason){
  if(isManager()){
    if(typeof callback === 'function') callback();
    return true;
  }
  // 彈出提升權限 Modal
  openEscalateModal('manager', callback, reason);
  return false;
}
function requireAdmin(callback, reason){
  if(isAdmin()){
    if(typeof callback === 'function') callback();
    return true;
  }
  openEscalateModal('admin', callback, reason);
  return false;
}

// ── 提升權限 Modal（方案B 核心）──
let _escalateCallback = null;
let _escalateTarget   = null;

function openEscalateModal(targetRole, callback, reason){
  _escalateTarget   = targetRole;
  _escalateCallback = callback;

  const labels = { manager:'👔 主管', admin:'👑 管理員' };
  document.getElementById('escalate-title').textContent =
    labels[targetRole] + ' 權限驗證';
  document.getElementById('escalate-reason').textContent =
    reason || '此操作需要更高權限';
  document.getElementById('escalate-pin-input').value = '';
  document.getElementById('escalate-pin-error').style.display = 'none';
  document.getElementById('escalateModal').style.display = 'flex';
  setTimeout(() => document.getElementById('escalate-pin-input').focus(), 200);
}

function submitEscalatePin(){
  const val        = document.getElementById('escalate-pin-input').value.trim();
  const correctPin = _pins[_escalateTarget];

  if(val === correctPin){
    // 提升 Session
    setSession(_escalateTarget);
    document.getElementById('escalateModal').style.display = 'none';
    applyRoleUI();
    const labels = { manager:'👔 已切換為主管模式', admin:'👑 已切換為管理員模式' };
    showToast(labels[_escalateTarget]);
    // 執行原本要做的事
    if(typeof _escalateCallback === 'function'){
      _escalateCallback();
      _escalateCallback = null;
    }
  } else {
    document.getElementById('escalate-pin-error').style.display = 'block';
    document.getElementById('escalate-pin-input').value = '';
    document.getElementById('escalate-pin-input').focus();
  }
}
function closeEscalateModal(e){
  if(!e || e.target === document.getElementById('escalateModal')){
    document.getElementById('escalateModal').style.display = 'none';
    _escalateCallback = null;
  }
}

// ── 降回操作員 ──
function downgradeToOperator(){
  setSession('operator');
  applyRoleUI();
  showToast('👷 已切換回操作員模式');
}

// ── 套用角色 UI ──
function applyRoleUI(){
  const role   = currentRole();
  const labels = { operator:'👷 操作員', manager:'👔 主管', admin:'👑 管理員' };
  const el     = document.getElementById('header-role');
  if(el) el.textContent = labels[role] || '👷 操作員';
}

// ── 修改 PIN（管理員專用）──
function openChangePinModal(){
  if(!requireAdmin(null, '修改 PIN 碼需要管理員權限')) return;
  document.getElementById('change-pin-role').value         = 'manager';
  document.getElementById('new-pin-val').value             = '';
  document.getElementById('new-pin-confirm-val').value     = '';
  document.getElementById('pin-change-error').style.display = 'none';
  document.getElementById('changePinModal').style.display   = 'flex';
}
function closeChangePinModal(e){
  if(!e || e.target === document.getElementById('changePinModal'))
    document.getElementById('changePinModal').style.display = 'none';
}
function submitChangePin(){
  const role   = document.getElementById('change-pin-role').value;
  const nw     = document.getElementById('new-pin-val').value.trim();
  const nwc    = document.getElementById('new-pin-confirm-val').value.trim();
  const errEl  = document.getElementById('pin-change-error');
  const minLen = role === 'admin' ? 6 : 4;
  if(nw.length < minLen){ errEl.textContent = `至少 ${minLen} 位`; errEl.style.display='block'; return; }
  if(nw !== nwc)        { errEl.textContent = '兩次輸入不一致';     errEl.style.display='block'; return; }
  _pins[role] = nw;
  localStorage.setItem(`erp_pin_${role}`, nw);
  savePinsToFirebase();
  document.getElementById('changePinModal').style.display = 'none';
  showToast(`✅ ${role === 'admin' ? '管理員' : '主管'} PIN 已更新`);
}

// ── 初始化：預設操作員，不需要登入 ──
document.addEventListener('DOMContentLoaded', () => {
  // 如果沒有 session，預設設為操作員
  if(!getSession()) setSession('operator');
  applyRoleUI();
  loadPinsFromFirebase();

  // Enter 鍵
  document.getElementById('escalate-pin-input')?.addEventListener('keydown', e => {
    if(e.key === 'Enter') submitEscalatePin();
  });
});

<script>
/* ── js/locations.js ── */
// ============================================================
// locations.js — 地點管理（動態，支援擴充）
// ============================================================

// ── 預設地點（首次啟動時寫入 localStorage）──
const DEFAULT_LOCATIONS = [
  { id:'store_A', name:'A 門市', type:'store_main', isMain:true,  active:true },
  { id:'store_B', name:'B 門市', type:'store_sub',  isMain:false, active:true },
];

// ── 讀寫 ──
let locations = [];

function loadLocations(){
  const saved = localStorage.getItem('erp_locations');
  if(saved){
    locations = JSON.parse(saved);
  } else {
    locations = JSON.parse(JSON.stringify(DEFAULT_LOCATIONS));
    saveLocations();
  }
}

function saveLocations(){
  localStorage.setItem('erp_locations', JSON.stringify(locations));
}

// ── 查詢 ──
function getLocation(id){
  return locations.find(l => l.id === id) || null;
}
function getMainLocation(){
  return locations.find(l => l.type === 'store_main' && l.active) || locations[0];
}
function getStoreLocations(){
  return locations.filter(l =>
    (l.type === 'store_main' || l.type === 'store_sub') && l.active
  );
}
function getActiveLocations(){
  return locations.filter(l => l.active);
}

// ── 新增地點（管理員） ──
function addLocation(data){
  const id = data.id || 'loc_' + Date.now();
  if(locations.find(l => l.id === id)){
    showToast('⚠️ 此地點 ID 已存在');
    return false;
  }
  locations.push({ ...data, id, active:true });
  saveLocations();
  syncLocationsToFirebase();
  return true;
}

// ── 修改地點 ──
function updateLocation(id, data){
  const idx = locations.findIndex(l => l.id === id);
  if(idx < 0) return false;
  locations[idx] = { ...locations[idx], ...data };
  saveLocations();
  syncLocationsToFirebase();
  return true;
}

// ── Firebase 同步（由 firebase.js 提供）──
function syncLocationsToFirebase(){
  if(typeof pushToFirebase === 'function'){
    pushToFirebase('locations', locations);
  }
}

// ── 初始化 ──
document.addEventListener('DOMContentLoaded', loadLocations);

</script>
<script>
/* ── js/inventory.js ── */
// ============================================================
// inventory.js — 多地點庫存管理
// ============================================================

// ── 資料結構 ──
// inventory = { 'F003001': { 'store_A': 80, 'store_B': 15 } }
let inventory = {};

function loadInventory(){
  const saved = localStorage.getItem('erp_inventory');
  if(saved){
    inventory = JSON.parse(saved);
  } else {
    resetInventoryToDefault();
  }
}

function saveInventory(){
  localStorage.setItem('erp_inventory', JSON.stringify(inventory));
}

// ── 重設為初始值（全部 0，正式上線時再匯入）──
function resetInventoryToDefault(){
  inventory = {};
  ALL_ITEMS.forEach(item => {
    inventory[item.id] = { store_A: 0 };
    // 有 B 門市就加上 B
    if(locations && locations.find(l => l.id === 'store_B')){
      inventory[item.id].store_B = 0;
    }
  });
  saveInventory();
}

// ── 查詢 ──
function getStock(productId, locationId){
  return inventory[productId]?.[locationId] ?? 0;
}

function getTotalStock(productId){
  const locs = inventory[productId];
  if(!locs) return 0;
  return Object.values(locs).reduce((s, v) => s + (v || 0), 0);
}

function getStockSummary(productId){
  // 回傳各地點庫存，包含地點名稱
  const result = [];
  const locs = inventory[productId] || {};
  Object.keys(locs).forEach(locId => {
    const loc = getLocation(locId);
    if(loc && locs[locId] > 0){
      result.push({
        locationId:   locId,
        locationName: loc.name,
        qty:          locs[locId],
      });
    }
  });
  return result;
}

// 低庫存警示（依安全庫存判斷）
function isLowStock(productId){
  const item = getItem(productId);
  if(!item) return false;
  const total = getTotalStock(productId);
  return total <= item.safetyStock;
}

function isOutOfStock(productId, locationId){
  return getStock(productId, locationId) <= 0;
}

// ── 異動（所有庫存變動都透過這個函式）──
function adjustStock(productId, locationId, delta, opts = {}){
  // opts: { refId, refType, note, deviceId }
  if(!inventory[productId]) inventory[productId] = {};
  const before = inventory[productId][locationId] ?? 0;
  const after  = Math.max(0, before + delta);
  inventory[productId][locationId] = after;
  saveInventory();

  // 寫入操作記錄
  addLog({
    op:          delta > 0 ? 'stock_in' : 'stock_out',
    locationId,
    productId,
    productName: getItem(productId)?.name || productId,
    qty:         Math.abs(delta),
    before,
    after,
    ...opts,
  });

  return after;
}

// 批次異動（同一張單多個品項）
function adjustStockBatch(items, locationId, direction, opts = {}){
  // direction: 'in' | 'out'
  items.forEach(({ productId, qty }) => {
    const delta = direction === 'in' ? qty : -qty;
    adjustStock(productId, locationId, delta, opts);
  });
}

// ── 調貨（A→B 同時扣增）──
function transferStock(items, fromLocationId, toLocationId, opts = {}){
  items.forEach(({ productId, qty }) => {
    adjustStock(productId, fromLocationId, -qty, { ...opts, note:`調撥至 ${toLocationId}` });
    adjustStock(productId, toLocationId,  +qty, { ...opts, note:`從 ${fromLocationId} 調入` });
  });
}

// ── 庫存警示列表 ──
function getLowStockItems(){
  return ALL_ITEMS.filter(item => isLowStock(item.id));
}

// ── 渲染庫存總覽（首頁用）──
function renderInventorySummary(){
  const el = document.getElementById('inventory-summary');
  if(!el) return;
  const low = getLowStockItems();

  // 效期警示（expiry.js 載入後才有此函式）
  const expiryCount = typeof getExpiryAlertCount === 'function' ? getExpiryAlertCount() : 0;
  const expiryBanner = expiryCount > 0
    ? `<div class="inv-warn-row" style="cursor:pointer;background:rgba(230,168,23,0.1);border-left:3px solid var(--amber);"
        onclick="initExpiryPage();showPage('expiry')">
        <span><i class="ti ti-calendar-event" style="color:var(--amber);margin-right:6px;"></i>
          ${expiryCount} 批次效期將至（30天內）</span>
        <span style="color:var(--amber);font-size:12px;">查看 →</span>
      </div>`
    : '';

  if(!low.length && !expiryCount){
    el.innerHTML = `<div class="inv-ok"><i class="ti ti-circle-check"></i> 庫存充足，無警示</div>`;
    return;
  }
  el.innerHTML = expiryBanner + low.slice(0,5).map(item => {
    const total = getTotalStock(item.id);
    return `<div class="inv-warn-row" onclick="showPage('inventory-detail');selectProduct('${item.id}')">
      <span>${item.emoji} ${item.name}</span>
      <span class="inv-qty ${total <= 0 ? 'empty' : 'low'}">${total}</span>
    </div>`;
  }).join('') + (low.length > 5 ? `<div class="inv-more">還有 ${low.length-5} 項偏低...</div>` : '');
}

// ── 初始化 ──
document.addEventListener('DOMContentLoaded', loadInventory);

</script>
<script>
/* ── js/firebase.js ── */
// ============================================================
// firebase.js — Firebase 即時同步（防衝突版）
// ============================================================

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyACV9lvcVKHa8q_Lmdzyg-U1SzmlsGz9Uo",
  authDomain:        "erp-app-90278.firebaseapp.com",
  databaseURL:       "https://erp-app-90278-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "erp-app-90278",
  storageBucket:     "erp-app-90278.firebasestorage.app",
  messagingSenderId: "58148662994",
  appId:             "1:58148662994:web:c19221105ba36b0b45470b",
};

// 裝置識別碼
const DEVICE_ID = (() => {
  let id = localStorage.getItem('erp_device_id');
  if(!id){
    id = 'D' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    localStorage.setItem('erp_device_id', id);
  }
  return id;
})();

let _db        = null;
let _fbReady   = false;
let _myWriteAt = 0;   // 自己最後寫入時間（避免自觸發）

// ── 同步狀態 ──
function setSyncStatus(status, msg){
  const el = document.getElementById('sync-status');
  if(!el) return;
  const cfg = {
    ok:      { cls:'ok',      icon:'ti-cloud-check',  text: msg || '已同步' },
    syncing: { cls:'syncing', icon:'ti-cloud-upload',  text: msg || '同步中...' },
    offline: { cls:'',        icon:'ti-cloud-off',     text: msg || '離線' },
    error:   { cls:'error',   icon:'ti-cloud-x',       text: msg || '錯誤' },
  };
  const c = cfg[status] || cfg.offline;
  el.className = `sync-badge ${c.cls}`;
  el.innerHTML = `<i class="ti ${c.icon}"></i><span>${c.text}</span>`;
}

// ── 初始化 ──
function initFirebase(){
  try {
    if(typeof firebase === 'undefined'){ setSyncStatus('offline'); return; }
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    _db      = firebase.database();
    _fbReady = true;
    setSyncStatus('ok', '已連線');

    _db.ref('.info/connected').on('value', snap => {
      if(snap.val()){
        setSyncStatus('ok', '已連線');
        pullAll();
      } else {
        setSyncStatus('offline', '離線中');
      }
    });

    pullAll();
    setTimeout(listenRemoteChanges, 2000);

  } catch(err){
    console.error('Firebase 初始化失敗:', err);
    setSyncStatus('error');
  }
}

// ── 從 Firebase 拉取全部資料 ──
function pullAll(){
  if(!_fbReady) return;
  setSyncStatus('syncing', '載入中...');
  _db.ref('erp').once('value').then(snap => {
    const data = snap.val();
    if(!data){ setSyncStatus('ok', '已連線（空白）'); return; }
    applyRemoteData(data);
    const t = new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    setSyncStatus('ok', `同步 ${t}`);
  }).catch(err => {
    console.error('拉取失敗:', err);
    setSyncStatus('error', '讀取失敗');
  });
}

function applyRemoteData(data){
  if(data.inventory){
    inventory = data.inventory;
    localStorage.setItem('erp_inventory', JSON.stringify(inventory));
    if(typeof renderInventorySummary === 'function') renderInventorySummary();
  }
  if(data.locations && Array.isArray(data.locations)){
    locations = data.locations;
    saveLocations();
  }
  if(data.bom){
    Object.keys(data.bom).forEach(id => { BOM[id] = data.bom[id]; });
    localStorage.setItem('erp_bom', JSON.stringify(BOM));
  }
  if(data.productOverrides && typeof applyProductOverrides === 'function'){
    localStorage.setItem('erp_product_overrides', JSON.stringify(data.productOverrides));
    applyProductOverrides(data.productOverrides);
  }
  if(data.customItems && typeof applyCustomItems === 'function'){
    const list = Array.isArray(data.customItems) ? data.customItems : Object.values(data.customItems);
    localStorage.setItem('erp_custom_items', JSON.stringify(list));
    applyCustomItems(list);
  }
  if(data.logs){
    const remote = typeof data.logs === 'object' ? Object.values(data.logs) : data.logs;
    // 以 _fbKey 為 key 建立 Map，本機修改過的版本（_ts 較新）優先保留
    const remoteMap = new Map(remote.map(l => [l._fbKey, l]));
    logs.forEach(l => {
      if(!l._fbKey) return; // 純本機記錄後面再加
      const r = remoteMap.get(l._fbKey);
      if(!r || (l._ts||0) > (r._ts||0)){
        remoteMap.set(l._fbKey, l); // 本機版本較新，覆蓋遠端舊版
      }
    });
    const localOnly = logs.filter(l => !l._fbKey); // 無 fbKey 的純本機記錄
    const merged = [...remoteMap.values(), ...localOnly].sort((a,b)=>(a._ts||0)-(b._ts||0));
    logs = merged;
    localStorage.setItem('erp_logs', JSON.stringify(logs.slice(-1000)));
  }
  // customers, estimates, orders 等由各自的模組處理
  const collectionMap = {
    customers:        'erp_customers',
    estimates:        'erp_estimates',
    orders:           'erp_orders',
    productionOrders: 'erp_production_orders',
    purchases:        'erp_purchases',
    transfers:        'erp_transfers',
    events:           'erp_events',
    storeBSales:      'erp_storeb_sales',
    giftOrders:       'erp_gift_orders',
    processingLogs:   'erp_processing_logs',
    customItems:      'erp_custom_items',
  };
  Object.keys(collectionMap).forEach(key => {
    if(data[key]){
      const arr = Array.isArray(data[key]) ? data[key] : Object.values(data[key]);
      localStorage.setItem(collectionMap[key], JSON.stringify(arr));
      // 通知對應模組更新變數
      const varMap = {
        customers:        'customers',
        estimates:        'estimates',
        orders:           'orders',
        productionOrders: 'productionOrders',
        purchases:        'purchases',
        transfers:        'transfers',
        events:           'events',
        storeBSales:      'storeBSales',
        giftOrders:       'giftOrders',
        processingLogs:   'processingLogs',
        customItems:      'customItems',
      };
      if(typeof window[varMap[key]] !== 'undefined') window[varMap[key]] = arr;
    }
  });
}

// ── 監聽其他裝置變更 ──
function listenRemoteChanges(){
  if(!_fbReady) return;

  // 庫存（單欄位更新）
  _db.ref('erp/inventory').on('value', snap => {
    if(Date.now() - _myWriteAt < 2000) return;
    const data = snap.val();
    if(!data) return;
    inventory = data;
    localStorage.setItem('erp_inventory', JSON.stringify(inventory));
    if(typeof renderInventorySummary === 'function') renderInventorySummary();
  });

  // 記錄（只監聽新增）
  _db.ref('erp/logs').limitToLast(50).on('child_added', snap => {
    if(Date.now() - _myWriteAt < 2000) return;
    const log = snap.val();
    if(!log || logs.find(l => l._fbKey === snap.key)) return;
    log._fbKey = snap.key;
    logs.push(log);
    logs.sort((a,b) => (a._ts||0) - (b._ts||0));
    localStorage.setItem('erp_logs', JSON.stringify(logs.slice(-1000)));
  });

  // 其他集合（整批監聽）
  ['customers','estimates','orders','productionOrders','events','transfers'].forEach(key => {
    _db.ref(`erp/${key}`).on('value', snap => {
      if(Date.now() - _myWriteAt < 2000) return;
      const data = snap.val();
      if(!data) return;
      const arr = Array.isArray(data) ? data : Object.values(data);
      if(typeof window[key] !== 'undefined') window[key] = arr;
    });
  });
}

// ── 推送到 Firebase ──
function pushToFirebase(key, data){
  if(!_fbReady || !_db) return;
  _myWriteAt = Date.now();
  _db.ref(`erp/${key}`).set(data).then(() => {
    const t = new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    setSyncStatus('ok', `同步 ${t}`);
  }).catch(err => {
    console.error('推送失敗:', err);
    setSyncStatus('error', '同步失敗');
  });
}

// 記錄專用（push key，永不衝突）
function pushLogToFirebase(log){
  if(!_fbReady || !_db) return;
  _myWriteAt = Date.now();
  log._ts     = log._ts     || Date.now();
  log._device = log._device || DEVICE_ID;
  const ref = _db.ref('erp/logs').push(log);
  log._fbKey  = ref.key;
}

// 更新單筆記錄（主管修改銷售用）
function updateLogInFirebase(log){
  if(!_fbReady || !_db || !log._fbKey) return;
  _myWriteAt = Date.now();
  _db.ref(`erp/logs/${log._fbKey}`).set(log).catch(err => console.warn('更新記錄失敗:', err));
}

// 刪除單筆記錄（主管刪除銷售用）
function deleteLogFromFirebase(fbKey){
  if(!_fbReady || !_db || !fbKey) return;
  _myWriteAt = Date.now();
  _db.ref(`erp/logs/${fbKey}`).remove().catch(err => console.warn('刪除記錄失敗:', err));
}

// ── 手動同步 ──
function manualSync(){
  if(!_fbReady){ showToast('⚠️ 尚未連上 Firebase'); return; }
  showToast('🔄 正在同步...');
  pullAll();
}

// ── 初始化 ──
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(initFirebase, 600);
});

</script>
<script>
/* ── js/customers.js ── */
// ============================================================
// customers.js — 客戶管理
// ============================================================

let customers = JSON.parse(localStorage.getItem('erp_customers') || '[]');
function saveCustomers(){
  localStorage.setItem('erp_customers', JSON.stringify(customers));
  if(typeof pushToFirebase === 'function') pushToFirebase('customers', customers);
}

// ── 查詢 ──
function getCustomer(id){ return customers.find(c => c.id === id) || null; }

// ── 列表渲染 ──
function renderCustomerList(q = ''){
  const el = document.getElementById('customer-list');
  if(!el) return;
  let list = q
    ? customers.filter(c =>
        c.name?.includes(q) || c.contact?.includes(q) || c.tel?.includes(q))
    : customers;
  list = list.slice().sort((a,b) => a.name?.localeCompare(b.name,'zh-TW'));
  if(!list.length){
    el.innerHTML = `<div class="order-empty">${q?'找不到符合的客戶':'尚未建立客戶，點右上角新增'}</div>`;
    return;
  }
  el.innerHTML = list.map(c => `
    <div class="list-card" onclick="showCustomerDetail('${c.id}')">
      <div class="list-card-top">
        <span class="list-card-no">${c.name}</span>
        ${c.source ? `<span class="status-badge badge-active" style="font-size:11px;">${sourceLabel(c.source)}</span>` : ''}
      </div>
      <div class="list-card-meta">
        ${c.contact ? `<span><i class="ti ti-user"></i>${c.contact}</span>` : ''}
        ${c.tel     ? `<span><i class="ti ti-phone"></i>${c.tel}</span>` : ''}
        ${c.email   ? `<span><i class="ti ti-mail"></i>${c.email}</span>` : ''}
      </div>
    </div>`).join('');
}

function sourceLabel(s){
  return { phone:'電話', online:'網路', walkin:'門市', exhibition:'外展' }[s] || s;
}

// ── 新增 / 編輯 ──
let _editCustomerId = null;
let _custFromContext = null; // 從哪個頁面來的

function newCustomer(fromContext){
  _editCustomerId  = null;
  _custFromContext = fromContext || null;
  resetCustomerForm();
  document.getElementById('customer-form-title').textContent = '新增客戶';
  showPage('customer-edit');
}

function editCustomer(id){
  const c = getCustomer(id);
  if(!c) return;
  _editCustomerId = id;
  fillCustomerForm(c);
  document.getElementById('customer-form-title').textContent = '編輯客戶';
  showPage('customer-edit');
}

function resetCustomerForm(){
  ['nc-name','nc-contact','nc-tel','nc-email','nc-fax',
   'nc-invoice-title','nc-tax-id','nc-receiver','nc-receiver-tel','nc-addr']
    .forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
  document.getElementById('nc-source').value = 'phone';
}

function fillCustomerForm(c){
  const setVal = (id, val) => { const el = document.getElementById(id); if(el) el.value = val || ''; };
  setVal('nc-name',          c.name);
  setVal('nc-source',        c.source || 'phone');
  setVal('nc-contact',       c.contact);
  setVal('nc-tel',           c.tel);
  setVal('nc-email',         c.email);
  setVal('nc-fax',           c.fax);
  setVal('nc-invoice-title', c.invoiceTitle);
  setVal('nc-tax-id',        c.taxId);
  setVal('nc-receiver',      c.receiver);
  setVal('nc-receiver-tel',  c.receiverTel);
  setVal('nc-addr',          c.address);
}

function saveCustomer(){
  const name = document.getElementById('nc-name')?.value.trim();
  if(!name){ showToast('⚠️ 請填寫公司名稱或客戶姓名'); return; }
  const data = {
    name,
    source:       document.getElementById('nc-source')?.value         || 'phone',
    contact:      document.getElementById('nc-contact')?.value.trim() || '',
    tel:          document.getElementById('nc-tel')?.value.trim()     || '',
    email:        document.getElementById('nc-email')?.value.trim()   || '',
    fax:          document.getElementById('nc-fax')?.value.trim()     || '',
    invoiceTitle: document.getElementById('nc-invoice-title')?.value.trim() || '',
    taxId:        document.getElementById('nc-tax-id')?.value.trim()  || '',
    receiver:     document.getElementById('nc-receiver')?.value.trim()     || '',
    receiverTel:  document.getElementById('nc-receiver-tel')?.value.trim() || '',
    address:      document.getElementById('nc-addr')?.value.trim()    || '',
  };
  if(_editCustomerId){
    const idx = customers.findIndex(c => c.id === _editCustomerId);
    if(idx >= 0) customers[idx] = { ...customers[idx], ...data };
    saveCustomers();
    showToast('✅ 客戶資料已更新');
    showCustomerDetail(_editCustomerId);
  } else {
    const c = { id:'C'+Date.now(), ...data, createdAt: todayStr() };
    customers.push(c);
    saveCustomers();
    showToast('✅ 客戶已新增：' + name);
    if(_custFromContext === 'estimate'){
      selectCustomerForEstimate(c.id);
    } else if(_custFromContext === 'order'){
      selectCustomerForOrder(c.id);
    } else {
      showCustomerDetail(c.id);
    }
  }
}

      ${c.invoiceTitle||c.taxId ? '<div class="cust-section-label" style="margin-top:10px;">發票資訊</div>' : ''}
      ${c.invoiceTitle ? `<div class="cust-info-row"><i class="ti ti-receipt"></i>${c.invoiceTitle}</div>` : ''}
      ${c.taxId        ? `<div class="cust-info-row"><i class="ti ti-hash"></i>統編：${c.taxId}</div>` : ''}
