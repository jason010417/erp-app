function renderUnpaid(){
  const unpaid  = orders.filter(o=>o.payStatus==='unpaid'  &&o.status!=='archived');
  const partial = orders.filter(o=>o.payStatus==='partial' &&o.status!=='archived');
  const owed    = unpaid.reduce((s,o)=>s+(o.totalAmount||0),0)
                + partial.reduce((s,o)=>s+(o.totalAmount||0)-(o.paidAmount||0),0);

  const statsEl = document.getElementById('unpaid-stats');
  if(statsEl) statsEl.innerHTML = `
    <div class="form-card" style="text-align:center;">
      <div style="font-size:22px;font-weight:700;color:var(--red);">${unpaid.length}</div>
      <div style="font-size:12px;color:var(--text2);">未收款</div>
    </div>
    <div class="form-card" style="text-align:center;">
      <div style="font-size:22px;font-weight:700;color:var(--amber);">${partial.length}</div>
      <div style="font-size:12px;color:var(--text2);">部分收款</div>
    </div>
    <div class="form-card" style="text-align:center;">
      <div style="font-size:22px;font-weight:700;color:var(--red);">${fmtMoney(owed)}</div>
      <div style="font-size:12px;color:var(--text2);">應收總金額</div>
    </div>`;

  const list   = [...unpaid,...partial].sort((a,b)=>a.createdAt<b.createdAt?1:-1);
  const listEl = document.getElementById('unpaid-list');
  if(!listEl) return;
  listEl.innerHTML = list.length
    ? list.map(o => {
        const cust = getCustomer(o.customerId);
        const owe  = o.payStatus==='partial'?(o.totalAmount||0)-(o.paidAmount||0):(o.totalAmount||0);
        return `<div class="list-card" onclick="showOrderDetail('${o.id}')">
          <div class="list-card-top">
            <span class="list-card-no">${o.no}</span>
            ${payStatusBadge(o.payStatus)}
          </div>
          <div class="list-card-meta">
            ${cust?`<span><i class="ti ti-user"></i>${cust.name}</span>`:''}
            <span><i class="ti ti-calendar"></i>${fmtDate(o.createdAt)}</span>
          </div>
          <div class="list-card-footer">
            <span style="color:var(--red);font-size:16px;font-weight:700;">應收 ${fmtMoney(owe)}</span>
          </div>
        </div>`;
      }).join('')
    : '<div class="order-empty" style="background:var(--green-light);color:var(--green-dark);">🎉 沒有未收款訂單</div>';
}

// ── 工具 ──
function filterLogsByDate(rows, from, to){
  if(!from&&!to) return rows;
  return rows.filter(l => {
    const d = getLogDate(l); if(!d) return true;
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if(from && ds < from) return false;
    if(to   && ds > to)   return false;
    return true;
  });
}
function clearReportFilter(type){
  const ids = type==='sale'
    ? ['sr-customer','sr-item','sr-date-from','sr-date-to']
    : ['pr-supplier','pr-item','pr-date-from','pr-date-to'];
  ids.forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  if(type==='sale')   renderSaleReport();
  else                renderPurchaseReport();
}
function exportSaleReport(){
  const rows = logs.filter(l =>
    (l.op==='pos_sale' && !l.eventId) || l.op==='order_ship' || l.op==='event_settle'
  );
  if(!rows.length){ showToast('沒有記錄可匯出'); return; }
  const csv  = '時間,品項,數量,金額,客戶\n'
    + rows.map(l => {
        const name = l.op==='event_settle' ? (l.eventName||'')+'外展結算' : (l.productName||'');
        return `${l.time||''},${name},${l.qty||0},${l.amount||0},${getCustomer(l.customerId)?.name||''}`;
      }).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=`銷貨明細_${todayStr()}.csv`; a.click();
  URL.revokeObjectURL(url);
  showToast('✅ CSV 已下載');
}

// ════════════════════════════════

function _loadCashRecords(){
  return JSON.parse(localStorage.getItem('erp_cash_reconcile') || '[]');
}
function _saveCashRecords(arr){
  localStorage.setItem('erp_cash_reconcile', JSON.stringify(arr));
  if(typeof pushToFirebase === 'function') pushToFirebase('cashReconcile', arr);
}

function initCashReconcilePage(){
  const page = document.getElementById('page-cash-reconcile');
  if(!page) return;
  const today = todayStr();
  // 今日現金銷售（POS 現金 + 訂單出貨）
  const todayCashLogs = logs.filter(l => {
    if(l.op !== 'pos_sale' || l.eventId) return false;
    if(l.payMethod && l.payMethod !== 'cash') return false;
    const d = getLogDate(l);
    if(!d) return false;
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    return ds === today;
  });
  const expectedCash = todayCashLogs.reduce((s,l) => s + (l.amount||0), 0);
  const records = _loadCashRecords();
  const todayRecord = records.find(r => r.date === today);

  page.innerHTML = `
    <div class="op-header">
      <button class="back-btn" onclick="showPage('sales-menu')"><i class="ti ti-arrow-left"></i></button>
      <div class="op-title"><i class="ti ti-cash" style="color:var(--green);"></i> 每日現金對帳</div>
    </div>

    <div class="form-card">
      <div style="font-size:12px;color:var(--text3);margin-bottom:4px;">今日（${today}）</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
        <div class="report-stat" style="background:var(--green-light);">
          <div class="rs-num" style="color:var(--green);">${fmtMoney(expectedCash)}</div>
          <div class="rs-label">系統現金銷售</div>
        </div>
        <div class="report-stat" style="background:${todayRecord?.difference<0?'var(--red-light)':'var(--surface)'};">
          <div class="rs-num" style="color:${todayRecord?.difference<0?'var(--red)':'var(--text2)'};">
            ${todayRecord ? fmtMoney(todayRecord.actualCash) : '—'}
          </div>
          <div class="rs-label">實收現金</div>
        </div>
      </div>
      ${todayRecord ? `
        <div style="padding:10px;border-radius:8px;background:${todayRecord.difference===0?'var(--green-light)':todayRecord.difference>0?'var(--blue-light)':'var(--red-light)'};margin-bottom:12px;">
          <div style="font-size:13px;font-weight:600;">差額：
            <span style="color:${todayRecord.difference===0?'var(--green)':todayRecord.difference>0?'var(--blue)':'var(--red)'};">
              ${todayRecord.difference >= 0 ? '+' : ''}${fmtMoney(todayRecord.difference)}
            </span>
            <span style="font-size:12px;color:var(--text3);margin-left:6px;">
              ${todayRecord.difference===0?'✅ 吻合':todayRecord.difference>0?'⬆️ 多收':'⬇️ 短收'}
            </span>
          </div>
          ${todayRecord.note ? `<div style="font-size:12px;color:var(--text2);margin-top:4px;">${todayRecord.note}</div>` : ''}
        </div>` : ''}

      <div class="cust-form">
        <div class="cust-field">
          <label>實收現金金額（$）</label>
          <input type="number" id="cr-actual" placeholder="輸入實際點收金額"
            value="${todayRecord?.actualCash ?? ''}" min="0" />
        </div>
        <div class="cust-field">
          <label>備註（可選）</label>
          <input type="text" id="cr-note" placeholder="差額說明..."
            value="${todayRecord?.note ?? ''}" />
        </div>
      </div>
      <button class="modal-ok-btn" onclick="saveCashReconcile(${expectedCash})" style="width:100%;margin-top:8px;">
        <i class="ti ti-check"></i> 儲存今日對帳
      </button>
    </div>

    <div class="section-title" style="margin-top:4px;"><i class="ti ti-history"></i> 歷史對帳記錄</div>
    <div id="cr-history">${_renderCashHistory(records)}</div>`;
}

function _renderCashHistory(records){
  if(!records.length) return '<div class="order-empty">尚無對帳記錄</div>';
  return records.slice().reverse().slice(0,30).map(r => `
    <div class="inv-warn-row">
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:600;">${r.date}</div>
        ${r.note ? `<div style="font-size:12px;color:var(--text3);">${r.note}</div>` : ''}
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-size:13px;color:var(--text2);">系統 ${fmtMoney(r.expectedCash)} / 實收 ${fmtMoney(r.actualCash)}</div>
        <div style="font-size:14px;font-weight:700;color:${r.difference===0?'var(--green)':r.difference>0?'var(--blue)':'var(--red)'};">
          差額 ${r.difference>=0?'+':''}${fmtMoney(r.difference)}
        </div>
      </div>
    </div>`).join('');
}

function saveCashReconcile(expectedCash){
  const actual = parseInt(document.getElementById('cr-actual')?.value) || 0;
  const note   = document.getElementById('cr-note')?.value.trim() || '';
  const today  = todayStr();
  const records = _loadCashRecords();
  const idx    = records.findIndex(r => r.date === today);
  const entry  = { date: today, expectedCash, actualCash: actual, difference: actual - expectedCash, note };
  if(idx >= 0) records[idx] = entry;
  else records.push(entry);
  _saveCashRecords(records);
  showToast(`✅ 對帳已儲存！差額 ${entry.difference >= 0 ? '+' : ''}${fmtMoney(entry.difference)}`);
  initCashReconcilePage();
}
window.saveCashReconcile = saveCashReconcile;

function initSupplierReportPage(){
  const page = document.getElementById('page-supplier-report');
  if(!page) return;
  page.innerHTML = `
    <div class="op-header">
      <button class="back-btn" onclick="showPage('sales-menu')"><i class="ti ti-arrow-left"></i></button>
      <div class="op-title"><i class="ti ti-building-store" style="color:var(--purple);"></i> 廠商銷售報表</div>
      <button class="small-btn" onclick="exportSupplierReport()"><i class="ti ti-download"></i> 匯出</button>
    </div>
    <div class="form-card">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div class="cust-field"><label>廠商</label>
          <select id="spr-supplier" onchange="renderSupplierReport()">
            <option value="">全部廠商</option>
            ${SUPPLIERS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
          </select>
        </div>
        <div class="cust-field"><label>合作方式</label>
          <select id="spr-type" onchange="renderSupplierReport()">
            <option value="">全部</option>
            <option value="consignment">僅寄賣</option>
          </select>
        </div>
        <div class="cust-field"><label>開始日期</label>
          <input type="date" id="spr-date-from" onchange="renderSupplierReport()" /></div>
        <div class="cust-field"><label>結束日期</label>
          <input type="date" id="spr-date-to" onchange="renderSupplierReport()" /></div>
      </div>
    </div>
    <div id="spr-stats" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;"></div>
    <div id="spr-list"></div>`;
  renderSupplierReport();
}

function renderSupplierReport(){
  const supFilter  = document.getElementById('spr-supplier')?.value || '';
  const typeFilter = document.getElementById('spr-type')?.value || '';
  const dateFrom   = document.getElementById('spr-date-from')?.value || '';
  const dateTo     = document.getElementById('spr-date-to')?.value || '';

  // POS 銷售 + 訂單出貨
  let rows = logs.filter(l =>
    (l.op === 'pos_sale' && !l.eventId) || l.op === 'order_ship'
  );
  rows = filterLogsByDate(rows, dateFrom, dateTo);

  // 按廠商分組
  const bySupplier = {};
  rows.forEach(l => {
    const item = getItem ? getItem(l.productId) : null;
    if(!item) return;
    const supId = item.supplierId || 'unknown';
    if(supFilter && supId !== supFilter) return;
    const sup = SUPPLIERS.find(s => s.id === supId);
    const extra = sup ? JSON.parse(localStorage.getItem('erp_sup_' + supId) || '{}') : {};
    if(typeFilter === 'consignment' && extra.consignmentType !== 'consignment') return;
    if(!bySupplier[supId]) bySupplier[supId] = { sup, extra, items: [], totalAmt: 0, totalQty: 0 };
    bySupplier[supId].items.push(l);
    bySupplier[supId].totalAmt += (l.amount||0);
    bySupplier[supId].totalQty += (l.qty||0);
  });

  const groups = Object.values(bySupplier).sort((a,b) => b.totalAmt - a.totalAmt);
  const grandTotal = groups.reduce((s,g) => s + g.totalAmt, 0);
  const grandQty   = groups.reduce((s,g) => s + g.totalQty, 0);

  const statsEl = document.getElementById('spr-stats');
  if(statsEl) statsEl.innerHTML = `
    <div class="report-stat"><div class="rs-num">${groups.length}</div><div class="rs-label">廠商數</div></div>
    <div class="report-stat"><div class="rs-num">${grandQty}</div><div class="rs-label">總數量</div></div>
    <div class="report-stat"><div class="rs-num" style="color:var(--purple);">${fmtMoney(grandTotal)}</div><div class="rs-label">總銷售額</div></div>`;

  const listEl = document.getElementById('spr-list');
  if(!listEl) return;
  if(!groups.length){ listEl.innerHTML = '<div class="order-empty">沒有符合的記錄</div>'; return; }

  listEl.innerHTML = groups.map(g => {
    const supName = g.sup?.name || g.items[0]?.supplierId || '未知廠商';
    const isConsignment = g.extra?.consignmentType === 'consignment';
    // 依品項彙總
    const itemMap = {};
    g.items.forEach(l => {
      if(!itemMap[l.productId]) itemMap[l.productId] = { name: l.productName, emoji: l.emoji||'', qty:0, amt:0 };
      itemMap[l.productId].qty += (l.qty||0);
      itemMap[l.productId].amt += (l.amount||0);
    });
    const itemRows = Object.values(itemMap).sort((a,b) => b.amt - a.amt);
    return `<div class="list-card" style="margin-bottom:12px;">
      <div class="list-card-top">
        <span class="list-card-no">${supName}</span>
        <div style="display:flex;gap:6px;align-items:center;">
          ${isConsignment ? `<span class="status-badge badge-pending" style="font-size:10px;">寄賣</span>` : ''}
          <span style="font-weight:700;color:var(--purple);">${fmtMoney(g.totalAmt)}</span>
        </div>
      </div>
      <div style="margin-top:8px;">
        ${itemRows.map(it => `
          <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:13px;">
            <span>${it.emoji} ${it.name}</span>
            <span style="color:var(--text2);">×${it.qty} &nbsp; ${fmtMoney(it.amt)}</span>
          </div>`).join('')}
      </div>
      ${isConsignment ? `
        <div style="margin-top:8px;padding:6px 10px;background:var(--amber-light,#fff8e6);border-radius:6px;font-size:12px;color:var(--amber-dark,#8a5e00);">
          <i class="ti ti-receipt"></i> 寄賣應付：<strong>${fmtMoney(g.totalAmt)}</strong>（需依合約比例計算）
        </div>` : ''}
    </div>`;
  }).join('');
}
window.renderSupplierReport = renderSupplierReport;

function exportSupplierReport(){
  const dateFrom = document.getElementById('spr-date-from')?.value || '';
  const dateTo   = document.getElementById('spr-date-to')?.value || '';
  let rows = logs.filter(l =>
    (l.op === 'pos_sale' && !l.eventId) || l.op === 'order_ship'
  );
  rows = filterLogsByDate(rows, dateFrom, dateTo);

  const csvRows = [['廠商ID','廠商名稱','合作方式','商品ID','商品名稱','數量','金額','時間']];
  rows.forEach(l => {
    const item  = getItem ? getItem(l.productId) : null;
    const supId = item?.supplierId || '';
    const sup   = SUPPLIERS.find(s => s.id === supId);
    const extra = sup ? JSON.parse(localStorage.getItem('erp_sup_' + supId) || '{}') : {};
    csvRows.push([
      supId, sup?.name||'', extra.consignmentType==='consignment'?'寄賣':'買斷',
      l.productId||'', l.productName||'', l.qty||0, l.amount||0, l.time||''
    ]);
  });

  const csv  = csvRows.map(r => r.join(',')).join('\n');
  const blob = new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=`廠商銷售報表_${todayStr()}.csv`; a.click();
  URL.revokeObjectURL(url);
  showToast('✅ CSV 已下載');
}
window.exportSupplierReport = exportSupplierReport;

document.addEventListener('DOMContentLoaded', ()=>{});

</script>
<script>

function initAdminProductsPage(){

    <div class="op-header">
      <button class="back-btn" onclick="showPage('admin')"><i class="ti ti-arrow-left"></i></button>

let _apFilter = 'all';
function filterAdminProducts(cat, btn){

    .forEach(b => b.classList.toggle('active', b === btn));

function renderAdminProducts(q = ''){
  const el = document.getElementById('ap-list');
  if(!el) return;
  let list = ALL_ITEMS;
  if(_apFilter !== 'all') list = list.filter(i => i.category === _apFilter);

    <div class="admin-item" style="gap:10px;" onclick="openProductEditor('${item.id}')">

      <div style="flex:1;min-width:0;">
        <div class="admin-item-name">${item.name}</div>
        <div class="admin-item-sub">${item.id} / $${item.salePrice||0} / 庫存 ${getTotalStock(item.id)}</div>

function openProductEditor(id){
  const item  = getItem(id);
  if(!item) return;
  const flags = computeItemFlags(item);
  document.getElementById('pe-title').textContent        = item.name;
  document.getElementById('pe-sale-price').value         = item.salePrice || 0;
  document.getElementById('pe-cost-price').value         = item.costPrice || 0;
  document.getElementById('pe-safety-stock').value       = item.safetyStock || 0;
  document.getElementById('pe-item-id').value            = id;
  document.getElementById('pe-can-sell').checked         = flags.canSell;
  document.getElementById('pe-can-material').checked     = flags.canBeMaterial;
  document.getElementById('pe-can-purchase').checked     = flags.canPurchase;
  document.getElementById('productEditorModal').style.display = 'flex';
}
function saveProductEdit(){
  const id   = document.getElementById('pe-item-id').value;
  const item = ITEM_INDEX[id];
  if(!item) return;
  item.salePrice   = parseInt(document.getElementById('pe-sale-price').value)   || 0;
  item.costPrice   = parseInt(document.getElementById('pe-cost-price').value)   || 0;
  item.safetyStock = parseInt(document.getElementById('pe-safety-stock').value) || 0;
  // 儲存旗標覆寫（只在與自動判斷不同時才寫入，避免冗余）
  const autoFlags = computeItemFlags(item);
  const newFlags  = {
    canSell:       document.getElementById('pe-can-sell').checked,
    canBeMaterial: document.getElementById('pe-can-material').checked,
    canPurchase:   document.getElementById('pe-can-purchase').checked,
  };
  const changed = Object.keys(newFlags).some(k => newFlags[k] !== autoFlags[k]);
  if(changed){
    setItemFlags(id, newFlags);
  } else {
    // 清除手動覆寫，讓系統重新自動計算
    const all = JSON.parse(localStorage.getItem('erp_item_flags') || '{}');
    delete all[id];
    localStorage.setItem('erp_item_flags', JSON.stringify(all));
    if(typeof pushToFirebase === 'function') pushToFirebase('itemFlags', all);
  }
  _saveProductOverrides();
  document.getElementById('productEditorModal').style.display = 'none';
  showToast('商品已更新');
  renderAdminProducts(document.getElementById('ap-search')?.value || '');
}
function buildProductOverrides(){
  const obj = {};
  ALL_ITEMS.forEach(i => {
    obj[i.id] = { salePrice:i.salePrice, costPrice:i.costPrice, safetyStock:i.safetyStock, active:i.active };
  });
  return obj;
}
function _saveProductOverrides(){
  const ov = buildProductOverrides();
  localStorage.setItem('erp_product_overrides', JSON.stringify(ov));
  if(typeof pushToFirebase === 'function') pushToFirebase('productOverrides', ov);
}
function clearProductOverrides(){
  localStorage.removeItem('erp_product_overrides');
  if(typeof pushToFirebase === 'function') pushToFirebase('productOverrides', null);
  showToast('✅ 商品售價覆寫已清除，請重新整理頁面後重新匯入商品售價');
}

function toggleProductActive(id){
  const item = ITEM_INDEX[id];
  if(!item) return;
  item.active = !item.active;
  _saveProductOverrides();
  document.getElementById('productEditorModal').style.display = 'none';
  showToast(item.active ? '商品已啟用' : '商品已停用');
  renderAdminProducts('');
}

function renderBomList(q = ''){

  let list = ALL_ITEMS.filter(i =>
    i.active !== false && (i.salePrice > 0 || (BOM[i.id]?.length ?? 0) > 0)
  );
  if(q) list = list.filter(i => i.name.includes(q) || i.id.includes(q));
  const withBom    = list.filter(i => (BOM[i.id]||[]).length > 0);
  const withoutBom = list.filter(i => !(BOM[i.id]||[]).length);
  el.innerHTML = `<div style="font-size:12px;color:var(--text2);padding:6px 0;margin-bottom:4px;">

    const bom = BOM[item.id] || [];
    return `<div class="admin-item" onclick="openBomEditor('${item.id}')">

let _bomEditorId = null, _bomEditorItems = [];
function openBomEditor(id){
  _bomEditorId    = id;
  const item      = getItem(id);
  _bomEditorItems = JSON.parse(JSON.stringify(BOM[id] || []));
  document.getElementById('bom-editor-title').textContent = (item?.name || id) + ' 的材料';
  renderBomEditorList();
  document.getElementById('bomEditorModal').style.display = 'flex';
}
function renderBomEditorList(){
  const el = document.getElementById('bom-editor-list');
  if(!el) return;
  if(!_bomEditorItems.length){
    el.innerHTML = '<div class="order-empty">尚未設定材料，請搜尋加入</div>'; return;
  }
  el.innerHTML = _bomEditorItems.map((b, idx) => {
    const m = getItem(b.materialId) || { emoji:'📦', name: b.materialName || b.materialId };
    return `<div class="order-row">
      <span style="font-size:24px;">${m.emoji}</span>
      <div class="order-info">
        <div class="order-name">${m.name}</div>
        <div class="order-id">${b.materialId}</div>
      </div>
      <input type="number" value="${b.qty}" min="0.1" step="0.1"
        style="width:64px;padding:6px;font-size:15px;font-weight:700;text-align:center;
        border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);"
        onchange="_bomEditorItems[${idx}].qty=parseFloat(this.value)||1" />
      <button class="order-del" onclick="_bomEditorItems.splice(${idx},1);renderBomEditorList()">
        <i class="ti ti-x"></i>
      </button>
    </div>`;
  }).join('');
}
function bomEditorSearch(q){
  const res = document.getElementById('bom-editor-search-result');
  if(!res||!q){ if(res) res.style.display='none'; return; }
  const pool = typeof getMaterialItems==='function' ? getMaterialItems() : ALL_ITEMS.filter(i => !i.salePrice);
  const results = pool.filter(i => i.name?.includes(q) || i.id?.includes(q)).slice(0,8);
  if(!results.length){ res.style.display='none'; return; }
  res.style.display = 'block';
  res.innerHTML = results.map(m => {
    const safeName = m.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="ss-item" onmousedown="bomEditorAddMat('${m.id}','${safeName}')">
      <span class="ss-emoji">${m.emoji||'📦'}</span>
      <div class="ss-info"><div class="ss-name">${m.name}</div><div class="ss-sub">${m.id}</div></div>
    </div>`;
  }).join('');
}
function bomEditorAddMat(id, name){
  if(_bomEditorItems.find(i=>i.id===id||i.materialId===id)){ showToast('已在清單中'); return; }
  _bomEditorItems.push({ materialId:id, materialName:name, qty:1 });
  document.getElementById('bom-editor-search').value = '';
  document.getElementById('bom-editor-search-result').style.display = 'none';
  renderBomEditorList();
}
function saveBomEditor(){
  BOM[_bomEditorId] = JSON.parse(JSON.stringify(_bomEditorItems));
  localStorage.setItem('erp_bom', JSON.stringify(BOM));
  if(typeof pushToFirebase === 'function') pushToFirebase('bom', BOM);
  document.getElementById('bomEditorModal').style.display = 'none';
  showToast('BOM 已儲存');
  renderBomList(document.getElementById('bom-search')?.value || '');
}

  document.getElementById('loc-id').disabled = false;
  document.getElementById('loc-name').value  = '';

function openEditLocationModal(id){
  _editLocId = id;
  const loc = locations.find(l => l.id === id);
  if(!loc) return;
  document.getElementById('addLocModal-title').textContent = '編輯地點';
  document.getElementById('loc-id').value    = loc.id;
  document.getElementById('loc-id').disabled = true;
  document.getElementById('loc-name').value  = loc.name;

  document.getElementById('addLocModal').style.display = 'flex';
}
function saveNewLocation(){
  const id     = document.getElementById('loc-id')?.value.trim().replace(/\s/g,'_');
  const name   = document.getElementById('loc-name')?.value.trim();
  const type   = document.getElementById('loc-type')?.value;
  const active = document.getElementById('loc-active')?.checked ?? true;
  if(!id||!name){ showToast('請填寫地點ID和名稱'); return; }
  if(_editLocId){
    updateLocation(_editLocId, { name, type, isMain:type==='store_main', active });
    showToast('地點已更新：' + name);
  } else {
    if(locations.find(l=>l.id===id)){ showToast('此ID已存在'); return; }
    addLocation({ id, name, type, isMain:type==='store_main', active:true });
    showToast('地點已新增：' + name);
  }
  document.getElementById('addLocModal').style.display = 'none';
  renderLocationList();
}
function deleteLocation(id){
  const loc = locations.find(l => l.id === id);
  if(!loc) return;
  if(loc.isMain){ showToast('主倉儲不可刪除'); return; }
  const hasStock = ALL_ITEMS.some(i => (inventory[i.id]?.[id]||0) > 0);
  if(hasStock){ showToast('此地點尚有庫存，請先調貨再刪除'); return; }
  if(!confirm('確定刪除地點「' + loc.name + '」？')) return;
  locations = locations.filter(l => l.id !== id);
  saveLocations();
  showToast('地點已刪除');
  renderLocationList();
}

function exportCSV(type){
  let headers, rows, filename;
  const BOM_MARK = '\uFEFF';
  switch(type){
    case 'products':
      headers = ['商品編號','品名','類別','單位','售價','進貨價','安全庫存','廠商'];
      rows = ALL_ITEMS.map(i => [i.id, i.name, getCategory(i.category)?.name||'',
        i.unit||'', i.salePrice||0, i.costPrice||0, i.safetyStock||0,
        getSupplier(i.supplierId)?.name||'']);
      filename = '商品明細_' + todayStr() + '.csv';
      break;
    case 'suppliers':
      headers = ['廠商編號','廠商名稱','聯絡人','電話','Email','Line','銀行','分行','代號','戶名','帳號'];
      rows = SUPPLIERS.map(s => {
        const ex = JSON.parse(localStorage.getItem('erp_sup_'+s.id)||'{}');
        const m  = {...s,...ex};
        return [m.id,m.name,m.contact||'',m.tel||'',m.email||'',m.line||'',
          m.bankName||'',m.bankBranch||'',m.bankCode||'',m.accountName||'',m.accountNo||''];
      });
      filename = '廠商資料_' + todayStr() + '.csv';
      break;
    case 'customers':
      headers = ['客戶名稱','來源','承辦人','電話','Email','傳真','抬頭','統編','收件人','收件電話','地址'];
      rows = customers.map(c => [c.name,c.source||'',c.contact||'',c.tel||'',c.email||'',
        c.fax||'',c.invoiceTitle||'',c.taxId||'',c.receiver||'',c.receiverTel||'',c.address||'']);
      filename = '客戶資料_' + todayStr() + '.csv';
      break;
    case 'inventory':
      headers = ['商品編號','品名','單位',...getStoreLocations().map(l=>l.name),'合計'];
      rows = ALL_ITEMS.map(i => {
        const locs = getStoreLocations().map(l => getStock(i.id,l.id));
        return [i.id, i.name, i.unit||'個', ...locs, getTotalStock(i.id)];
      });
      filename = '庫存現況_' + todayStr() + '.csv';
      break;
    case 'orders':
      headers = ['訂單號','客戶','狀態','付款','建立日期','交期','物流','單號','總金額'];
      rows = orders.map(o => {
        const c = getCustomer(o.customerId);
        const ST = {pending:'待處理',producing:'生產中',ready:'待出貨',shipped:'已出貨',archived:'已結案'};
        const PY = {unpaid:'未收款',partial:'部分收款',paid:'已收款'};
        return [o.no,c?.name||'',ST[o.status]||o.status,PY[o.payStatus]||'',
          o.createdAt||'',o.deliveryDate||'',o.logistics||'',o.trackingNo||'',o.totalAmount||0];
      });
      filename = '訂單記錄_' + todayStr() + '.csv';
      break;
    case 'sales':
      headers = ['時間','品項編號','品名','數量','單價','金額','付款方式'];
      rows = logs.filter(l=>l.op==='pos_sale'||l.op==='order_ship').map(l =>
        [l.time||'',l.productId||'',l.productName||'',l.qty||0,l.unitPrice||0,l.amount||0,l.payMethod||'']);
      filename = '銷售記錄_' + todayStr() + '.csv';
      break;
    default: return;
  }
  const csv  = BOM_MARK + [headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
  showToast(filename + ' 已下載');
}

function switchImportTab(type, btn){

// ── 通用預覽 ──
function previewImport(type, input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    // 移除 BOM 字符
    let text  = e.target.result.replace(/^﻿/, '');
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    // 解析 CSV（支援引號欄位）
    const parseCSVLine = l => {
      const result = []; let cur = '', inQ = false;
      for(let i = 0; i < l.length; i++){
        if(l[i] === '"'){ inQ = !inQ; }
        else if(l[i] === ',' && !inQ){ result.push(cur.trim()); cur = ''; }
        else { cur += l[i]; }
      }
      result.push(cur.trim());
      return result;
    };
    const rows = lines.map(parseCSVLine);
    window['_importData_' + type] = rows;

    const el = document.getElementById('import-preview-' + type);
    const labels = { inventory:'庫存', prices:'商品售價', customers:'客戶', suppliers:'廠商' };
    el.innerHTML = `<div style="font-size:13px;color:var(--text2);margin-bottom:8px;">
      預覽（共 ${lines.length} 筆）：</div>` +
      rows.slice(0,4).map(cols =>
        `<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
          ${cols.map(c=>`<span style="margin-right:8px;color:var(--text2);">${c||'—'}</span>`).join('')}
        </div>`
      ).join('') +
      `<button class="confirm-btn" style="margin-top:10px;"
        onclick="doImport('${type}')">
        確認匯入 ${lines.length} 筆${labels[type]||''}資料
      </button>`;
  };
  reader.readAsText(file, 'utf-8');
}

// ── 執行匯入 ──
function doImport(type){
  const rows = window['_importData_' + type] || [];
  let count = 0;

  if(type === 'inventory'){
    // 格式：商品編號, 品名, 單位, [loc1], [loc2], ..., 合計
    // 第一列可能是 header，自動偵測
    const locs = getStoreLocations();
    rows.forEach(cols => {
      const id = cols[0];
      if(!id || id === '商品編號') return;
      const item = getItem(id);
      if(!item) return;
      // 數值從第 3 欄（index 3）開始，與 export 欄位對應
      locs.forEach((loc, i) => {
        const val = parseInt(cols[3 + i]);
        if(!isNaN(val)){
          if(!inventory[id]) inventory[id] = {};
          inventory[id][loc.id] = Math.max(0, val);
          count++;
        }
      });
    });
    saveInventory();
    if(typeof pushToFirebase === 'function') pushToFirebase('inventory', inventory);
    if(typeof renderInventorySummary === 'function') renderInventorySummary();
    if(count === 0){
      showToast('⚠️ 匯入 0 筆庫存，請確認 CSV 格式與商品編號是否正確', 4000);
    } else {
      showToast(`✅ 已更新 ${count} 筆庫存`);
    }

  } else if(type === 'prices'){
    // 支援兩種格式：
    //   商品售價（4欄）：商品編號, 售價, 進貨價, 安全庫存
    //   商品明細（8欄）：商品編號, 品名, 類別, 單位, 售價, 進貨價, 安全庫存, 廠商
    let newCount = 0;
    const _catByName = name =>
      Object.keys(CATEGORIES).find(k => CATEGORIES[k]?.name === name) || '009';

    rows.forEach(cols => {
      const id = cols[0];
      if(!id || id === '商品編號') return;

      const isDetailFormat = cols.length >= 5 && isNaN(parseInt(cols[1]));
      const offset = isDetailFormat ? 4 : 1;

      let item = ITEM_INDEX[id];

      // 商品明細格式 + 系統中沒有此品項 → 自動新增
      if(!item && isDetailFormat){
        const catId = _catByName(cols[2] || '');
        item = {
          id,
          name:        cols[1] || id,
          category:    catId,
          unit:        cols[3] || '個',
          emoji:       CATEGORIES[catId]?.emoji || '📦',
          salePrice:   parseInt(cols[4]) || 0,
          costPrice:   parseInt(cols[5]) || 0,
          safetyStock: parseInt(cols[6]) || 0,
          active:      true,
        };
        ALL_ITEMS.push(item);
        ITEM_INDEX[id] = item;
        // 初始化庫存（各地點設 0）
        if(typeof inventory !== 'undefined' && !inventory[id]){
          inventory[id] = {};
          if(typeof getStoreLocations === 'function')
            getStoreLocations().forEach(l => { inventory[id][l.id] = 0; });
        }
        // 儲存自定義商品清單
        const custom = JSON.parse(localStorage.getItem('erp_custom_items') || '[]');
        const ei = custom.findIndex(c => c.id === id);
        if(ei >= 0) custom[ei] = item; else custom.push(item);
        localStorage.setItem('erp_custom_items', JSON.stringify(custom));
        if(typeof pushToFirebase === 'function') pushToFirebase('customItems', custom);
        newCount++;
        count++;
        return;
      }

      if(!item) return;

      const vSale   = cols[offset];
      const vCost   = cols[offset + 1];
      const vSafety = cols[offset + 2];
      if(vSale   !== '' && vSale   !== undefined) item.salePrice   = parseInt(vSale)   || 0;
      if(vCost   !== '' && vCost   !== undefined) item.costPrice   = parseInt(vCost)   || 0;
      if(vSafety !== '' && vSafety !== undefined) item.safetyStock = parseInt(vSafety) || 0;
      count++;
    });
    _saveProductOverrides();
    if(newCount > 0) saveInventory();
    const _newMsg = newCount > 0 ? `，新增 ${newCount} 筆新商品` : '';
    showToast(`✅ 已更新 ${count - newCount} 筆售價${_newMsg}`, 3000);

  } else if(type === 'customers'){
    // 格式：客戶名稱, 聯絡人, 電話, Email, 地址
    rows.forEach(cols => {
      if(!cols[0] || cols[0] === '客戶名稱') return;
      customers.push({
        id:        'C' + Date.now() + Math.random().toString(36).slice(2,5),
        name:      cols[0]||'', contact: cols[1]||'', tel: cols[2]||'',
        email:     cols[3]||'', address: cols[4]||'',
        source:    'phone', createdAt: todayStr(),
      });
      count++;
    });
    if(typeof saveCustomers === 'function') saveCustomers();
    showToast(`✅ 已匯入 ${count} 筆客戶`);

  } else if(type === 'suppliers'){
    // 格式：廠商編號, 廠商名稱, 聯絡人, 電話, Email
    rows.forEach(cols => {
      if(!cols[0] || cols[0] === '廠商編號') return;
      const id  = cols[0];
      const extra = { contact: cols[2]||'', tel: cols[3]||'', email: cols[4]||'' };
      // 寫到廠商 extra localStorage
      const saved = JSON.parse(localStorage.getItem('erp_sup_' + id) || '{}');
      localStorage.setItem('erp_sup_' + id, JSON.stringify({ ...saved, ...extra }));
      // 若廠商不在 SUPPLIERS 清單中，新增一筆
      if(!SUPPLIERS.find(s => s.id === id)){
        SUPPLIERS.push({ id, name: cols[1]||id });
      } else {
        const s = SUPPLIERS.find(s => s.id === id);
        if(cols[1]) s.name = cols[1];
      }
      count++;
    });
    showToast(`✅ 已更新 ${count} 筆廠商`);
  }

  initImportPage();
}

<script>

// gift.js — 贈品/試吃出庫單
// ============================================================

let giftOrders = JSON.parse(localStorage.getItem('erp_gift_orders') || '[]');

function saveGiftOrders(){
  localStorage.setItem('erp_gift_orders', JSON.stringify(giftOrders));
  if(typeof pushToFirebase === 'function') pushToFirebase('giftOrders', giftOrders);
}

function getGiftOrder(id){ return giftOrders.find(g => g.id === id) || null; }

function genGiftNo(){

// ── 出庫原因設定 ──
const GIFT_REASONS = [
  { value: 'tasting',  label: '試吃推廣',  icon: 'ti-candy',         color: '#C05621', bg: '#FEEBC8' },
  { value: 'gift',     label: '贈禮',       icon: 'ti-gift',          color: '#553C9A', bg: '#EDE9F8' },
  { value: 'event',    label: '外展活動',   icon: 'ti-map-pin',       color: '#2C7A7B', bg: '#E6FFFA' },
  { value: 'staff',    label: '員工福利',   icon: 'ti-heart',         color: '#B83280', bg: '#FED7E2' },
  { value: 'damaged',  label: '損壞報廢',   icon: 'ti-trash',         color: '#742A2A', bg: '#FFF5F5' },
  { value: 'other',    label: '其他',       icon: 'ti-dots-circle-horizontal', color: '#4A5568', bg: '#EDF2F7' },
];

}

  return `<span style="font-size:11px;padding:2px 8px;border-radius:20px;
    background:${r.bg};color:${r.color};font-weight:600;white-space:nowrap;">
    <i class="ti ${r.icon}"></i> ${r.label}

// ── 列表頁 ──

  const page = document.getElementById('page-gift-orders');

    <div class="op-header">

  }).join('');

      <!-- 出庫原因 -->
      <div class="cust-field" style="margin-bottom:10px;">
        <label>出庫原因</label>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:6px;">
          ${GIFT_REASONS.map(r => `
            <button onclick="_setGiftReason('${r.value}')"
              id="gr-btn-${r.value}"
              style="padding:10px 6px;border-radius:var(--radius-sm);border:2px solid ${g.reason===r.value?r.color:r.bg};
              background:${g.reason===r.value?r.bg:'var(--surface)'};color:${r.color};cursor:pointer;
              font-size:12px;font-weight:600;text-align:center;transition:all .15s;">
              <i class="ti ${r.icon}" style="display:block;font-size:20px;margin-bottom:4px;"></i>
              ${r.label}
            </button>`).join('')}
        </div>
      </div>

      <!-- 受贈者 -->
      <div class="cust-field">
        <label>對象 / 受贈者</label>
        <input type="text" id="gf-recipient" value="${g.recipient}"
          placeholder="例：南投縣長、試吃活動..." />
      </div>

      <!-- 出庫地點 -->
      <div class="cust-field">
        <label>出庫地點</label>
        <select id="gf-location">
          ${locs.map(l => `<option value="${l.id}" ${g.locationId===l.id?'selected':''}>${l.name}</option>`).join('')}
        </select>
      </div>

      <!-- 品項搜尋 -->
      <div class="form-section-title" style="margin-top:10px;">出庫品項</div>
      <div class="search-bar">
        <i class="ti ti-search"></i>
        <input type="search" id="gift-item-search" placeholder="搜尋商品..."
          oninput="searchItemsFor('gift',this.value)" />
      </div>
      <div id="gift-item-search-result" style="display:none;"></div>
      <div id="gf-item-list" style="margin-top:6px;"></div>

      <!-- 備註 -->
      <div class="cust-field" style="margin-top:8px;">
        <label>備註</label>
        <textarea id="gf-remark" rows="2" placeholder="（可空白）">${g.remark}</textarea>
      </div>

      <div class="modal-actions" style="margin-top:12px;">
        <button class="modal-ok-btn" onclick="submitGiftOrder()">
          <i class="ti ti-check"></i> 確認出庫
        </button>
        <button class="modal-cancel-btn" onclick="_closeGiftModal()">取消</button>
      </div>
    </div>`;

  document.body.appendChild(modal);
  _renderGiftItems();
}

function _setGiftReason(value){
  if(!_currentGift) return;
  _currentGift.reason = value;
  // 更新按鈕樣式
  GIFT_REASONS.forEach(r => {
    const btn = document.getElementById('gr-btn-' + r.value);
    if(!btn) return;
    btn.style.border      = `2px solid ${r.value === value ? r.color : r.bg}`;
    btn.style.background  = r.value === value ? r.bg : 'var(--surface)';
  });
}

function _closeGiftModal(){
  document.getElementById('giftModal')?.remove();
  _currentGift = null;
}

// ── 贈品品項管理 ──
function addGiftItem(productId){
  if(!_currentGift) return;
  const item = getItem(productId);
  if(!item) return;
  const existing = _currentGift.items.find(i => i.id === productId);
  if(existing){ existing.qty++; }
  else {
    _currentGift.items.push({
      id:    productId,
      name:  item.name,
      emoji: item.emoji,
      qty:   1,
    });
  }
  const si = document.getElementById('gift-item-search');
  const rs = document.getElementById('gift-item-search-result');
  if(si) si.value = '';
  if(rs) rs.style.display = 'none';
  _renderGiftItems();
}

function changeGiftItemQty(idx, delta){
  if(!_currentGift) return;
  const item = _currentGift.items[idx];
  if(!item) return;
  item.qty = Math.max(1, item.qty + delta);
  _renderGiftItems();
}

function removeGiftItem(idx){
  if(!_currentGift) return;
  _currentGift.items.splice(idx, 1);
  _renderGiftItems();
}

function _renderGiftItems(){
  const el = document.getElementById('gf-item-list');
  if(!el || !_currentGift) return;
  const items = _currentGift.items;
  if(!items.length){
    el.innerHTML = '<div class="order-empty" style="padding:12px 0;">尚未加入品項</div>';
    return;
  }
  el.innerHTML = items.map((item, idx) => {
    const stock = typeof getTotalStock === 'function' ? getTotalStock(item.id) : 0;
    const over  = item.qty > stock;
    return `<div class="order-row" style="${over?'background:#FFF5F5;':''}">
      <div class="order-emoji">${item.emoji}</div>
      <div class="order-info">
        <div class="order-name">${item.name}</div>
        <div class="order-id" style="color:${over?'var(--red)':'var(--text3)'};">
          庫存 ${stock}${over ? ' ⚠️ 超出庫存' : ''}
        </div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeGiftItemQty(${idx},-1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="changeGiftItemQty(${idx},1)">＋</button>
      </div>
      <button class="order-del" onclick="removeGiftItem(${idx})">
        <i class="ti ti-x"></i>
      </button>
    </div>`;
  }).join('');
}

// ── 提交出庫 ──
function submitGiftOrder(){
  if(!_currentGift) return;
  if(!_currentGift.items.length){
    showToast('⚠️ 請先加入品項'); return;
  }

  // 讀取表單
  _currentGift.recipient  = document.getElementById('gf-recipient')?.value.trim() || '';
  _currentGift.locationId = document.getElementById('gf-location')?.value || _currentGift.locationId;
  _currentGift.remark     = document.getElementById('gf-remark')?.value.trim() || '';

  const locId = _currentGift.locationId;
  const reason = getGiftReason(_currentGift.reason);

  // 庫存檢查
  const overStock = _currentGift.items.filter(i => {
    const s = typeof getStock === 'function' ? getStock(i.id, locId) : 0;
    return i.qty > s;
  });
  if(overStock.length){
    if(!confirm(`以下品項庫存不足：\n${overStock.map(i=>`${i.name} (需${i.qty}，現有${getStock(i.id,locId)})`).join('\n')}\n\n仍要出庫？`)) return;
  }

  // 扣庫存
  _currentGift.items.forEach(item => {
    if(typeof adjustStock === 'function'){
      adjustStock(item.id, locId, -item.qty, {
        op:      'gift_out',
        refId:   _currentGift.no,
        refType: 'gift',
        note:    `${reason.label}出庫${_currentGift.recipient ? '（' + _currentGift.recipient + '）' : ''}`,
      });
    }
  });

  // 儲存
  _currentGift.id = 'GF' + Date.now();
  giftOrders.push(_currentGift);
  saveGiftOrders();

  showToast(`✅ 出庫完成：${_currentGift.no}`);
  _closeGiftModal();
  renderGiftList(_giftFilter);
}

// ── 出庫單詳細 ──
function openGiftDetail(id){
  const g = getGiftOrder(id);
  if(!g) return;

  const existing = document.getElementById('giftDetailModal');
  if(existing) existing.remove();

  const reason    = getGiftReason(g.reason);
  const totalQty  = (g.items||[]).reduce((s,i) => s + (i.qty||0), 0);

  const modal = document.createElement('div');
  modal.className     = 'modal-overlay';
  modal.id            = 'giftDetailModal';
  modal.style.display = 'flex';
  modal.onclick = e => { if(e.target === modal) modal.remove(); };

  modal.innerHTML = `
    <div class="modal-card" style="max-width:420px;max-height:85vh;overflow-y:auto;">
      <div class="modal-title">
        <i class="ti ${reason.icon}" style="color:${reason.color};"></i>
        ${g.no}
      </div>

      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
        ${giftReasonBadge(g.reason)}
        <span style="font-size:12px;color:var(--text3);">${fmtDateFull(g.createdAt)}</span>
      </div>

      <div class="amount-section">
        ${g.recipient ? `<div class="amount-row"><span>對象</span><span>${g.recipient}</span></div>` : ''}
        <div class="amount-row"><span>出庫地點</span><span>${_locName(g.locationId)}</span></div>
        <div class="amount-row"><span>出庫總數</span><strong>${totalQty} 件</strong></div>
        ${g.remark ? `<div class="amount-row"><span>備註</span><span>${g.remark}</span></div>` : ''}
      </div>

      <div class="form-section-title" style="margin-top:12px;">出庫品項</div>
      ${(g.items||[]).map(item => `
        <div class="order-row" style="cursor:default;">
          <div class="order-emoji">${item.emoji}</div>
          <div class="order-info">
            <div class="order-name">${item.name}</div>
            <div class="order-id">${item.id}</div>
          </div>
          <div style="font-size:22px;font-weight:700;color:var(--text);padding-right:8px;">
            ${item.qty}
          </div>
        </div>`).join('')}

      <div style="display:flex;gap:8px;margin-top:14px;">
        ${isAdmin() ? `
        <button class="redit-btn" style="flex:1;color:var(--red);border-color:var(--red);"
          onclick="requireAdmin(()=>hardDeleteGiftOrder('${g.id}'))">
          <i class="ti ti-trash"></i> 刪除
        </button>` : ''}
        <button class="modal-cancel-btn" style="flex:1;"
          onclick="document.getElementById('giftDetailModal').remove()">關閉</button>
      </div>
    </div>`;

  document.body.appendChild(modal);
}

// ── 管理員刪除 ──
function hardDeleteGiftOrder(id){
  const g = getGiftOrder(id);
  if(!g) return;
  if(!confirm(`確定永久刪除出庫單 ${g.no}？\n庫存不會歸還，此操作無法復原。`)) return;
  giftOrders = giftOrders.filter(x => x.id !== id);
  saveGiftOrders();
  document.getElementById('giftDetailModal')?.remove();
  showToast('🗑️ 出庫單已刪除');
  renderGiftList(_giftFilter);
}

document.addEventListener('DOMContentLoaded', () => {

});

</script>
<script>
/* ── js/processing.js ── */
// ============================================================
// processing.js — 加工日報（每批次一張）

let processingLogs = JSON.parse(localStorage.getItem('erp_processing_logs') || '[]');

function saveProcessingLogs(){
  localStorage.setItem('erp_processing_logs', JSON.stringify(processingLogs));
  if(typeof pushToFirebase === 'function') pushToFirebase('processingLogs', processingLogs);
}

function getProcessingLog(id){ return processingLogs.find(p => p.id === id) || null; }
function genProcNo(){ return genNo('PL', processingLogs, 'no'); }

// ── 狀態設定 ──
const PROC_STATUSES = {
  draft:     { label:'草稿',   color:'#718096', bg:'#EDF2F7', icon:'ti-pencil' },
  confirmed: { label:'已確認', color:'#1D9E75', bg:'#E1F5EE', icon:'ti-circle-check' },
};

function procStatusBadge(status){
  const s = PROC_STATUSES[status] || PROC_STATUSES.draft;
  return `<span class="status-badge" style="background:${s.bg};color:${s.color};">
    <i class="ti ${s.icon}"></i> ${s.label}
  </span>`;
}

// ── 列表頁 ──
let _procFilter = 'all';

function initProcessingPage(){
  const page = document.getElementById('page-processing');
  if(!page) return;

  page.innerHTML = `
    <div class="op-header">
      <button class="back-btn" onclick="showPage('factory-menu')">
        <i class="ti ti-arrow-left"></i>
      </button>
      <div class="op-title">
        <i class="ti ti-clipboard-list" style="color:#1D9E75;"></i> 加工日報
      </div>
      <button class="small-btn green-btn" onclick="openNewProcModal()">
        <i class="ti ti-plus"></i> 新增
      </button>
    </div>

    <div class="filter-tabs">
      <button class="ftab active" onclick="renderProcList('all',this)">全部</button>
      <button class="ftab" onclick="renderProcList('draft',this)">草稿</button>
      <button class="ftab" onclick="renderProcList('confirmed',this)">已確認</button>
    </div>
    <div id="proc-list"></div>`;

  renderProcList('all');
}

function renderProcList(filter, btn){
  if(filter) _procFilter = filter;
  if(btn){
    document.querySelectorAll('#page-processing .ftab')
      .forEach(b => b.classList.toggle('active', b === btn));
  }

  const el = document.getElementById('proc-list');
  if(!el) return;

  let list = _procFilter === 'all'
    ? processingLogs
    : processingLogs.filter(p => p.status === _procFilter);
  list = list.slice().reverse();

  if(!list.length){
    el.innerHTML = `<div class="order-empty">尚無加工日報</div>`;
    return;
  }

  el.innerHTML = list.map(p => {
    const inStr  = (p.inputs||[]).slice(0,2).map(i=>i.name).join('、')
      + ((p.inputs||[]).length > 2 ? ` 等${p.inputs.length}項` : '');
    const outStr = (p.outputs||[]).slice(0,2).map(i=>i.name).join('、')
      + ((p.outputs||[]).length > 2 ? ` 等${p.outputs.length}項` : '');
    const totalOut = (p.outputs||[]).reduce((s,i)=>s+(i.qty||0),0);

    return `<div class="list-card" onclick="openProcDetail('${p.id}')">
      <div class="list-card-top">
        <span class="list-card-no">${p.no}</span>
        ${procStatusBadge(p.status)}
      </div>
      <div class="list-card-meta">
        <span><i class="ti ti-calendar"></i>${fmtDate(p.date)}</span>
        ${p.worker ? `<span><i class="ti ti-user"></i>${p.worker}</span>` : ''}
        ${p.lossRate != null ? `<span style="color:var(--amber)"><i class="ti ti-percentage"></i>損耗 ${p.lossRate}%</span>` : ''}
      </div>
      ${inStr ? `<div class="list-card-items" style="color:var(--text3);font-size:12px;">投入：${inStr}</div>` : ''}
      <div class="list-card-items">產出：${outStr || '（無）'} ×${totalOut}</div>
    </div>`;
  }).join('');
}

// ── 新增 Modal ──
let _currentProc = null;

function openNewProcModal(){
  _currentProc = {
    id:         null,
    no:         genProcNo(),
    date:       todayStr(),
    worker:     '',
    status:     'draft',
    inputs:     [],
    outputs:    [],
    lossQty:    null,
    lossRate:   null,
    lossNote:   '',
    note:       '',
  };
  _renderProcModal();
}

function openEditProcModal(id){
  const p = getProcessingLog(id);
  if(!p) return;
  if(p.status === 'confirmed' && !isAdmin()){
    showToast('⚠️ 已確認的日報僅管理員可修改'); return;
  }
  _currentProc = JSON.parse(JSON.stringify(p));
  _renderProcModal();
}

function _renderProcModal(){
  document.getElementById('procModal')?.remove();

  const p    = _currentProc;
  const locs = typeof getStoreLocations === 'function' ? getStoreLocations() : [];
  const defaultLocId = locs[0]?.id || 'store_A';

  const modal = document.createElement('div');

  modal.id            = 'procModal';
  modal.style.display = 'flex';

  modal.innerHTML = `
    <div class="modal-card" style="max-width:520px;max-height:92vh;overflow-y:auto;">

      <div class="form-section-title" style="margin-top:4px;">

      <div class="search-bar" style="margin-bottom:4px;">
        <i class="ti ti-search"></i>
        <input type="search" id="proc-in-search" placeholder="搜尋原料 / 半成品（所有品項）..."

      </div>
      <div id="proc-in-search-result" style="display:none;"></div>
      <div id="proc-in-list" style="margin-bottom:12px;"></div>

      <!-- ── 產出成品 ── -->

  document.body.appendChild(modal);

  _renderProcOutputList();

// ── 投入 / 產出品項管理（全域入口，供 addItemTo 呼叫）──
function addProcInputItem(itemId)  { _addProcItem('input',  itemId); }
function addProcOutputItem(itemId) { _addProcItem('output', itemId); }

function _addProcItem(side, itemId){
  if(!_currentProc) return;
  const item = typeof getItem === 'function' ? getItem(itemId) : null;
  if(!item){ showToast('⚠️ 找不到品項'); return; }
  const list = side === 'input' ? _currentProc.inputs : _currentProc.outputs;
  const locs  = typeof getStoreLocations === 'function' ? getStoreLocations() : [];
  const locId = locs[0]?.id || 'store_A';
  const existing = list.find(i => i.itemId === item.id);
  if(existing){
    existing.qty++;
  } else {
    list.push({ itemId: item.id, name: item.name, emoji: item.emoji || '📦', qty: 1, locationId: locId });
  }
  if(side === 'input'){
    _renderProcInputList();
  } else {
    _renderProcOutputList();
  }
  _updateProcLossDisplay();
}

function _changeProcItemQty(side, idx, delta){
  if(!_currentProc) return;
  const list = side === 'input' ? _currentProc.inputs : _currentProc.outputs;
  list[idx].qty = Math.max(1, (list[idx].qty || 1) + delta);
  if(side === 'input') _renderProcInputList(); else _renderProcOutputList();
  _updateProcLossDisplay();
}

function _setProcItemQty(side, idx, val){
  if(!_currentProc) return;
  const list = side === 'input' ? _currentProc.inputs : _currentProc.outputs;
  list[idx].qty = Math.max(1, parseInt(val) || 1);
  _updateProcLossDisplay();
}

function _setProcItemLoc(side, idx, locId){
  if(!_currentProc) return;
  const list = side === 'input' ? _currentProc.inputs : _currentProc.outputs;
  list[idx].locationId = locId;
}

function _removeProcItem(side, idx){
  if(!_currentProc) return;
  if(side === 'input') _currentProc.inputs.splice(idx, 1);
  else _currentProc.outputs.splice(idx, 1);
  if(side === 'input') _renderProcInputList(); else _renderProcOutputList();
  _updateProcLossDisplay();
}

function _renderProcItemList(side){
  const id   = side === 'input' ? 'proc-in-list' : 'proc-out-list';
  const list = side === 'input' ? _currentProc.inputs : _currentProc.outputs;
  const el   = document.getElementById(id);
  if(!el || !_currentProc) return;

  const locs = typeof getStoreLocations === 'function' ? getStoreLocations() : [];
  const color = side === 'input' ? 'var(--amber)' : 'var(--green)';

  if(!list.length){
    el.innerHTML = `<div class="order-empty" style="padding:8px 0;font-size:13px;">尚未加入品項</div>`;
    return;
  }

  el.innerHTML = list.map((item, idx) => {
    const stock = typeof getTotalStock === 'function' ? getTotalStock(item.itemId) : 0;
    const locOpts = locs.map(l =>
      `<option value="${l.id}" ${item.locationId===l.id?'selected':''}>${l.name}</option>`
    ).join('');
    return `<div class="order-row" style="flex-wrap:wrap;gap:4px;padding:8px;">
      <div class="order-emoji">${item.emoji}</div>
      <div class="order-info" style="flex:1;min-width:100px;">
        <div class="order-name" style="font-size:13px;">${item.name}</div>

        ${locOpts}
      </select>

          style="width:52px;text-align:center;font-weight:700;color:${color};border:1px solid ${color};border-radius:4px;padding:2px 4px;"
          onchange="_setProcItemQty('${side}',${idx},this.value)"

function _renderProcInputList()  { _renderProcItemList('input');  }
function _renderProcOutputList() { _renderProcItemList('output'); }

// ── 損耗自動計算顯示 ──
function _updateProcLossDisplay(){
  const el = document.getElementById('proc-loss-calc');
  if(!el || !_currentProc) return;

  const totalIn  = _currentProc.inputs.reduce((s,i)=>s+(i.qty||0),0);
  const totalOut = _currentProc.outputs.reduce((s,i)=>s+(i.qty||0),0);

  if(!totalIn && !totalOut){ el.innerHTML = ''; return; }

  // 只有單一品項投入 + 單一品項產出時才嘗試自動計算損耗率
  let autoRate = null;
  if(_currentProc.inputs.length === 1 && _currentProc.outputs.length === 1){
    const inQty  = _currentProc.inputs[0].qty || 0;
    const outQty = _currentProc.outputs[0].qty || 0;
    if(inQty > 0) autoRate = Math.max(0, ((inQty - outQty) / inQty * 100)).toFixed(1);
    // 自動填入損耗率（如果使用者沒手動填）
    const lossInput = document.getElementById('proc-loss-rate');
    if(lossInput && !lossInput.value && autoRate !== null){
      lossInput.value = autoRate;
    }
  }

  const rateEl = document.getElementById('proc-loss-rate');
  const rate   = rateEl ? parseFloat(rateEl.value) : null;

  el.innerHTML = `<div style="background:var(--bg2);border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;display:flex;gap:16px;flex-wrap:wrap;">
    <span style="color:var(--amber);">⬇ 投入共 <strong>${totalIn}</strong></span>
    <span style="color:var(--green);">⬆ 產出共 <strong>${totalOut}</strong></span>
    ${autoRate !== null
      ? `<span style="color:var(--red);">損耗 <strong>${autoRate}%</strong>（自動計算）</span>`
      : (rate ? `<span style="color:var(--red);">損耗率 <strong>${rate}%</strong></span>` : '')
    }
  </div>`;
}

function _closeProcModal(){
  document.getElementById('procModal')?.remove();
  _currentProc = null;
}

// ── 提交（草稿 or 確認）──
function submitProc(targetStatus){
  if(!_currentProc) return;

  // 讀取表單
  _currentProc.date     = document.getElementById('proc-date')?.value    || todayStr();
  _currentProc.worker   = document.getElementById('proc-worker')?.value?.trim() || '';
  _currentProc.lossRate = parseFloat(document.getElementById('proc-loss-rate')?.value) || null;
  _currentProc.lossNote = document.getElementById('proc-loss-note')?.value?.trim() || '';
  _currentProc.note     = document.getElementById('proc-note')?.value?.trim() || '';
  _currentProc.status   = targetStatus;

  if(targetStatus === 'confirmed'){
    // 驗證
    if(!_currentProc.inputs.length && !_currentProc.outputs.length){
      showToast('⚠️ 請加入投入或產出品項'); return;
    }

    // 庫存檢查（投入品項）
    const overStock = _currentProc.inputs.filter(item => {
      const avail = typeof getStock === 'function'
        ? getStock(item.itemId, item.locationId)
        : (typeof getTotalStock === 'function' ? getTotalStock(item.itemId) : 0);
      return item.qty > avail;
    });
    if(overStock.length){
      const msg = overStock.map(i =>
        `${i.name}（需 ${i.qty}，現有 ${
          typeof getStock === 'function' ? getStock(i.itemId, i.locationId) : '?'
        }）`
      ).join('\n');
      if(!confirm(`以下投入品項庫存不足：\n${msg}\n\n仍要確認？`)) return;
    }

    // 如果是已確認的舊單在重新儲存，先反轉原庫存（簡易版：不反轉，直接覆蓋）
    // TODO: 若有需要支援修改已確認日報，需在此先 reverse 原 adjustStock

    // 扣減投入庫存
    _currentProc.inputs.forEach(item => {
      if(typeof adjustStock === 'function'){
        adjustStock(item.itemId, item.locationId, -item.qty, {
          op:      'proc_in',
          refId:   _currentProc.no,
          refType: 'processing',
          note:    `加工投入 ${_currentProc.no}`,
        });
      }
    });

    // 新增產出庫存
    _currentProc.outputs.forEach(item => {
      if(typeof adjustStock === 'function'){
        adjustStock(item.itemId, item.locationId, +item.qty, {
          op:      'proc_out',
          refId:   _currentProc.no,
          refType: 'processing',
          note:    `加工產出 ${_currentProc.no}`,
        });
      }
    });

    _currentProc.confirmedAt = todayStr();
  }

  // 儲存
  const existIdx = processingLogs.findIndex(p => p.id === _currentProc.id);
  if(existIdx >= 0){
    processingLogs[existIdx] = _currentProc;
  } else {
    _currentProc.id = 'PL' + Date.now();
    processingLogs.push(_currentProc);
  }
  saveProcessingLogs();

  const label = targetStatus === 'confirmed' ? '確認並扣庫存' : '草稿儲存';
  showToast(`✅ ${label}：${_currentProc.no}`);
  _closeProcModal();
  renderProcList(_procFilter);
}

// ── 詳細檢視 Modal ──
function openProcDetail(id){
  const p = getProcessingLog(id);
  if(!p) return;

  document.getElementById('procDetailModal')?.remove();

  const modal = document.createElement('div');
  modal.className     = 'modal-overlay';
  modal.id            = 'procDetailModal';
  modal.style.display = 'flex';
  modal.onclick = e => { if(e.target === modal) modal.remove(); };

  const renderItems = (items, side) => {
    if(!items?.length) return '<div style="color:var(--text3);font-size:13px;padding:4px 0;">（無）</div>';
    const color = side === 'input' ? 'var(--amber)' : 'var(--green)';
    return items.map(item => `
      <div class="order-row" style="cursor:default;">
        <div class="order-emoji">${item.emoji}</div>
        <div class="order-info">
          <div class="order-name">${item.name}</div>
          <div class="order-id">${item.itemId} · ${_locName(item.locationId)}</div>
        </div>
        <div style="font-size:20px;font-weight:700;color:${color};padding-right:8px;">${item.qty}</div>
      </div>`).join('');
  };

  const totalIn  = (p.inputs||[]).reduce((s,i)=>s+(i.qty||0),0);
  const totalOut = (p.outputs||[]).reduce((s,i)=>s+(i.qty||0),0);

  modal.innerHTML = `
    <div class="modal-card" style="max-width:460px;max-height:88vh;overflow-y:auto;">
      <div class="modal-title">
        <i class="ti ti-clipboard-list"></i> ${p.no}
      </div>

      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
        ${procStatusBadge(p.status)}
        <span style="font-size:12px;color:var(--text3);">${fmtDateFull(p.date)}</span>
        ${p.worker ? `<span style="font-size:12px;color:var(--text3);"><i class="ti ti-user"></i> ${p.worker}</span>` : ''}
      </div>

      <div class="amount-section" style="margin-bottom:12px;">
        <div class="amount-row"><span>投入總量</span><strong style="color:var(--amber);">${totalIn}</strong></div>
        <div class="amount-row"><span>產出總量</span><strong style="color:var(--green);">${totalOut}</strong></div>
        ${p.lossRate != null ? `<div class="amount-row"><span>損耗率</span><strong style="color:var(--red);">${p.lossRate}%</strong></div>` : ''}
        ${p.lossNote ? `<div class="amount-row"><span>損耗說明</span><span>${p.lossNote}</span></div>` : ''}
        ${p.confirmedAt ? `<div class="amount-row"><span>確認日期</span><span>${fmtDate(p.confirmedAt)}</span></div>` : ''}
        ${p.note ? `<div class="amount-row"><span>備註</span><span>${p.note}</span></div>` : ''}
      </div>

      <div class="form-section-title" style="margin-bottom:4px;">
        <i class="ti ti-arrow-down-circle" style="color:var(--amber);"></i> 投入原料
      </div>
      ${renderItems(p.inputs, 'input')}

      <div class="form-section-title" style="margin-top:10px;margin-bottom:4px;">
        <i class="ti ti-arrow-up-circle" style="color:var(--green);"></i> 產出成品
      </div>
      ${renderItems(p.outputs, 'output')}

      <div style="display:flex;gap:8px;margin-top:16px;">
        ${p.status === 'draft' || isAdmin() ? `
        <button class="redit-btn" style="flex:1;"
          onclick="document.getElementById('procDetailModal').remove(); openEditProcModal('${p.id}')">
          <i class="ti ti-edit"></i> 編輯
        </button>` : ''}
        ${isAdmin() ? `
        <button class="redit-btn" style="flex:1;color:var(--red);border-color:var(--red);"
          onclick="requireAdmin(()=>hardDeleteProcLog('${p.id}'),'刪除加工日報需要管理員權限')">
          <i class="ti ti-trash"></i> 刪除
        </button>` : ''}
        <button class="modal-cancel-btn" style="flex:1;"
          onclick="document.getElementById('procDetailModal').remove()">關閉</button>
      </div>
    </div>`;

  document.body.appendChild(modal);
}

// ── 管理員刪除（不逆轉庫存）──
function hardDeleteProcLog(id){
  const p = getProcessingLog(id);
  if(!p) return;
  if(!confirm(`確定永久刪除加工日報 ${p.no}？\n` +
    `${p.status==='confirmed'?'⚠️ 庫存變動不會回復，請手動調整。\n':''}此操作無法復原。`)) return;
  processingLogs = processingLogs.filter(x => x.id !== id);
  saveProcessingLogs();
  document.getElementById('procDetailModal')?.remove();
  showToast('🗑️ 加工日報已刪除');
  renderProcList(_procFilter);
}

function _locName(id){
  if(typeof getLocation === 'function'){
    const loc = getLocation(id);
    return loc ? loc.name : (id || '—');
  }
  return id || '—';
}
