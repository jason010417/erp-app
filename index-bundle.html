// ── 品項管理 ──
function addProductionItem(productId){
  const item = getItem(productId);
  if(!item) return;
  if(!_currentProd) return;
  const existing = _currentProd.items.find(i => i.id === productId);
  if(existing){ existing.qty++; }
  else {
    _currentProd.items.push({ id:productId, name:item.name, emoji:item.emoji, qty:1 });
  }
  renderProdItems();
}

function removeProdItem(idx){ _currentProd.items.splice(idx,1); renderProdItems(); }
function changeProdItemQty(idx, delta){
  const item = _currentProd.items[idx];
  if(item) item.qty = Math.max(1, item.qty + delta);
  renderProdItems();
}

function renderProdItems(){
  const el    = document.getElementById('prod-item-list');
  const count = document.getElementById('prod-item-count');
  if(!el || !_currentProd) return;
  const items = _currentProd.items;
  if(count) count.textContent = items.length + ' 項';
  if(!items.length){
    el.innerHTML = `<div class="order-empty">尚未加入成品</div>`; return;
  }
  el.innerHTML = items.map((item, idx) => `
    <div class="order-row">
      <div class="order-emoji">${item.emoji}</div>
      <div class="order-info">
        <div class="order-name">${item.name}</div>
        <div class="order-id">${item.id}</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeProdItemQty(${idx},-1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="changeProdItemQty(${idx},1)">＋</button>
      </div>
      <button class="order-del" onclick="removeProdItem(${idx})">
        <i class="ti ti-x"></i>
      </button>
    </div>`).join('');
}

function collectProdForm(){
  if(!_currentProd) return;
  _currentProd.deadline = document.getElementById('prod-deadline')?.value || '';
  _currentProd.remark   = document.getElementById('prod-remark')?.value.trim() || '';
}

function saveProdDraft(){
  collectProdForm();
  upsertProdOrder();
  showToast('📝 生產單已儲存：' + _currentProd.no);
}

function confirmProdOrder(){
  if(!_currentProd.items.length){ showToast('⚠️ 請先加入成品'); return; }
  collectProdForm();
  const now = nowStr();
  if(!_currentProd.statusLog?.length){
    _currentProd.statusLog = [{
      status:'prepare', label:'備料中', time:now, note:'生產單建立'
    }];
  }
  _currentProd.status = 'prepare';
  upsertProdOrder();
  showToast('✅ 生產單已建立：' + _currentProd.no);
  showProdDetail(_currentProd.id);
}

function upsertProdOrder(){
  if(!_currentProd.id) _currentProd.id = 'PO' + Date.now();
  const idx  = productionOrders.findIndex(p => p.id === _currentProd.id);
  const copy = JSON.parse(JSON.stringify(_currentProd));
  if(idx >= 0) productionOrders[idx] = copy;
  else         productionOrders.push(copy);
  saveProdOrders();
  renderProductionList(_prodFilter);
}

// ── 生產單詳細 ──
function showProdDetail(id){
  const p = getProdOrder(id);
  if(!p) return;
  _currentProd = JSON.parse(JSON.stringify(p));
  renderProdDetailPage();
  showPage('production-detail');
}

function renderProdDetailPage(){
  const page = document.getElementById('page-production-detail');
  if(!page) return;
  const p    = _currentProd;
  const cust = getCustomer(p.customerId);
  const curIdx = stepIndex(p.status);
  const next   = nextStep(p.status);

  page.innerHTML = `
    <div class="op-header">
      <button class="back-btn" onclick="showPage('production')"><i class="ti ti-arrow-left"></i></button>
      <div class="op-title">${p.no}</div>
    </div>

    <!-- 進度條 -->
    <div class="form-card">
      <div class="prod-progress-steps">
        ${PROD_STEPS.map((s, i) => `
          <div class="prod-step-col ${i <= curIdx ? 'active' : ''}">
            <div class="prod-step-circle"
              style="${i<=curIdx?`background:${s.color};border-color:${s.color}`:''}">
              <i class="ti ${s.icon}" style="color:${i<=curIdx?'white':'var(--text3)'}"></i>
            </div>
            <div class="prod-step-label"
              style="${i===curIdx?`color:${s.color};font-weight:700`:''}">
              ${s.label}${i===curIdx?' ←':''}
            </div>
          </div>
          ${i < PROD_STEPS.length-1
            ? `<div class="prod-step-line ${i<curIdx?'active':''}"></div>`
            : ''}`).join('')}
      </div>
    </div>

    <!-- 資訊 -->
    <div class="form-card" style="margin-top:8px;">
      ${cust ? `<div class="cust-info-row"><i class="ti ti-user"></i>${cust.name}</div>` : ''}
      ${p.sourceOrderNo ? `<div class="cust-info-row"><i class="ti ti-link"></i>來源訂單：${p.sourceOrderNo}</div>` : ''}
      ${p.deadline ? `<div class="cust-info-row"><i class="ti ti-calendar"></i>完成期限：${fmtDate(p.deadline)}</div>` : ''}
      ${p.remark   ? `<div class="cust-info-row"><i class="ti ti-notes"></i>${p.remark}</div>` : ''}
    </div>

    <!-- 品項 -->
    <div class="section-title" style="margin-top:12px;"><i class="ti ti-package"></i> 生產品項</div>
    ${(p.items||[]).map(item => {
      const bom = BOM[item.id] || [];
      return `<div class="inv-item" style="cursor:default;margin-bottom:6px;">
        <div class="inv-item-emoji">${item.emoji}</div>
        <div class="inv-item-info">
          <div class="inv-item-name">${item.name}</div>
          <div class="inv-item-id">${bom.length?`需要 ${bom.length} 種材料`:'無 BOM 設定'}</div>
        </div>
        <div class="inv-item-right">
          <div class="inv-qty ok" style="font-size:22px;">${item.qty}</div>
          <div class="inv-unit">個</div>
        </div>
      </div>`;
    }).join('') || '<div class="order-empty">無品項</div>'}

    <!-- 狀態推進按鈕 -->
    <div style="margin-top:14px;">
      ${next && p.status !== 'shipped' ? `
      <button class="confirm-btn" style="background:${next.color};"
        onclick="advanceProdStatus('${p.id}')">
        <i class="ti ${next.icon}"></i> 推進到「${next.label}」
      </button>` : ''}
      ${p.status === 'shipped' ? `
      <div style="text-align:center;padding:14px;color:var(--green);font-size:15px;font-weight:600;">
        <i class="ti ti-circle-check"></i> 此生產單已完成出貨
      </div>` : ''}
      ${isAdmin() ? `
      <button class="redit-btn" style="margin-top:8px;color:var(--red);border-color:var(--red);"
        onclick="requireAdmin(()=>hardDeleteProduction('${p.id}'),'永久刪除生產單需要管理員權限')">
        <i class="ti ti-trash"></i> 永久刪除生產單
      </button>` : ''}
    </div>

    <!-- 狀態記錄 -->
    <div class="section-title" style="margin-top:14px;"><i class="ti ti-history"></i> 狀態記錄</div>
    ${(p.statusLog||[]).slice().reverse().map(l => {
      const s = stepOf(l.status);
      return `<div class="inv-warn-row" style="cursor:default;">
        <div>
          <div style="font-size:14px;font-weight:600;">${s.label}</div>
          <div style="font-size:12px;color:var(--text3);">${l.note || ''}</div>
        </div>
        <div style="font-size:12px;color:var(--text3);">${l.time}</div>
      </div>`;
    }).join('') || '<div class="order-empty">尚無記錄</div>'}`;
}

// ── 推進製程狀態 ──
function advanceProdStatus(id){
  const p    = getProdOrder(id);
  if(!p) return;
  const next = nextStep(p.status);
  if(!next) return;
  const now  = nowStr();

  p.status = next.key;
  p.statusLog = p.statusLog || [];
  p.statusLog.push({ status:next.key, label:next.label, time:now, note:'' });

  let orderSynced = false;

  // 完成時：BOM 扣料，成品入庫，並同步訂單狀態
  if(next.key === 'done'){
    const locId = getMainLocation()?.id || 'store_A';
    p.items.forEach(item => {
      const bom = BOM[item.id] || [];
      bom.forEach(b => {
        adjustStock(b.materialId, locId, -(b.qty * item.qty), {
          op:'produce_deduct', refId:p.id, refType:'production',
          note:`生產 ${item.name} x${item.qty}`,
        });
      });
      adjustStock(item.id, locId, item.qty, {
        op:'produce', refId:p.id, refType:'production', note:'生產完成入庫',
      });
    });
    if(p.sourceOrderId){
      const ord = getOrder(p.sourceOrderId);
      if(ord && ord.status === 'producing'){
        ord.status    = 'ready';
        ord.updatedAt = todayStr();
        const oidx = orders.findIndex(o => o.id === ord.id);
        if(oidx >= 0) orders[oidx] = ord;
        saveOrders();
        orderSynced = true;
      }
    }
  }

  const idx = productionOrders.findIndex(po => po.id === p.id);
  if(idx >= 0) productionOrders[idx] = p;
  saveProdOrders();
  _currentProd = JSON.parse(JSON.stringify(p));
  renderProdDetailPage();
  renderProductionList(_prodFilter);
  if(next.key === 'done'){
    showToast('✅ 生產完成！成品已入庫' + (orderSynced ? '，訂單已更新為待出貨' : ''));
  } else {
    showToast(`✅ 狀態已更新為「${next.label}」`);
  }
}

// ── 管理員永久刪除生產單 ──
function hardDeleteProduction(id){
  if(!confirm('確定永久刪除此生產單？此操作無法復原。')) return;
  productionOrders = productionOrders.filter(p => p.id !== id);
  saveProdOrders();
  showToast('🗑️ 生產單已刪除');
  renderProductionList(_prodFilter);
  showPage('production');
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  renderProductionList('all');
});

</script>
<script>
/* ── js/purchase.js ── */
// ============================================================
// purchase.js — 採購單管理（草稿 → 已下單 → 已入庫）
// ============================================================

let purchases = JSON.parse(localStorage.getItem('erp_purchases') || '[]');

function savePurchases(){
  localStorage.setItem('erp_purchases', JSON.stringify(purchases));
  if(typeof pushToFirebase === 'function') pushToFirebase('purchases', purchases);
}

function genPurchaseNo(){ return genNo('PU', purchases, 'no'); }
function getPurchase(id){ return purchases.find(p => p.id === id) || null; }

// ── 狀態設定 ──
const PURCHASE_STATUS = {
  draft:     { label:'草稿',   cls:'badge-draft',    icon:'ti-pencil' },
  ordered:   { label:'待收貨', cls:'badge-pending',  icon:'ti-clock' },
  received:  { label:'已入庫', cls:'badge-done',     icon:'ti-circle-check' },
  completed: { label:'已入庫', cls:'badge-done',     icon:'ti-circle-check' }, // 舊資料相容
  cancelled: { label:'已取消', cls:'badge-archived', icon:'ti-ban' },
};

const PURCHASE_PAY_STATUS = {
  unpaid: { label:'未付款', cls:'pay-badge-unpaid' },
  paid:   { label:'已付款', cls:'pay-badge-paid' },
};

function puStatusBadge(status){
  const s = PURCHASE_STATUS[status] || PURCHASE_STATUS.draft;
  return `<span class="status-badge ${s.cls}"><i class="ti ${s.icon}"></i> ${s.label}</span>`;
}

function puPayBadge(payStatus){
  const s = PURCHASE_PAY_STATUS[payStatus] || PURCHASE_PAY_STATUS.unpaid;
  return `<span class="status-badge ${s.cls}">${s.label}</span>`;
}

// ── 列表 ──
let _puFilter = 'all';

function initPurchasePage(){
  const el = document.getElementById('purchase-content');
  if(!el) return;
  el.innerHTML = `
    <div class="filter-tabs" style="margin:-4px -4px 10px;">
      <button class="ftab active" onclick="renderPurchaseList('all')">全部</button>
      <button class="ftab" onclick="renderPurchaseList('draft')">草稿</button>
      <button class="ftab" onclick="renderPurchaseList('ordered')">待收貨</button>
      <button class="ftab" onclick="renderPurchaseList('received')">已入庫</button>
      <button class="ftab" onclick="renderPurchaseList('unpaid')">未付款</button>
    </div>
    <div id="purchase-list-container"></div>
    <button class="confirm-btn" style="background:var(--green);margin-top:8px;"
      onclick="newPurchase()">
      <i class="ti ti-plus"></i> 新增採購單
    </button>`;
  renderPurchaseList('all');
}

function renderPurchaseList(filter){
  _puFilter = filter || 'all';
  const tabs    = document.querySelectorAll('#purchase-content .ftab');
  const filters = ['all','draft','ordered','received','unpaid'];
  tabs.forEach((btn, i) => btn.classList.toggle('active', filters[i] === _puFilter));

  const el = document.getElementById('purchase-list-container');
  if(!el) return;

  let list = [...purchases].reverse();
  if(_puFilter === 'unpaid'){
    list = list.filter(p =>
      (p.status === 'ordered' || p.status === 'received' || p.status === 'completed')
      && p.payStatus !== 'paid'
    );
  } else if(_puFilter === 'received'){
    list = list.filter(p => p.status === 'received' || p.status === 'completed');
  } else if(_puFilter !== 'all'){
    list = list.filter(p => p.status === _puFilter);
  }

  if(!list.length){
    el.innerHTML = '<div class="order-empty">沒有符合的採購單</div>';
    return;
  }

  el.innerHTML = list.map(pu => {
    const sup      = SUPPLIERS.find(s => s.id === pu.supplierId);
    const itemsStr = (pu.items||[]).slice(0,2).map(i=>i.name).join('、')
      + ((pu.items||[]).length > 2 ? ` 等${pu.items.length}項` : '');
    const showPay  = pu.status === 'ordered' || pu.status === 'received' || pu.status === 'completed';
    return `<div class="list-card" onclick="showPurchaseDetail('${pu.id}')">
      <div class="list-card-top">
        <span class="list-card-no">${pu.no}</span>
        <div style="display:flex;gap:6px;">
          ${puStatusBadge(pu.status)}
          ${showPay ? puPayBadge(pu.payStatus) : ''}
        </div>
      </div>
      <div class="list-card-meta">
        ${sup ? `<span><i class="ti ti-building-store"></i>${sup.name}</span>` : ''}
        <span><i class="ti ti-calendar"></i>${fmtDate(pu.createdAt)}</span>
        ${pu.expectedDate ? `<span><i class="ti ti-clock"></i>預計 ${fmtDate(pu.expectedDate)}</span>` : ''}
      </div>
      <div class="list-card-items">${itemsStr || '無品項'}</div>
      <div class="list-card-footer">
        <span class="list-card-amount">${fmtMoney(pu.totalCost||0)}</span>
      </div>
    </div>`;
  }).join('');
}

// ── 新增採購單 ──
let _currentPurchase = null;

function newPurchase(){
  _currentPurchase = {
    id:           null,
    no:           genPurchaseNo(),
    supplierId:   null,
    locationId:   getMainLocation?.()?.id || 'store_A',
    items:        [],
    totalCost:    0,
    remark:       '',
    status:       'draft',
    payStatus:    'unpaid',
    expectedDate: '',
    orderedAt:    '',
    receivedAt:   '',
    createdAt:    todayStr(),
    updatedAt:    todayStr(),
  };
  renderPurchaseEditPage();
  showPage('purchase-edit');
}

function showPurchaseDetail(id){
  const pu = getPurchase(id);
  if(!pu) return;
  _currentPurchase = JSON.parse(JSON.stringify(pu));
  renderPurchaseEditPage();
  showPage('purchase-edit');
}

// ── 編輯頁 ──
function renderPurchaseEditPage(){
  const page = document.getElementById('page-purchase-edit');
  if(!page) return;
  const pu         = _currentPurchase;
  const sup        = SUPPLIERS.find(s => s.id === pu.supplierId);
  const isReceived = pu.status === 'received' || pu.status === 'completed';
  const isOrdered  = pu.status === 'ordered';
  const isDraft    = pu.status === 'draft' || !pu.status;
  const isEditable = isDraft || isAdmin();  // 管理員可強制編輯任何狀態

  page.innerHTML = `
    <div class="op-header">
      <button class="back-btn" onclick="showPage('purchase')"><i class="ti ti-arrow-left"></i></button>
      <div class="op-title">${pu.id ? pu.no : '新增採購單'}</div>
      ${isEditable
        ? `<button class="small-btn green-btn" onclick="savePurchaseDraft()">
             <i class="ti ti-device-floppy"></i> 儲存
           </button>`
        : '<span></span>'}
    </div>

    <div class="form-card">
      <div class="form-meta-row">
        <span class="form-no">${pu.no}</span>
        <div style="display:flex;gap:6px;align-items:center;">
          ${puStatusBadge(pu.status)}
          ${!isDraft ? puPayBadge(pu.payStatus) : ''}
        </div>
      </div>

      <!-- 廠商 -->
      <div class="form-section-title">廠商</div>
      <button class="customer-select-btn" ${!isEditable ? 'disabled' : ''}
        onclick="openSupplierPicker()">
        <i class="ti ti-building-store"></i>
        <span id="pu-supplier-name">${sup ? sup.name : '選擇廠商'}</span>
        <i class="ti ti-chevron-right" style="margin-left:auto;"></i>
      </button>
      ${sup ? `<div id="pu-supplier-info" class="customer-info-box" style="margin-top:6px;">
        ${_getSupplierInfoLines(pu.supplierId)}
      </div>` : ''}

      <!-- 入庫地點 -->
      <div class="cust-field" style="margin-top:12px;">
        <label>入庫地點</label>
        <select id="pu-location" ${!isEditable && !isOrdered ? 'disabled' : ''}
          onchange="_currentPurchase.locationId=this.value">
          ${getStoreLocations().map(loc =>
            `<option value="${loc.id}" ${pu.locationId===loc.id?'selected':''}>${loc.name}</option>`
          ).join('')}
        </select>
      </div>

      <!-- 品項 -->
      <div class="form-section-title" style="margin-top:10px;">進貨品項</div>
      ${isEditable ? `
      <div class="search-bar">
        <i class="ti ti-search"></i>
        <input type="search" id="purchase-search"
          placeholder="搜尋可進貨品項（原料、包材等）..."
          oninput="searchItemsFor('purchase',this.value)" />
      </div>
      <div id="purchase-search-result" style="display:none;"></div>` : ''}
      <div class="order-list-header">
        <span class="order-list-title">進貨清單</span>
        <span class="order-count" id="pu-item-count">${pu.items.length} 項</span>
      </div>
      <div class="order-list" id="pu-item-list"></div>

      <!-- 採購總金額 -->
      <div class="amount-section" style="margin-top:12px;">
        <div class="amount-row grand">
          <span>採購總金額</span>
          <strong id="pu-total">${fmtMoney(pu.totalCost||0)}</strong>
        </div>
      </div>

      <!-- 預計到貨日 -->
      <div class="cust-field" style="margin-top:10px;">
        <label>預計到貨日</label>
        <input type="date" id="pu-expected-date" value="${pu.expectedDate||''}"
          ${isReceived ? 'disabled' : ''} />
      </div>

      <!-- 備註 -->
      <div class="cust-field">
        <label>備註</label>
        <textarea id="pu-remark" rows="2"
          ${isReceived ? 'disabled' : ''}>${pu.remark||''}</textarea>
      </div>

      <!-- 付款狀態（下單後才顯示）-->
      ${!isDraft ? `
      <div class="form-section-title" style="margin-top:14px;">付款</div>
      <div class="amount-section">
        <div class="amount-row">
          <span>付款狀態</span>
          <div style="display:flex;gap:6px;">
            <button class="pay-status-btn ${pu.payStatus!=='paid'?'active':''}"
              id="pu-pay-unpaid" onclick="setPuPayStatus('unpaid')">未付款</button>
            <button class="pay-status-btn ${pu.payStatus==='paid'?'active':''}"
              id="pu-pay-paid" onclick="setPuPayStatus('paid')">已付款</button>
          </div>
        </div>
      </div>` : ''}
    </div>

    <!-- 進度時間軸 -->
    ${pu.id ? _renderPurchaseTimeline(pu) : ''}

    <!-- 操作按鈕 -->
    ${isDraft ? `
    <button class="confirm-btn" style="background:var(--green);margin-top:8px;"
      onclick="submitPurchaseOrder()">
      <i class="ti ti-send"></i> 送出採購單（向廠商下單）
    </button>` : ''}
    ${isOrdered ? `
    <button class="confirm-btn" style="background:var(--purple);margin-top:8px;"
      onclick="receivePurchaseStock()">
      <i class="ti ti-package-import"></i> 確認到貨入庫
    </button>` : ''}
    ${(isOrdered || isDraft) ? `
    <button class="redit-btn"
      style="margin-top:8px;color:var(--red);border-color:var(--red);"
      onclick="cancelPurchase('${pu.id||''}')">
      <i class="ti ti-ban"></i> 取消採購單
    </button>` : ''}
    ${isAdmin() && pu.id ? `
    <button class="redit-btn" style="margin-top:8px;color:var(--red);border-color:var(--red);"
      onclick="requireAdmin(()=>hardDeletePurchase('${pu.id}'),'永久刪除採購單需要管理員權限')">
      <i class="ti ti-trash"></i> 永久刪除採購單
    </button>` : ''}`;

  renderPuItems();
}

function _getSupplierInfoLines(id){
  if(!id) return '無聯絡資料';
  const extra = JSON.parse(localStorage.getItem('erp_sup_' + id) || '{}');
  return [
    extra.contact ? `👤 ${extra.contact}` : '',
    extra.tel     ? `📞 ${extra.tel}`     : '',
    extra.email   ? `✉️ ${extra.email}`   : '',
  ].filter(Boolean).join('<br>') || '無聯絡資料';
}

function _renderPurchaseTimeline(pu){
  const steps = [
    { label:'建立草稿',   time: pu.createdAt,  done: true },
    { label:'送出採購單', time: pu.orderedAt,   done: !!pu.orderedAt },
    { label:'到貨入庫',   time: pu.receivedAt,  done: !!pu.receivedAt
        || pu.status==='completed' },
  ];
  const rows = steps.map((s, i) => `
    <div style="display:flex;align-items:center;gap:10px;padding:6px 0;
      ${i<steps.length-1?'border-bottom:1px solid var(--border);':''}">
      <div style="width:10px;height:10px;border-radius:50%;flex-shrink:0;
        background:${s.done?'var(--green)':'var(--border)'};"></div>
      <span style="font-size:13px;color:${s.done?'var(--text)':'var(--text3)'};">
        ${s.label}
      </span>
      <span style="font-size:12px;color:var(--text3);margin-left:auto;">
        ${s.time ? fmtDate(s.time) : '—'}
      </span>
    </div>`).join('');
  return `<div class="form-card" style="margin-top:8px;">
    <div class="form-section-title">進度</div>
    ${rows}
  </div>`;
}

// ── 品項管理 ──
function addPurchaseItem(productId){
  const item = getItem(productId);
  if(!item || !_currentPurchase) return;
  const existing = _currentPurchase.items.find(i => i.id === productId);
  if(existing){ existing.qty++; }
  else {
    _currentPurchase.items.push({
      id:       productId,
      name:     item.name,
      emoji:    item.emoji,
      qty:      1,
      unitCost: item.costPrice || 0,
    });
  }
  renderPuItems();
  calcPuTotal();
}

function removePurchaseItem(idx){
  if(!_currentPurchase) return;
  _currentPurchase.items.splice(idx, 1);
  renderPuItems();
  calcPuTotal();
}

function changePurchaseQty(idx, delta){
  const item = _currentPurchase?.items[idx];
  if(item) item.qty = Math.max(1, item.qty + delta);
  renderPuItems();
  calcPuTotal();
}

function changePurchaseCost(idx, val){
  const item = _currentPurchase?.items[idx];
  if(item){ item.unitCost = parseInt(val) || 0; calcPuTotal(); }
}

function renderPuItems(){
  const el    = document.getElementById('pu-item-list');
  const count = document.getElementById('pu-item-count');
  if(!el || !_currentPurchase) return;
  const items      = _currentPurchase.items;
  const isEditable = _currentPurchase.status === 'draft' || !_currentPurchase.status || isAdmin();
  if(count) count.textContent = items.length + ' 項';
  if(!items.length){
    el.innerHTML = '<div class="order-empty">請搜尋商品加入進貨清單</div>';
    return;
  }
  el.innerHTML = items.map((item, idx) => `
    <div class="order-row">
      <div class="order-emoji">${item.emoji}</div>
      <div class="order-info">
        <div class="order-name">${item.name}</div>
        <div class="order-id" style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:12px;">進貨價</span>
          ${isEditable
            ? `<input type="number" class="unit-price-input" value="${item.unitCost}" min="0"
                 onchange="changePurchaseCost(${idx},this.value)" onclick="this.select()" />`
            : `<span style="font-weight:700;">$${item.unitCost}</span>`}
        </div>
      </div>
      <div class="qty-ctrl">
        ${isEditable
          ? `<button class="qty-btn" onclick="changePurchaseQty(${idx},-1)">−</button>
             <span class="qty-num">${item.qty}</span>
             <button class="qty-btn" onclick="changePurchaseQty(${idx},1)">＋</button>`
          : `<span class="qty-num">${item.qty}</span>`}
      </div>
      ${isEditable
        ? `<button class="order-del" onclick="removePurchaseItem(${idx})">
             <i class="ti ti-x"></i>
           </button>`
        : ''}
    </div>`).join('');
}

function calcPuTotal(){
  if(!_currentPurchase) return;
  const total = _currentPurchase.items.reduce((s,i) => s + (i.unitCost||0) * i.qty, 0);
  _currentPurchase.totalCost = total;
  const el = document.getElementById('pu-total');
  if(el) el.textContent = fmtMoney(total);
}

// ── 收集表單 ──
function collectPurchaseForm(){
  if(!_currentPurchase) return;
  _currentPurchase.expectedDate = document.getElementById('pu-expected-date')?.value || '';
  _currentPurchase.remark       = document.getElementById('pu-remark')?.value.trim() || '';
  _currentPurchase.locationId   = document.getElementById('pu-location')?.value
                                 || _currentPurchase.locationId;
  _currentPurchase.updatedAt    = todayStr();
  calcPuTotal();
}

// ── upsert ──
function upsertPurchase(){
  if(!_currentPurchase.id) _currentPurchase.id = 'PU' + Date.now();
  const idx  = purchases.findIndex(p => p.id === _currentPurchase.id);
  const copy = JSON.parse(JSON.stringify(_currentPurchase));
  if(idx >= 0) purchases[idx] = copy;
  else         purchases.push(copy);
  savePurchases();
}

// ── 儲存草稿 ──
function savePurchaseDraft(){
  if(!_currentPurchase.items.length){ showToast('⚠️ 請先加入品項'); return; }
  collectPurchaseForm();
  upsertPurchase();
  renderPurchaseList(_puFilter);
  showToast('📝 採購單已儲存：' + _currentPurchase.no);
}

// ── 送出採購單（草稿 → 已下單，不入庫）──
function submitPurchaseOrder(){
  if(!_currentPurchase.supplierId){ showToast('⚠️ 請先選擇廠商'); return; }
  if(!_currentPurchase.items.length){ showToast('⚠️ 請先加入品項'); return; }
  collectPurchaseForm();
  _currentPurchase.status    = 'ordered';
  _currentPurchase.orderedAt = todayStr();
  upsertPurchase();
  renderPurchaseList(_puFilter);
  renderPurchaseEditPage();
  showToast('✅ 採購單已下單，等待到貨：' + _currentPurchase.no);
}

// ── 確認到貨入庫（已下單 → 已入庫，此時才異動庫存）──
function receivePurchaseStock(){
  if(!_currentPurchase) return;
  const pu    = _currentPurchase;
  collectPurchaseForm();
  const locId = pu.locationId || getMainLocation()?.id || 'store_A';
  const loc   = getStoreLocations().find(l => l.id === locId);
  const lines = pu.items.map(i => `・${i.emoji} ${i.name} × ${i.qty}`).join('\n');
  if(!confirm(`確認以下商品到貨，入庫至「${loc?.name||locId}」？\n\n${lines}`)) return;

  pu.status     = 'received';
  pu.receivedAt = nowStr();

  adjustStockBatch(
    pu.items.map(i => ({ productId: i.id, qty: i.qty })),
    locId,
    'in',
    { op:'purchase', refId: pu.id, refType:'purchase', note:`採購單入庫 ${pu.no}` }
  );

  upsertPurchase();
  renderPurchaseList(_puFilter);
  renderPurchaseEditPage();
  showToast(`📦 ${pu.items.length} 種商品已入庫：${pu.no}`);
}

// ── 付款狀態 ──
function setPuPayStatus(status){
  if(!_currentPurchase) return;
  _currentPurchase.payStatus = status;
  _currentPurchase.updatedAt = todayStr();
  ['unpaid','paid'].forEach(s =>
    document.getElementById(`pu-pay-${s}`)?.classList.toggle('active', s === status));
  upsertPurchase();
  renderPurchaseList(_puFilter);
  showToast(status === 'paid' ? '✅ 已標記付款' : '已更新為未付款');
}

// ── 取消採購單 ──
function cancelPurchase(id){
  const pu = (id && id !== 'null') ? getPurchase(id) : _currentPurchase;
  if(!pu) return;
  if(pu.status === 'received' || pu.status === 'completed'){
    showToast('⚠️ 已入庫的採購單無法取消'); return;
  }
  if(!confirm(`確定取消採購單 ${pu.no}？`)) return;

  if(!pu.id){
    // 尚未存過的草稿，直接離開
    showPage('purchase'); return;
  }
  pu.status    = 'cancelled';
  pu.updatedAt = todayStr();
  const idx = purchases.findIndex(p => p.id === pu.id);
  if(idx >= 0) purchases[idx] = pu;
  savePurchases();
  renderPurchaseList(_puFilter);
  showToast('❌ 採購單已取消：' + pu.no);
  showPage('purchase');
}

// ── 廠商選擇 Modal ──
let _supplierPickerActive = false;

function openSupplierPicker(){
  _supplierPickerActive = true;
  renderSupplierPickerList('');
  const modal = document.getElementById('supplierPickerModal');
  if(modal) modal.style.display = 'flex';
}

function renderSupplierPickerList(q){
  const el = document.getElementById('supplier-picker-list');
  if(!el) return;
  const list = q
    ? SUPPLIERS.filter(s => s.name.includes(q) || s.id.includes(q))
    : SUPPLIERS;
  el.innerHTML = list.map(s => {
    const extra = JSON.parse(localStorage.getItem('erp_sup_' + s.id) || '{}');
    return `<div class="catdetail-row" onclick="pickSupplier('${s.id}')">
      <div class="catdetail-info">
        <div class="catdetail-name">${s.name}</div>
        <div class="catdetail-id">${s.id}${extra.tel?' ・ '+extra.tel:''}</div>
      </div>
    </div>`;
  }).join('') || '<div class="order-empty">找不到廠商</div>';
}

function pickSupplier(id){
  const s = SUPPLIERS.find(sup => sup.id === id);
  if(!s) return;
  if(_currentPurchase) _currentPurchase.supplierId = id;

  const nameEl = document.getElementById('pu-supplier-name');
  if(nameEl) nameEl.textContent = s.name;

  const infoEl = document.getElementById('pu-supplier-info');
  if(infoEl){
    infoEl.innerHTML     = _getSupplierInfoLines(id);
    infoEl.style.display = 'block';
  } else {
    renderPurchaseEditPage();
  }
  document.getElementById('supplierPickerModal').style.display = 'none';
}

function initSupplierPickerModal(){
  if(document.getElementById('supplierPickerModal')) return;
  const modal = document.createElement('div');
  modal.className     = 'modal-overlay';
  modal.id            = 'supplierPickerModal';
  modal.style.display = 'none';
  modal.onclick = e => { if(e.target === modal) modal.style.display = 'none'; };
  modal.innerHTML = `
    <div class="modal-card">
      <div class="modal-title"><i class="ti ti-building-store"></i> 選擇廠商</div>
      <div class="search-bar" style="margin-bottom:10px;">
        <i class="ti ti-search"></i>
        <input type="search" id="supplier-picker-search" placeholder="搜尋廠商..."
          oninput="renderSupplierPickerList(this.value)" />
      </div>
      <div id="supplier-picker-list" style="max-height:50vh;overflow-y:auto;"></div>
      <button class="modal-cancel-btn" style="margin-top:10px;width:100%;"
        onclick="document.getElementById('supplierPickerModal').style.display='none'">
        取消
      </button>
    </div>`;
  document.body.appendChild(modal);
}

// ── 管理員永久刪除採購單 ──
function hardDeletePurchase(id){
  if(!confirm('確定永久刪除此採購單？此操作無法復原。')) return;
  purchases = purchases.filter(p => p.id !== id);
  savePurchases();
  showToast('🗑️ 採購單已刪除');
  renderPurchaseList(_puFilter);
  showPage('purchase');
}

// ── 舊版相容（report.js 呼叫）──
function renderPurchaseHistory(){}
function confirmPurchase(){ showToast('請使用新版採購單流程'); }

// ── 初始化 ──
document.addEventListener('DOMContentLoaded', () => {
  initSupplierPickerModal();
});

</script>
<script>
/* ── js/transfer.js ── */
// ============================================================
// transfer.js — 調貨單管理（A門市 → B門市）
// ============================================================

let transfers = JSON.parse(localStorage.getItem('erp_transfers') || '[]');

function saveTransfers(){
  localStorage.setItem('erp_transfers', JSON.stringify(transfers));
  if(typeof pushToFirebase === 'function') pushToFirebase('transfers', transfers);
}

function getTransfer(id){ return transfers.find(t => t.id === id) || null; }
function genTransferNo(){ return genNo('TR', transfers, 'no'); }

function renderTransferList(){
  const el = document.getElementById('transfer-list');
  if(!el) return;
  const list = transfers.slice().reverse();
  if(!list.length){
    el.innerHTML = '<div class="order-empty">尚無調貨記錄，點右上角新增</div>';
    return;
  }
  el.innerHTML = list.map(t => {
    const isDone = t.status === 'completed';
    return `<div class="list-card" onclick="showTransferDetail('${t.id}')">
      <div class="list-card-top">
        <span class="list-card-no">${t.no}</span>
        <span class="status-badge ${isDone?'badge-done':'badge-pending'}">
          <i class="ti ${isDone?'ti-check':'ti-clock'}"></i> ${isDone?'已完成':'待確認'}
        </span>
      </div>
      <div class="list-card-meta">
        <span><i class="ti ti-arrows-right-left"></i>
          ${getLocation(t.from)?.name||t.from} → ${getLocation(t.to)?.name||t.to}
        </span>
        <span><i class="ti ti-calendar"></i>${fmtDate(t.createdAt)}</span>
      </div>
      <div class="list-card-items">
        ${(t.items||[]).slice(0,3).map(i=>i.name).join('、')}
        ${(t.items||[]).length>3?' 等'+t.items.length+'項':''}
      </div>
    </div>`;
  }).join('');
}

let _currentTransfer = null;

function newTransfer(){
  const locs = getStoreLocations();
  _currentTransfer = {
    id:'', no:genTransferNo(),
    from: locs.find(l=>l.isMain)?.id  || 'store_A',
    to:   locs.find(l=>!l.isMain)?.id || 'store_B',
    items:[], remark:'', status:'pending', createdAt:todayStr(),
  };
  renderTransferEditPage();
  showPage('transfer-edit');
}

function showTransferDetail(id){
  const t = getTransfer(id);
  if(!t) return;
  _currentTransfer = JSON.parse(JSON.stringify(t));
  renderTransferEditPage();
  showPage('transfer-edit');
}

function renderTransferEditPage(){
  const page = document.getElementById('page-transfer-edit');
  if(!page) return;
  const t = _currentTransfer, locs = getStoreLocations(), isDone = t.status==='completed';
  page.innerHTML = `
    <div class="op-header">
      <button class="back-btn" onclick="showPage('transfer')"><i class="ti ti-arrow-left"></i></button>
      <div class="op-title">${t.id?t.no:'新增調貨單'}</div>
    </div>
    <div class="form-card">
      <div class="form-meta-row">
        <span class="form-no">${t.no}</span>
        <span class="form-date">${fmtDate(t.createdAt)}</span>
      </div>
      <div class="transfer-direction">
        <select id="tr-from" ${isDone?'disabled':''} onchange="updateTransferDir()">
          ${locs.map(l=>`<option value="${l.id}" ${t.from===l.id?'selected':''}>${l.name}</option>`).join('')}
        </select>
        <div class="transfer-arrow"><i class="ti ti-arrow-right"></i></div>
        <select id="tr-to" ${isDone?'disabled':''} onchange="updateTransferDir()">
          ${locs.map(l=>`<option value="${l.id}" ${t.to===l.id?'selected':''}>${l.name}</option>`).join('')}
        </select>
      </div>
      ${!isDone?`<div class="search-bar" style="margin-top:10px;">
        <i class="ti ti-search"></i>
        <input type="search" id="tr-search" placeholder="搜尋成品加入..."
          oninput="searchTransferItems(this.value)"/>
      </div>
      <div id="tr-search-result" style="display:none;"></div>`:''}
      <div class="order-list-header">
        <span class="order-list-title">調貨清單</span>
        <span class="order-count" id="tr-item-count">${t.items.length} 項</span>
      </div>
      <div class="order-list" id="tr-item-list"></div>
      <div class="cust-field" style="margin-top:10px;">
        <label>備註</label>
        <input type="text" id="tr-remark" value="${t.remark||''}"
          placeholder="調貨備註..." ${isDone?'disabled':''}/>
      </div>
    </div>
    ${t.items.length&&!isDone?`<div class="section-title" style="margin-top:10px;"><i class="ti ti-packages"></i> 來源庫存</div>
    <div id="tr-stock-ref"></div>`:''}
    ${!isDone?`<button class="confirm-btn" style="background:var(--green);margin-top:10px;" onclick="confirmTransfer()">
      <i class="ti ti-check"></i> 確認調貨（立即更新庫存）</button>
    <button class="redit-btn" onclick="saveTransferDraft()">
      <i class="ti ti-device-floppy"></i> 存草稿</button>`
    :`<div style="text-align:center;padding:14px;color:var(--green);font-size:15px;font-weight:600;">
      <i class="ti ti-circle-check"></i> 調貨已完成</div>`}`;
  renderTransferItems();
  if(!isDone&&t.items.length) renderTransferStockRef();
}

function updateTransferDir(){
  if(!_currentTransfer) return;
  _currentTransfer.from = document.getElementById('tr-from')?.value;
  _currentTransfer.to   = document.getElementById('tr-to')?.value;
  renderTransferStockRef();
}

function searchTransferItems(q){
  const res = document.getElementById('tr-search-result');
  if(!res||!q){ if(res) res.style.display='none'; return; }
  const results = FINISHED.filter(i=>i.name.includes(q)||i.id.toLowerCase().startsWith(q.toLowerCase())).slice(0,10);
  if(!results.length){ res.style.display='none'; return; }
  res.style.display='block';
  res.innerHTML = results.map(item=>{
    const s = getStock(item.id, _currentTransfer?.from||'store_A');
    return `<div class="ss-item" onmousedown="addTransferItem('${item.id}')">
      <span class="ss-emoji">${item.emoji}</span>
      <div class="ss-info"><div class="ss-name">${item.name}</div><div class="ss-sub">${item.id}</div></div>
      <div class="${s<=0?'ss-qty-empty':'ss-qty-ok'} ss-stock">${s}</div>
    </div>`;
  }).join('');
}

function addTransferItem(id){
  const item = getItem(id); if(!item) return;
  const ex   = _currentTransfer.items.find(i=>i.id===id);
  if(ex) ex.qty++;
  else _currentTransfer.items.push({id, name:item.name, emoji:item.emoji, unit:item.unit||'個', qty:1});
  const r = document.getElementById('tr-search-result');
  if(r) r.style.display='none';
  const s = document.getElementById('tr-search');
  if(s) s.value='';
  renderTransferItems(); renderTransferStockRef();
}

function removeTransferItem(idx){ _currentTransfer.items.splice(idx,1); renderTransferItems(); renderTransferStockRef(); }
function changeTransferQty(idx,delta){
  const item = _currentTransfer.items[idx];
  if(item) item.qty = Math.max(1,item.qty+delta);
  renderTransferItems(); renderTransferStockRef();
}

function renderTransferItems(){
  const el=document.getElementById('tr-item-list'), cnt=document.getElementById('tr-item-count');
  if(!el||!_currentTransfer) return;
  const items=_currentTransfer.items, isDone=_currentTransfer.status==='completed';
  if(cnt) cnt.textContent=items.length+' 項';
  if(!items.length){ el.innerHTML='<div class="order-empty">尚未加入品項</div>'; return; }
  el.innerHTML=items.map((item,idx)=>`
    <div class="order-row">
      <div class="order-emoji">${item.emoji}</div>
      <div class="order-info"><div class="order-name">${item.name}</div><div class="order-id">${item.id}</div></div>
      <div class="qty-ctrl">
        ${isDone?`<span class="qty-num">${item.qty}</span>`
        :`<button class="qty-btn" onclick="changeTransferQty(${idx},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeTransferQty(${idx},1)">＋</button>`}
      </div>
      ${isDone?'':`<button class="order-del" onclick="removeTransferItem(${idx})"><i class="ti ti-x"></i></button>`}
    </div>`).join('');
}

function renderTransferStockRef(){
  const el=document.getElementById('tr-stock-ref');
  if(!el||!_currentTransfer) return;
  el.innerHTML=_currentTransfer.items.map(item=>{
    const s=getStock(item.id,_currentTransfer.from), after=s-item.qty;
    const cls=after<0?'inv-qty empty':after<=3?'inv-qty low':'inv-qty ok';
    return `<div class="inv-warn-row" style="cursor:default;">
      <span>${item.emoji} ${item.name}</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:13px;color:var(--text3);">現有 ${s}</span>
        <i class="ti ti-arrow-right" style="color:var(--text3);"></i>
        <span class="${cls}" style="font-size:16px;">${after}</span>
      </div>
    </div>`;
  }).join('');
}

function saveTransferDraft(){
  if(!_currentTransfer.items.length){ showToast('⚠️ 請先加入品項'); return; }
  _currentTransfer.remark=document.getElementById('tr-remark')?.value.trim()||'';
  upsertTransfer(); showToast('📝 調貨單已儲存'); showPage('transfer');
}

function confirmTransfer(){
  if(!_currentTransfer.items.length){ showToast('⚠️ 請先加入品項'); return; }
  if(_currentTransfer.from===_currentTransfer.to){ showToast('⚠️ 來源和目的地不能相同'); return; }
  const bad=_currentTransfer.items.filter(i=>getStock(i.id,_currentTransfer.from)<i.qty);
  if(bad.length){ showToast('⚠️ '+bad.map(i=>i.name).join('、')+' 庫存不足'); return; }
  _currentTransfer.remark=document.getElementById('tr-remark')?.value.trim()||'';
  _currentTransfer.status='completed';
  _currentTransfer.completedAt=todayStr();
  if(!_currentTransfer.id) _currentTransfer.id='TR'+Date.now();
  transferStock(
    _currentTransfer.items.map(i=>({productId:i.id,qty:i.qty})),
    _currentTransfer.from, _currentTransfer.to,
    {op:'transfer',refId:_currentTransfer.id,refType:'transfer',note:'調貨 '+_currentTransfer.no}
  );
  upsertTransfer(); showToast('✅ 調貨完成！庫存已更新'); showPage('transfer');
}

function upsertTransfer(){
  if(!_currentTransfer.id) _currentTransfer.id='TR'+Date.now();
  const idx=transfers.findIndex(t=>t.id===_currentTransfer.id);
  const copy=JSON.parse(JSON.stringify(_currentTransfer));
  if(idx>=0) transfers[idx]=copy; else transfers.push(copy);
  saveTransfers(); renderTransferList();
}

document.addEventListener('DOMContentLoaded', ()=>renderTransferList());

</script>
<script>
/* ── js/pos.js ── */
// ============================================================
// pos.js — A 門市 POS 收款
// 也支援外展模式（由 events.js 切換）
// ============================================================

let _posCart       = [];       // 購物車品項
let _posPayMethod  = 'cash';
let _posEventId    = null;     // 外展模式時設定
let _posDiscount   = { type:'none', value:0 };

// ── 初始化 ──
function initPOS(eventId){
  _posCart      = [];
  _posPayMethod = 'cash';
  _posEventId   = eventId || null;
  _posDiscount  = { type:'none', value:0 };

  // 重設表單
  const searchEl = document.getElementById('pos-search');
  if(searchEl) searchEl.value = '';
  const resEl = document.getElementById('pos-search-result');
  if(resEl) resEl.style.display = 'none';
  const discType = document.getElementById('pos-discount-type');
  if(discType) discType.value = 'none';
  const discVal = document.getElementById('pos-discount-value');
  if(discVal) discVal.value = '0';

  selectPayMethod('cash');
  renderCart();
  calcPOSTotal();

  // 外展 banner
  const banner = document.getElementById('event-pos-banner');
  if(banner) banner.style.display = _posEventId ? 'block' : 'none';
}

// 取得供應商附加資訊（故事、寄賣等）
function getSupplierExtra(supplierId){
  if(!supplierId) return {};
  return JSON.parse(localStorage.getItem('erp_sup_' + supplierId) || '{}');
}

// ── 加入商品 ──
function addPOSItem(productId){
  const item = getItem(productId);
  if(!item) return;

  // 外展模式：檢查帶貨量
  if(_posEventId){
    const event    = typeof events !== 'undefined' ? events.find(e=>e.id===_posEventId) : null;
    const evItem   = event?.items?.find(i=>i.id===productId);
    if(evItem){
      const soldQty = typeof calcEventItemSoldQty==='function'
        ? calcEventItemSoldQty(_posEventId, productId) : 0;
      const remain  = Math.max(0, (evItem.takeQty||0) - soldQty);
      // 目前購物車中已有幾個
      const inCart  = _posCart.find(i=>i.id===productId)?.qty || 0;
      if(inCart + 1 > remain){
        showToast(`⚠️ ${item.name} 帶貨數量不足（剩 ${remain} 個）`);
        return;
      }
    }
  }

  const existing = _posCart.find(i => i.id === productId);
  if(existing){
    existing.qty++;
  } else {
    const supExtra = getSupplierExtra(item.supplierId);
    _posCart.push({
      id:            productId,
      name:          item.name,
      emoji:         item.emoji,
      qty:           1,
      originalPrice: item.salePrice,
      unitPrice:     item.salePrice,
      supplierId:    item.supplierId || null,
      story:         supExtra.story || '',
    });
  }
  renderCart();
  calcPOSTotal();
}

// 讓 smartsearch 可以呼叫
window.addPOSItem = addPOSItem;

// 取得購物車中某商品的數量（供外展快捷格使用）
function getPOSCartQty(itemId){
  return _posCart.find(i => i.id === itemId)?.qty || 0;
}
window.getPOSCartQty = getPOSCartQty;

// 從購物車中移除一個某商品（供外展快捷格 − 鍵使用）
function removePOSItemById(productId){
  const idx = _posCart.findIndex(i => i.id === productId);
  if(idx < 0) return;
  if(_posCart[idx].qty > 1) _posCart[idx].qty--;
  else _posCart.splice(idx, 1);
  renderCart(); calcPOSTotal();
}
window.removePOSItemById = removePOSItemById;

function removePOSItem(idx){ _posCart.splice(idx,1); renderCart(); calcPOSTotal(); }
function changePOSQty(idx, delta){
  const item = _posCart[idx];
  if(!item) return;
  item.qty = Math.max(1, item.qty + delta);
  renderCart(); calcPOSTotal();
}
function changePOSItemPrice(idx, val){
  const item = _posCart[idx];
  if(!item) return;
  item.unitPrice = parseInt(val) || 0;
  calcPOSTotal();
}

function showPOSStory(idx){
  const item = _posCart[idx];
  if(!item?.story) return;
  const sup = typeof SUPPLIERS !== 'undefined' ? SUPPLIERS.find(s => s.id === item.supplierId) : null;
  const title = sup ? sup.name : '工廠故事';
  // 動態建立故事 Modal
  let overlay = document.getElementById('pos-story-modal');
  if(!overlay){
    overlay = document.createElement('div');
    overlay.id = 'pos-story-modal';
    overlay.className = 'modal-overlay';
    overlay.style.cssText = 'display:none;';
    overlay.onclick = e => { if(e.target === overlay) overlay.style.display = 'none'; };
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = `
    <div class="modal-card" style="max-width:340px;">
      <div class="modal-title"><i class="ti ti-book" style="color:var(--purple);"></i> 📖 ${title}</div>
      <p style="font-size:14px;line-height:1.7;color:var(--text);white-space:pre-wrap;margin:0 0 16px;">${item.story}</p>
      <button class="modal-ok-btn" onclick="document.getElementById('pos-story-modal').style.display='none'">
        <i class="ti ti-check"></i> 關閉
      </button>
    </div>`;
  overlay.style.display = 'flex';
}
window.showPOSStory = showPOSStory;

function clearPOS(){
  _posCart = [];
  renderCart();
  calcPOSTotal();
  showToast('🗑️ 購物車已清空');
}

// ── 渲染購物車 ──
function renderCart(){
  const el    = document.getElementById('pos-cart');
  const count = document.getElementById('pos-count');
  if(!el) return;
  const total = _posCart.reduce((s,i)=>s+i.qty,0);
  if(count) count.textContent = total + ' 項';
  if(!_posCart.length){
    el.innerHTML = '<div class="order-empty">請搜尋或輸入編號加入商品</div>'; return;
  }
  el.innerHTML = _posCart.map((item, idx) => {
    const isDis = item.unitPrice !== item.originalPrice;
    const safeStory = item.story ? item.story.replace(/'/g, '&#39;').replace(/"/g, '&quot;') : '';
    const storyBtn = item.story
      ? `<button class="qty-btn" title="${safeStory}"
           onclick="showPOSStory(${idx})" style="color:var(--purple);font-size:13px;">
           <i class="ti ti-info-circle"></i>
         </button>`
      : '';
    return `<div class="order-row">
      <div class="order-emoji">${item.emoji}</div>
      <div class="order-info">
        <div class="order-name">${item.name}${storyBtn}</div>
        <div class="order-id" style="display:flex;align-items:center;gap:6px;">
          ${isDis?`<span style="text-decoration:line-through;color:var(--text3);font-size:11px;">$${item.originalPrice}</span>`:''}
          <input type="number" class="unit-price-input ${isDis?'discounted':''}"
            value="${item.unitPrice}" min="0"
            onchange="changePOSItemPrice(${idx},this.value)"
            onclick="this.select()" />
        </div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changePOSQty(${idx},-1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="changePOSQty(${idx},1)">＋</button>
      </div>
      <button class="order-del" onclick="removePOSItem(${idx})"><i class="ti ti-x"></i></button>
    </div>`;
  }).join('');
}

// ── 計算金額 ──
function calcPOSTotal(){
  const subtotal  = _posCart.reduce((s,i) => s + i.unitPrice * i.qty, 0);
  const discType  = document.getElementById('pos-discount-type')?.value  || 'none';
  const discValue = parseInt(document.getElementById('pos-discount-value')?.value) || 0;
  let total = subtotal;
  if(discType==='percent') total = Math.round(subtotal*(1-discValue/100));
  if(discType==='amount')  total = Math.max(0, subtotal-discValue);
  _posDiscount = { type:discType, value:discValue };

  const subEl   = document.getElementById('pos-subtotal');
  const totalEl = document.getElementById('pos-total');
  if(subEl)   subEl.textContent   = fmtMoney(subtotal);
  if(totalEl) totalEl.textContent = fmtMoney(total);

  calcChange();
  return total;
}

// ── 付款方式 ──
function selectPayMethod(method){
  _posPayMethod = method;
  ['cash','card','transfer'].forEach(m =>
    document.getElementById(`pay-${m}`)?.classList.toggle('active', m===method));
  const cashSection = document.getElementById('cash-change-section');
  if(cashSection) cashSection.style.display = method==='cash' ? 'block' : 'none';
}

function calcChange(){
  const total    = parseInt(document.getElementById('pos-total')?.textContent?.replace(/[^0-9]/g,'')) || 0;
  const received = parseInt(document.getElementById('pos-cash-received')?.value) || 0;
  const change   = Math.max(0, received - total);
  const el       = document.getElementById('pos-change');
  if(el) el.textContent = fmtMoney(change);
}

// ── 返回 ──
function posBack(){
  if(_posEventId){
    showPage('event-detail');
  } else {
    showPage('sales-menu');
  }
}

// ── 確認收款 ──
function confirmPOS(){
  if(!_posCart.length){ showToast('⚠️ 購物車是空的'); return; }
  const total    = calcPOSTotal();
  const locId    = _posEventId
    ? ('event_'+_posEventId)
    : (getMainLocation()?.id || 'store_A');
  const now      = nowStr();
  const refId    = 'POS' + Date.now();

  // 扣庫存（門市模式）
  if(!_posEventId){
    const storeLocId = getMainLocation()?.id || 'store_A';
    _posCart.forEach(item => {
      adjustStock(item.id, storeLocId, -item.qty, {
        op:      'pos_sale',
        refId,
        refType: 'pos',
        note:    'A 門市 POS',
      });
    });
  }

  // 寫銷售記錄（每個品項一筆）
  _posCart.forEach(item => {
    addLog({
      op:          'pos_sale',
      locationId:  locId,
      productId:   item.id,
      productName: item.name,
      qty:         item.qty,
      unitPrice:   item.unitPrice,
      amount:      item.unitPrice * item.qty,
      payMethod:   _posPayMethod,
      eventId:     _posEventId || null,
      refId,
    });
  });

  // 外展模式：通知 events.js 更新剩餘數量
  if(_posEventId && typeof onEventSale === 'function'){
    onEventSale(_posEventId, _posCart);
  }

  showToast(`✅ 收款完成！${fmtMoney(total)}`);
  showReceipt(total);
  _posCart = [];
  renderCart();
  calcPOSTotal();
}

// ── 收據（簡易）──
function showReceipt(total){
  const cashReceived = parseInt(document.getElementById('pos-cash-received')?.value) || 0;
  const change       = Math.max(0, cashReceived - total);
  const lines        = _posCart.map(i =>
    `${i.emoji} ${i.name} x${i.qty}  ${fmtMoney(i.unitPrice*i.qty)}`
  ).join('\n');
  const msg = `✅ 收款完成\n\n${lines}\n\n總計：${fmtMoney(total)}` +
    (_posPayMethod==='cash' && cashReceived ? `\n收款：${fmtMoney(cashReceived)}\n找零：${fmtMoney(change)}` : '');
  // 簡易 Toast 就夠了，未來可改成正式收據頁面
  setTimeout(() => showToast('🧾 ' + fmtMoney(total) + ' 已記錄'), 500);
}

document.addEventListener('DOMContentLoaded', () => {
  initPOS();
});

</script>
<script>
/* ── js/storeB.js ── */
// ============================================================
// storeB.js — B 門市日銷售輸入
// ============================================================

let storeBSales = JSON.parse(localStorage.getItem('erp_storeb_sales') || '[]');

function saveStoreBSales(){
  localStorage.setItem('erp_storeb_sales', JSON.stringify(storeBSales));
  if(typeof pushToFirebase === 'function') pushToFirebase('storeBSales', storeBSales);
}

// ── 初始化頁面 ──
let _storeBItems = [];

function initStoreBPage(){
  _storeBItems = [];
  const dateEl = document.getElementById('storeB-date');
  if(dateEl) dateEl.value = todayStr();
  renderStoreBItems();
}

// ── 品項管理 ──
function addStoreBItem(productId){
  const item = getItem(productId);
  if(!item) return;
  const existing = _storeBItems.find(i => i.id === productId);
  if(existing){ existing.qty++; }
  else {
    _storeBItems.push({
      id:    productId,
      name:  item.name,
      emoji: item.emoji,
      qty:   1,
    });
  }
  const si = document.getElementById('storeB-search');
  if(si) si.value = '';
  const ri = document.getElementById('storeB-search-result');
  if(ri) ri.style.display = 'none';
  renderStoreBItems();
}

function removeStoreBItem(idx){ _storeBItems.splice(idx,1); renderStoreBItems(); }
function changeStoreBQty(idx, delta){
  const item = _storeBItems[idx];
  if(item) item.qty = Math.max(1, item.qty + delta);
  renderStoreBItems();
}

function renderStoreBItems(){
  const el = document.getElementById('storeB-item-list');
  if(!el) return;
  if(!_storeBItems.length){
    el.innerHTML = '<div class="order-empty">尚未加入品項，請搜尋今日有售出的商品</div>'; return;
  }
  el.innerHTML = _storeBItems.map((item, idx) => `
    <div class="order-row">
      <div class="order-emoji">${item.emoji}</div>
      <div class="order-info">
        <div class="order-name">${item.name}</div>
        <div class="order-id">B 門市目前庫存：${getStock(item.id,'store_B')} 個</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeStoreBQty(${idx},-1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="changeStoreBQty(${idx},1)">＋</button>
      </div>
      <button class="order-del" onclick="removeStoreBItem(${idx})"><i class="ti ti-x"></i></button>
    </div>`).join('');
}

// ── 送出 ──
function submitStoreBSale(){
  if(!_storeBItems.length){ showToast('⚠️ 請先加入銷售品項'); return; }
  const date   = document.getElementById('storeB-date')?.value || todayStr();
  const locId  = 'store_B';

  // 扣 B 門市庫存
  _storeBItems.forEach(item => {
    adjustStock(item.id, locId, -item.qty, {
      op:      'pos_sale',
      refType: 'storeb',
      note:    `B 門市 ${fmtDate(date)}`,
    });
  });

  // 存記錄
  const sale = {
    id:       'BS' + Date.now(),
    date,
    locationId: locId,
    items:    JSON.parse(JSON.stringify(_storeBItems)),
    inputBy:  currentRole(),
    createdAt: nowStr(),
  };
  storeBSales.push(sale);
  saveStoreBSales();

  showToast(`✅ B 門市銷售已記錄（${_storeBItems.length} 種商品）`);
  _storeBItems = [];
  renderStoreBItems();
}

document.addEventListener('DOMContentLoaded', () => {
  if(typeof initStoreBPage === 'function') initStoreBPage();
});

</script>
<script>
/* ── js/events.js ── */
// ============================================================
// events.js — 外展活動管理
// ============================================================

let events = JSON.parse(localStorage.getItem('erp_events') || '[]');

function saveEvents(){
  localStorage.setItem('erp_events', JSON.stringify(events));
  if(typeof pushToFirebase === 'function') pushToFirebase('events', events);
}

function getEvent(id){ return events.find(e => e.id === id) || null; }
function genEventNo(){ return genNo('EV', events, 'no'); }

function eventStatus(ev){
  const t = todayStr();
  if(ev.status === 'closed') return 'closed';
  if(t < ev.startDate) return 'upcoming';
  if(t > ev.endDate)   return 'closed';
  return 'active';
}
const EV_STATUS = {
  upcoming: { label:'即將開始', cls:'badge-pending',   color:'#185FA5', bg:'#E6F1FB' },
  active:   { label:'進行中',   cls:'badge-done',      color:'#1D9E75', bg:'#E1F5EE' },
  closed:   { label:'已結束',   cls:'badge-archived',  color:'#6B6B68', bg:'var(--bg)' },
};

// ── 列表 ──
let _evFilter = 'all';

function renderEventList(){
  const el = document.getElementById('event-list');
  if(!el) return;
  let list = _evFilter === 'all'
    ? events
    : events.filter(e => eventStatus(e) === _evFilter);
  list = list.slice().reverse();
  if(!list.length){
    el.innerHTML = '<div class="order-empty">尚無外展活動，點右上角新增</div>'; return;
  }
  el.innerHTML = list.map(ev => {
    const st       = eventStatus(ev);
    const cfg      = EV_STATUS[st] || EV_STATUS.closed;

function filterEvents(filter){

  document.querySelectorAll('#page-events .ftab').forEach((btn,i) => {

// ── 統計 ──
function getEventLogs(eventId){
  return logs.filter(l => l.eventId === eventId && l.op === 'pos_sale');
}
function calcEventTotalSold(eventId){
  return getEventLogs(eventId).reduce((s,l) => s+(l.qty||0), 0);
}
function calcEventTotalAmt(eventId){
  return getEventLogs(eventId).reduce((s,l) => s+(l.amount||0), 0);
}
function calcEventItemSoldQty(eventId, productId){
  return getEventLogs(eventId).filter(l=>l.productId===productId).reduce((s,l)=>s+(l.qty||0),0);
}

function editEvent(id){
  const ev = getEvent(id);

  _currentEvent = JSON.parse(JSON.stringify(ev));

function saveEvent(){
  const name     = document.getElementById('ev-name')?.value.trim();
  const location = document.getElementById('ev-location')?.value.trim();
  if(!name)    { showToast('⚠️ 請填寫活動名稱'); return; }
  if(!location){ showToast('⚠️ 請填寫地點'); return; }
  _currentEvent.name      = name;
  _currentEvent.location  = location;
  _currentEvent.startDate = document.getElementById('ev-start')?.value || todayStr();
  _currentEvent.endDate   = document.getElementById('ev-end')?.value   || todayStr();
  _currentEvent.staff     = document.getElementById('ev-staff')?.value.trim() || '';
  _currentEvent.note      = document.getElementById('ev-note')?.value.trim()  || '';
  _currentEvent.items     = JSON.parse(JSON.stringify(_evItems));
  if(!_currentEvent.id) _currentEvent.id = 'EV'+Date.now();
  const idx = events.findIndex(e=>e.id===_currentEvent.id);
  const copy = JSON.parse(JSON.stringify(_currentEvent));
  if(idx>=0) events[idx]=copy; else events.push(copy);
  saveEvents();
  showToast('✅ 外展活動已儲存');
  showEventDetail(_currentEvent.id);
}

function renderEventAccountTable(ev){
  const activeItems = (ev.items||[]).filter(i=>(i.takeQty||0)>0);
  if(!activeItems.length) return '<div class="order-empty">尚未設定帶貨數量</div>';
  let grandTake=0, grandSold=0;
  const rows = activeItems.map(item => {
    const sold   = calcEventItemSoldQty(ev.id, item.id);
    const remain = Math.max(0, item.takeQty - sold);
    grandTake += item.takeQty; grandSold += sold;
    const cls = remain===0&&item.takeQty>0?'acct-sold':sold>0?'acct-partial':'';
    return `<div class="event-acct-row ${cls}">
      <span>${item.emoji} ${item.name.length>10?item.name.slice(0,10)+'…':item.name}</span>
      <span>${item.takeQty}</span><span>${sold}</span>
      <span>${remain===0&&item.takeQty>0?'✅ 售完':remain}</span>
    </div>`;
  }).join('');
  return `<div class="event-acct-table">
    <div class="event-acct-header"><span>商品</span><span>帶出</span><span>賣出</span><span>剩餘</span></div>
    ${rows}
    <div class="event-acct-footer">
      <span>合計</span><span>${grandTake}</span><span>${grandSold}</span><span>${grandTake-grandSold}</span>
    </div>
  </div>`;
}

function startEventPOS(eventId){
  const ev = getEvent(eventId);
  if(!ev) return;
  // 設定 POS 為外展模式
  if(typeof initPOS === 'function') initPOS(eventId);

  // 設定 banner
  const banner = document.getElementById('event-pos-banner');
  if(banner){
    banner.style.display = 'block';
    banner.innerHTML = `
      <div class="event-banner" onclick="showEventDetail('${eventId}')">
        <i class="ti ti-map-pin"></i>
        <span>${ev.name}</span>
        <span class="event-banner-day">${totalEventDays(ev)>1?'外展模式':''}</span>
        <i class="ti ti-chevron-right" style="margin-left:auto;"></i>
      </div>
      <div class="event-quick-header">
        <span class="event-quick-label" style="margin:0;">外展商品</span>
        <div style="display:flex;gap:6px;">
          <button class="small-btn" onclick="openEventRecordsModal('${eventId}')">

  document.getElementById('pos-title').innerHTML =
    `<i class="ti ti-cash-register" style="color:#BA7517;"></i> ${ev.name}`;

function totalEventDays(ev){
  const s = new Date(ev.startDate), e = new Date(ev.endDate);
  return Math.floor((e-s)/86400000)+1;
}

function renderEventQuickGrid(ev){
  const grid = document.getElementById('event-quick-grid');
  if(!grid) return;
  const activeItems = (ev.items||[]).filter(i=>(i.takeQty||0)>0);
  if(!activeItems.length){
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:12px;color:var(--text3);font-size:13px;">尚未設定帶貨商品</div>`;
    return;
  }
  grid.innerHTML = activeItems.map(item => {
    const sold      = calcEventItemSoldQty(ev.id, item.id);
    const remaining = Math.max(0, item.takeQty - sold);
    const soldOut   = remaining <= 0;
    const low       = !soldOut && remaining <= 3;
    const cartQty   = typeof getPOSCartQty === 'function' ? getPOSCartQty(item.id) : 0;
    const name      = item.name.length > 7 ? item.name.slice(0,7)+'…' : item.name;
    const addFn     = soldOut ? `showToast('⚠️ 此商品已售完')` : `adjustQuickItem('${ev.id}','${item.id}',1)`;
    return `<div class="event-quick-card ${soldOut?'sold-out':''}">
      <div class="eq-tap-area" onclick="${addFn}">
        <span class="eq-emoji">${item.emoji}</span>
        <span class="eq-name">${name}</span>
        <span class="eq-price">$${item.price}</span>
        <span class="eq-remain ${soldOut?'eq-sold':low?'eq-low':''}">剩 ${remaining}/${item.takeQty}</span>
      </div>
      <div class="eq-qty-row">
        <button class="eq-ctrl-btn" onclick="adjustQuickItem('${ev.id}','${item.id}',-1)" ${cartQty<=0?'disabled':''}>−</button>
        <span class="eq-qty-num ${cartQty>0?'':'eq-qty-zero'}">${cartQty||0}</span>
        <button class="eq-ctrl-btn" onclick="${addFn}" ${soldOut?'disabled':''}>＋</button>
      </div>
    </div>`;
  }).join('');
}

// ── 收款後更新快捷格 ──
function onEventSale(eventId, cartItems){
  const ev = getEvent(eventId);
  if(!ev) return;
  renderEventQuickGrid(ev);
}

// ── 快捷格 +/− ──
function adjustQuickItem(eventId, itemId, delta){
  if(delta > 0){
    if(typeof addPOSItem === 'function') addPOSItem(itemId);
  } else {
    if(typeof removePOSItemById === 'function') removePOSItemById(itemId);
  }
  const ev = getEvent(eventId);
  if(ev) renderEventQuickGrid(ev);
}

// ── 補貨 Modal ──
let _restockEventId = null;
let _restockItems   = [];

function openRestockModal(eventId){
  _restockEventId = eventId;
  const ev = getEvent(eventId);
  if(!ev) return;
  _restockItems = (ev.items||[]).map(item => {
    const sold      = calcEventItemSoldQty(ev.id, item.id);
    const remaining = Math.max(0, (item.takeQty||0) - sold);
    return { id:item.id, name:item.name, emoji:item.emoji, remaining, addQty:0 };
  });
  let modal = document.getElementById('restock-modal');
  if(!modal){
    modal = document.createElement('div');
    modal.id        = 'restock-modal';
    modal.className = 'modal-overlay';
    document.body.appendChild(modal);
  }
  _renderRestockModal(modal);
  modal.style.display = 'flex';
}

        <span class="qty-num" style="color:${item.addQty>0?'var(--green)':'var(--text3)'}">${item.addQty}</span>
        <button class="qty-btn" onclick="restockChange(${idx},1)">＋</button>
      </div>
    </div>
  `).join('');
}

function restockChange(idx, delta){
  _restockItems[idx].addQty = Math.max(0, (_restockItems[idx].addQty||0)+delta);
  _renderRestockItems();
}

function closeRestockModal(){
  const modal = document.getElementById('restock-modal');
  if(modal) modal.style.display = 'none';
}

function saveRestock(){
  const ev = getEvent(_restockEventId);
  if(!ev) return;
  const added = _restockItems.filter(i=>i.addQty>0);
  if(!added.length){ showToast('⚠️ 請輸入補貨數量'); return; }
  added.forEach(r => {
    const evItem = (ev.items||[]).find(i=>i.id===r.id);
    if(evItem) evItem.takeQty = (evItem.takeQty||0) + r.addQty;
    addLog({ op:'ev_restock', eventId:_restockEventId, productId:r.id, productName:r.name, qty:r.addQty });
  });
  saveEvents();
  closeRestockModal();
  const total = added.reduce((s,i)=>s+i.addQty, 0);
  showToast(`✅ 補貨完成！${added.length} 種商品，共 ${total} 個`);
  renderEventQuickGrid(ev);
}

// ── 離線模式 ──
function getOfflineState(eventId){
  try { return JSON.parse(localStorage.getItem('erp_offline_'+eventId)||'{}'); }
  catch(e){ return {}; }
}
function saveOfflineState(eventId, state){
  localStorage.setItem('erp_offline_'+eventId, JSON.stringify(state));
}
function enterOfflineMode(eventId){
  if(!confirm('確定進入外展離線模式？\n銷售記錄將存在本機，回來後可審核上傳。')) return;
  saveOfflineState(eventId, { offlineMode:true, startedAt:nowStr() });
  showToast('✅ 已進入外展離線模式');
  showEventDetail(eventId);
}
function exitOfflineMode(eventId){
  const localLogs = logs.filter(l=>l.eventId===eventId&&!l._uploaded);
  if(localLogs.length && !confirm(`本機還有 ${localLogs.length} 筆未上傳記錄。確定結束離線模式？`)) return;
  const s = getOfflineState(eventId);
  s.offlineMode = false;
  saveOfflineState(eventId, s);
  showToast('已結束離線模式');
  showEventDetail(eventId);
}

// ── 審核上傳頁 ──
let _reviewEventId = null;
let _reviewItems   = [];

function showEventReview(eventId){
  _reviewEventId = eventId;
  const ev = getEvent(eventId);
  if(!ev) return;
  const localLogs = logs.filter(l=>l.eventId===eventId&&!l._uploaded);

  if(!page) return;

    const sold    = localLogs.filter(l=>l.productId===item.id).reduce((s,l)=>s+(l.qty||0),0);
    const remain  = Math.max(0, item.takeQty - sold);
    return { ...item, soldQty:sold, systemRemain:remain, actualRemain:remain };
  });

  page.innerHTML = `
    <div class="op-header">
      <button class="back-btn" onclick="showEventDetail('${eventId}')"><i class="ti ti-arrow-left"></i></button>

    </div>
    <div class="form-card">
      <div style="font-size:16px;font-weight:700;margin-bottom:6px;">${ev.name}</div>
      <div style="font-size:13px;color:var(--text2);">本機有 ${localLogs.length} 筆未上傳記錄</div>
    </div>

    <div id="review-items"></div>
    <div class="section-title" style="margin-top:10px;"><i class="ti ti-pencil"></i> 上傳備註</div>

function renderReviewItems(){

        </div>

function updateActualRemain(idx, val){
  const n = parseInt(val);
  if(!isNaN(n)&&n>=0) _reviewItems[idx].actualRemain = n;
  renderReviewItems();
}

function submitEventUpload(){
  if(!_fbReady||!_db){ showToast('⚠️ 請先連上網路再上傳'); return; }
  const ev   = getEvent(_reviewEventId);
  const note = document.getElementById('review-note')?.value.trim()||'';
  const now  = nowStr();
  const localLogs = logs.filter(l=>l.eventId===_reviewEventId&&!l._uploaded);

  // 計算差異合併庫存
  const locId = getMainLocation()?.id||'store_A';
  _reviewItems.forEach(item => {
    const actualSold = Math.max(0, item.takeQty - item.actualRemain);
    // 歸還未賣出的庫存（帶出時已扣，現在加回來）
    const returnQty = item.actualRemain;
    if(returnQty > 0){
      adjustStock(item.id, locId, returnQty, {
        op:'stock_in', refType:'event_return', note:`外展歸還 ${ev?.name}`
      });
    }
  });

  // 標記本機記錄已上傳
  localLogs.forEach(l => { l._uploaded=true; l._uploadedAt=now; });
  saveLogs();

  // 上傳到 Firebase
  const uploadData = {
    eventId:_reviewEventId, eventName:ev?.name||'',
    deviceId:DEVICE_ID, uploadedAt:now, note,
    items:_reviewItems, logs:localLogs,
    totalAmount: _reviewItems.reduce((s,i)=>s+(i.price||0)*i.soldQty,0),
  };
  const updates = {};
  updates[`erp/eventUploads/${_reviewEventId}/${DEVICE_ID}`] = uploadData;
  localLogs.forEach(l => {
    if(l._fbKey) updates[`erp/logs/${l._fbKey}`] = l;
  });

  _db.ref().update(updates).then(() => {
    saveOfflineState(_reviewEventId, { offlineMode:false, uploaded:true, uploadedAt:now });
    showToast('✅ 外展資料已上傳至雲端');
    showEventDetail(_reviewEventId);
  }).catch(err => {
    console.error('上傳失敗:', err);
    showToast('⚠️ 上傳失敗，請確認網路');
  });
}

function deleteEvent(id){
  events = events.filter(e=>e.id!==id);
  saveEvents();
  // 清除該活動的所有孤兒 log（pos_sale + ev_restock + event_settle）
  const orphanKeys = logs.filter(l=>l.eventId===id).map(l=>l._fbKey).filter(Boolean);
  logs = logs.filter(l=>l.eventId!==id);
  saveLogs();
  orphanKeys.forEach(k => { if(typeof deleteLogFromFirebase==='function') deleteLogFromFirebase(k); });
  showToast('🗑️ 外展活動已刪除');
  showPage('events');
}

// 管理員從編輯頁刪除（無論有無銷售都可刪除，但視情況顯示庫存警告）
function confirmDeleteCurrentEvent(){
  const ev = _currentEvent;
  if(!ev || !ev.id) return;
  const salesCount  = getEventLogs(ev.id).length;
  const wasUploaded = getOfflineState(ev.id).uploaded;
  let warnMsg;
  if(salesCount > 0 && wasUploaded){
    warnMsg = `「${ev.name}」已有 ${salesCount} 筆銷售記錄，且離線資料已上傳（庫存已扣減）。\n\n⚠️ 刪除後銷售記錄會消失，但庫存不會自動恢復，可能造成帳目不符。\n\n確定仍要刪除嗎？`;
  } else if(salesCount > 0){
    warnMsg = `「${ev.name}」已有 ${salesCount} 筆銷售記錄（在線模式，庫存未扣）。\n刪除後銷售記錄也會消失。\n\n確定要刪除嗎？`;
  } else {
    warnMsg = `確定要刪除「${ev.name}」嗎？此操作無法復原。`;
  }
  if(!confirm(warnMsg)) return;
  deleteEvent(ev.id);
}

// ── 外展結算（匯總銷售到銷貨明細）──
function settleEventSales(eventId){
  const ev = getEvent(eventId);
  if(!ev) return;
  const evLogs = logs.filter(l => l.eventId === eventId && l.op === 'pos_sale');
  if(!evLogs.length){ showToast('⚠️ 尚無銷售記錄可結算'); return; }
  // 防止重複結算
  const prevSettle = logs.find(l => l.op === 'event_settle' && l.eventId === eventId);
  if(prevSettle){
    if(!confirm(`「${ev.name}」已有一筆結算記錄（${prevSettle.time}）。\n確定要再新增一筆嗎？`)) return;
  } else {
    if(!confirm(`將「${ev.name}」的 ${evLogs.length} 筆銷售匯總成一筆記錄，加入銷貨明細？`)) return;
  }

  const byProduct = {};
  evLogs.forEach(l => {
    if(!byProduct[l.productId]){
      byProduct[l.productId] = { productId:l.productId, productName:l.productName||'', qty:0, amount:0, unitPrice:l.unitPrice||0 };
    }
    byProduct[l.productId].qty    += (l.qty||0);
    byProduct[l.productId].amount += (l.amount||0);
  });
  const items       = Object.values(byProduct);
  const totalAmount = items.reduce((s,i)=>s+i.amount, 0);
  const totalQty    = items.reduce((s,i)=>s+i.qty, 0);

  addLog({
    op:          'event_settle',
    eventId:     ev.id,
    eventName:   ev.name,
    productName: ev.name,
    qty:         totalQty,
    amount:      totalAmount,
    items:       items,
    settledAt:   nowStr(),
  });
  showToast(`✅ 外展結算完成！共 ${totalQty} 個 ${fmtMoney(totalAmount)}，已加入銷貨明細`);
}

function editSaleQtyInput(val){
  _editingQty = Math.max(1, parseInt(val)||1);
  const amtEl = document.getElementById('edit-sale-amount');
  if(amtEl && _editingLog) amtEl.textContent = `= $${_editingQty * (_editingLog.unitPrice||0)}`;
}

function closeEditSaleModal(){
  const modal = document.getElementById('ev-edit-sale-modal');
  if(modal) modal.style.display = 'none';
  _editingLog = null;
  _editingQty = 0;
}

function saveEditSale(){
  if(!_editingLog) return;
  const note        = document.getElementById('edit-sale-note')?.value.trim() || '';
  const eventId     = _editingLog.eventId;
  const productName = _editingLog.productName;
  const savedQty    = _editingQty;
  _editingLog.qty       = _editingQty;
  _editingLog.amount    = _editingQty * (_editingLog.unitPrice||0);
  _editingLog.note      = note;
  _editingLog._editedAt = nowStr();
  saveLogs();
  if(_editingLog._fbKey){
    if(typeof updateLogInFirebase === 'function') updateLogInFirebase(_editingLog);
  } else {
    // 尚未推送到 Firebase 的離線記錄，補推一次
    if(typeof pushLogToFirebase === 'function') pushLogToFirebase(_editingLog);
  }
  closeEditSaleModal(); // 此後 _editingLog = null
  _renderEvRecordsModal();
  _refreshDetailSales(eventId);
  if(typeof renderSaleReport === 'function') renderSaleReport();
  const ev = getEvent(eventId);
  if(ev) renderEventQuickGrid(ev);
  showToast(`✅ 已修改：${productName} x${savedQty}`);
}

function confirmDeleteSaleLog(){
  if(!_editingLog) return;
  if(!confirm(`確定要刪除「${_editingLog.productName}」這筆銷售記錄嗎？`)) return;
  const fbKey   = _editingLog._fbKey;
  const eventId = _editingLog.eventId;
  // 用物件參照精確定位，避免 _ts 碰撞誤刪其他記錄
  const logIdx = logs.indexOf(_editingLog);
  if(logIdx >= 0) logs.splice(logIdx, 1);
  saveLogs();
  if(fbKey && typeof deleteLogFromFirebase === 'function') deleteLogFromFirebase(fbKey);
  closeEditSaleModal();
  _renderEvRecordsModal();
  _refreshDetailSales(eventId);
  if(typeof renderSaleReport === 'function') renderSaleReport();
  const ev = getEvent(eventId);
  if(ev) renderEventQuickGrid(ev);
  showToast('🗑️ 記錄已刪除');
}

document.addEventListener('DOMContentLoaded', ()=>renderEventList());

function renderSaleReport(){

  let rows = logs.filter(l =>

    ? rows.slice().reverse().map(l => {

function renderPurchaseReport(){

let _financeYear = new Date().getFullYear();
let _financeMonth= new Date().getMonth();

function initFinancePage(){
  const page = document.getElementById('page-finance');
  if(!page||page.innerHTML.trim()) return;
  page.innerHTML = `
    <div class="op-header">
      <button class="back-btn" onclick="showPage('admin')"><i class="ti ti-arrow-left"></i></button>

        style="width:36px;height:36px;border-radius:50%;background:var(--bg);border:1px solid var(--border);
        display:flex;align-items:center;justify-content:center;">
        <i class="ti ti-chevron-left" style="font-size:18px;"></i>

        <i class="ti ti-chevron-right" style="font-size:18px;"></i>

    <div class="section-title"><i class="ti ti-trending-up"></i> 每日趨勢</div>
    <div id="finance-chart" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;overflow-x:auto;margin-bottom:12px;"></div>
    <div class="section-title"><i class="ti ti-trophy"></i> 暢銷品項 TOP 10</div>
    <div id="finance-ranking"></div>`;
  renderFinance();

function changeFinanceMonth(delta){
  _financeMonth += delta;
  if(_financeMonth > 11){ _financeMonth=0; _financeYear++; }
  if(_financeMonth < 0) { _financeMonth=11; _financeYear--; }
  renderFinance();
}

function renderFinance(){
  const monthNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const labelEl = document.getElementById('finance-month-label');
  if(labelEl) labelEl.textContent = `${_financeYear} 年 ${monthNames[_financeMonth]}`;

  // 篩選當月銷售記錄
  const saleLogs = logs.filter(l => {
    if(l.op!=='pos_sale'&&l.op!=='order_ship') return false;
    const date = getLogDate(l);
    if(!date) return false;
    return date.getFullYear()===_financeYear && date.getMonth()===_financeMonth;
  });

  const totalAmt = saleLogs.reduce((s,l)=>s+(l.amount||0),0);
  const totalQty = saleLogs.reduce((s,l)=>s+(l.qty||0),0);
  const txCount  = new Set(saleLogs.map(l=>l.refId||l.time)).size;

  const statsEl = document.getElementById('finance-stats');
  if(statsEl) statsEl.innerHTML = `
    <div class="form-card" style="text-align:center;">
      <div style="font-size:24px;font-weight:700;color:var(--purple);">${fmtMoney(totalAmt)}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px;">銷售總額</div>
    </div>
    <div class="form-card" style="text-align:center;">
      <div style="font-size:24px;font-weight:700;">${txCount}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px;">交易筆數</div>
    </div>
    <div class="form-card" style="text-align:center;">
      <div style="font-size:24px;font-weight:700;color:var(--green);">${totalQty}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px;">銷售數量</div>
    </div>`;

  // 每日趨勢
  const daysInMonth = new Date(_financeYear, _financeMonth+1, 0).getDate();
  const daily = Array(daysInMonth).fill(0);
  saleLogs.forEach(l => {
    const d = getLogDate(l);
    if(d) daily[d.getDate()-1] += (l.amount||0);
  });
  const maxDay = Math.max(...daily, 1);
  const chartEl = document.getElementById('finance-chart');
  if(chartEl) chartEl.innerHTML = `
    <div style="display:flex;align-items:flex-end;gap:3px;height:80px;min-width:300px;">
      ${daily.map((v,i)=>`
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;">
          <div style="width:100%;border-radius:3px 3px 0 0;min-height:4px;
            height:${Math.round(v/maxDay*72)+4}px;
            background:${v>0?'var(--purple)':'var(--border)'};"
            title="${i+1}日 ${fmtMoney(v)}"></div>
          <span style="font-size:9px;color:var(--text3);">${(i+1)%5===0?i+1:''}</span>
        </div>`).join('')}
    </div>`;

  // 品項排行
  const itemMap = {};
  saleLogs.forEach(l => {
    if(!itemMap[l.productId]) itemMap[l.productId]={id:l.productId,name:l.productName,qty:0,amount:0};
    itemMap[l.productId].qty    += l.qty||0;
    itemMap[l.productId].amount += l.amount||0;
  });
  const ranking = Object.values(itemMap).sort((a,b)=>b.amount-a.amount).slice(0,10);
  const maxAmt  = ranking[0]?.amount||1;
  const rankEl  = document.getElementById('finance-ranking');
  if(rankEl) rankEl.innerHTML = ranking.length
    ? ranking.map((item,i)=>{
        const prod = getItem(item.id)||{emoji:'📦'};
        return `<div class="inv-warn-row" style="cursor:default;gap:10px;">
          <span style="font-size:${i<3?22:16}px;">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</span>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:600;">${prod.emoji} ${item.name}</div>
            <div style="height:6px;background:var(--border);border-radius:3px;margin-top:4px;overflow:hidden;">
              <div style="height:100%;background:var(--purple);border-radius:3px;
                width:${Math.round(item.amount/maxAmt*100)}%;"></div>
            </div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:15px;font-weight:700;color:var(--purple);">${fmtMoney(item.amount)}</div>
            <div style="font-size:11px;color:var(--text3);">${item.qty} 個</div>
          </div>
        </div>`;
      }).join('')
    : '<div class="order-empty">本月尚無銷售記錄</div>';
}

function getLogDate(l){
  if(!l.time) return null;
  try {
    const parts = l.time.match(/(\d+)\/(\d+)/);
    if(!parts) return null;
    const m = parseInt(parts[1])-1;
    const d = parseInt(parts[2]);
    const y = m > new Date().getMonth() ? new Date().getFullYear()-1 : new Date().getFullYear();
    return new Date(y, m, d);
  } catch(e){ return null; }
}
